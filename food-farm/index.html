<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#3d7a4e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Food Farm 🌾</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header id="farm-header">
    <div class="header-left">
      <div class="farm-title">🌾 Food Farm</div>
      <div class="week-label" id="week-label">Loading...</div>
    </div>
    <div class="animal-count" id="animal-count">empty farm</div>
  </header>

  <!-- FARM WORLD — SVG background injected by JS, animals layer on top -->
  <div id="farm">
    <div id="farm-animals"></div>
  </div>

  <!-- BOTTOM PANEL -->
  <div id="bottom-panel">
    <div id="log-row">
      <span class="log-label">This week:</span>
      <div id="food-log"></div>
    </div>
    <div id="add-buttons">
      <button class="add-btn" data-type="chicken">
        <span class="add-icon">🐔</span>
        <span class="add-label">Chicken</span>
      </button>
      <button class="add-btn" data-type="pork">
        <span class="add-icon">🐷</span>
        <span class="add-label">Pork</span>
      </button>
      <button class="add-btn" data-type="beef">
        <span class="add-icon">🐄</span>
        <span class="add-label">Beef</span>
      </button>
      <button class="add-btn" data-type="rice">
        <span class="add-icon">🌾</span>
        <span class="add-label">Rice</span>
      </button>
      <button class="add-btn" data-type="veggie">
        <span class="add-icon">🥦</span>
        <span class="add-label">Veggie</span>
      </button>
      <button class="add-btn" data-type="fish">
        <span class="add-icon">🐟</span>
        <span class="add-label">Fish</span>
      </button>
    </div>
  </div>

</div>

<!-- SVG SPRITE LIBRARY -->
<svg id="sprites" xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>

    <!-- ── CHICKEN ── (isometric voxel) -->
    <symbol id="spr-chicken" viewBox="0 0 48 44">
      <!-- Tail feathers (back-left voxel block, amber) -->
      <polygon points="7,23 12,20.5 17,23 12,25.5" fill="#d4880a"/>
      <polygon points="7,23 12,25.5 12,30.5 7,28"  fill="#a86208"/>
      <polygon points="17,23 12,25.5 12,30.5 17,28" fill="#c07a0e"/>
      <!-- Tail spikes -->
      <polygon points="4,17 7,23 11,21"  fill="#c07a0e"/>
      <polygon points="5,14 8,20 13,19"  fill="#d4880a"/>
      <!-- Body (golden yellow voxel block) -->
      <polygon points="12.5,24 21,20 29.5,24 21,28"  fill="#f5c228"/>
      <polygon points="12.5,24 21,28 21,36 12.5,32"  fill="#c8960a"/>
      <polygon points="29.5,24 21,28 21,36 29.5,32"  fill="#dba812"/>
      <!-- Wing detail on right face -->
      <polygon points="29.5,24 23,27 23,34.5 29.5,31.5" fill="#c89010" opacity="0.65"/>
      <!-- Head (bright yellow voxel block) -->
      <polygon points="28,18 34,15 40,18 34,21"  fill="#f8d440"/>
      <polygon points="28,18 34,21 34,28 28,25"  fill="#d0a814"/>
      <polygon points="40,18 34,21 34,28 40,25"  fill="#e8bc18"/>
      <!-- Comb (red voxel block) -->
      <polygon points="31,9 34,7.5 37,9 34,10.5"    fill="#e02020"/>
      <polygon points="31,9 34,10.5 34,14.5 31,13"  fill="#b01010"/>
      <polygon points="37,9 34,10.5 34,14.5 37,13"  fill="#cc1818"/>
      <ellipse cx="32" cy="8" rx="2.5" ry="2"  fill="#ee2828"/>
      <ellipse cx="36" cy="7" rx="2"   ry="1.5" fill="#e02020"/>
      <!-- Wattle -->
      <ellipse cx="41" cy="24" rx="2" ry="2.5" fill="#cc1818"/>
      <!-- Beak -->
      <polygon points="40,19 46,21.5 40,24" fill="#e07510"/>
      <!-- Eye -->
      <circle cx="37.5" cy="20.5" r="2.2" fill="#1a0a04"/>
      <circle cx="38.5" cy="19.5" r="0.9" fill="white"/>
      <!-- Legs -->
      <rect x="15" y="36" width="3" height="7" rx="1.5" fill="#e07510"/>
      <rect x="22" y="36" width="3" height="7" rx="1.5" fill="#e07510"/>
      <!-- Feet -->
      <line x1="13" y1="43" x2="19" y2="43" stroke="#e07510" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="43" x2="26" y2="43" stroke="#e07510" stroke-width="2" stroke-linecap="round"/>
    </symbol>

    <!-- ── PIG ── (isometric voxel) -->
    <symbol id="spr-pork" viewBox="0 0 48 44">
      <!-- Tail (curly path, back-left) -->
      <path d="M9,28 Q3,24 5,18 Q7,12 11,18" stroke="#e898a8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Body (pink voxel block) -->
      <polygon points="10,26 20,21 30,26 20,31"  fill="#f5a8b8"/>
      <polygon points="10,26 20,31 20,40 10,35"  fill="#c87890"/>
      <polygon points="30,26 20,31 20,40 30,35"  fill="#d988a0"/>
      <!-- Head (rosy pink voxel block) -->
      <polygon points="26,18 33,14.5 40,18 33,21.5"  fill="#f5b0c0"/>
      <polygon points="26,18 33,21.5 33,29.5 26,26"  fill="#c87890"/>
      <polygon points="40,18 33,21.5 33,29.5 40,26"  fill="#d988a0"/>
      <!-- Back ear (small voxel block) -->
      <polygon points="24,13 27,11 30,13 27,15"  fill="#f080a0"/>
      <polygon points="24,13 27,15 27,18 24,16"  fill="#c06080"/>
      <polygon points="30,13 27,15 27,18 30,16"  fill="#d07090"/>
      <!-- Front ear (small voxel block) -->
      <polygon points="34,11 37,9 40,11 37,13"  fill="#f080a0"/>
      <polygon points="34,11 37,13 37,16 34,14" fill="#c06080"/>
      <polygon points="40,11 37,13 37,16 40,14" fill="#d07090"/>
      <!-- Snout (protruding voxel block) -->
      <polygon points="37,23 41,21 45,23 41,25"  fill="#f090a8"/>
      <polygon points="37,23 41,25 41,29 37,27"  fill="#d07088"/>
      <polygon points="45,23 41,25 41,29 45,27"  fill="#e07898"/>
      <!-- Nostrils -->
      <circle cx="39.5" cy="26"   r="1.3" fill="#b04868"/>
      <circle cx="42.5" cy="25.5" r="1.3" fill="#b04868"/>
      <!-- Eye -->
      <circle cx="36.5" cy="19.5" r="2.2" fill="#1a0a04"/>
      <circle cx="37.5" cy="18.5" r="0.9" fill="white"/>
      <!-- Legs -->
      <rect x="11" y="40" width="4" height="4" rx="2" fill="#e898a8"/>
      <rect x="17" y="40" width="4" height="4" rx="2" fill="#e898a8"/>
      <rect x="23" y="40" width="4" height="4" rx="2" fill="#e898a8"/>
      <rect x="29" y="40" width="4" height="4" rx="2" fill="#e898a8"/>
    </symbol>

    <!-- ── COW ── (isometric voxel) -->
    <symbol id="spr-beef" viewBox="0 0 56 44">
      <!-- Tail -->
      <path d="M9,26 Q3,22 5,15 Q7,9 12,14" stroke="#b8b8a8" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="12" cy="14" rx="3" ry="2" fill="#a8a898"/>
      <!-- Body (cream voxel block) -->
      <polygon points="11,26 23,20 35,26 23,32"  fill="#f0efe8"/>
      <polygon points="11,26 23,32 23,39 11,33"  fill="#c0bfb0"/>
      <polygon points="35,26 23,32 23,39 35,33"  fill="#d0cfb8"/>
      <!-- Spots on top face -->
      <polygon points="13,27 19,24 25,27 19,30" fill="#282828" opacity="0.75"/>
      <polygon points="27,30 31,28 35,30 31,32" fill="#282828" opacity="0.65"/>
      <!-- Spot on right face -->
      <polygon points="33,28 35,27 35,33 33,34" fill="#282828" opacity="0.5"/>
      <!-- Head (cream voxel block) -->
      <polygon points="35,19 43,15 51,19 43,23"  fill="#f0efe8"/>
      <polygon points="35,19 43,23 43,31 35,27"  fill="#c8bfb0"/>
      <polygon points="51,19 43,23 43,31 51,27"  fill="#d8cfc0"/>
      <!-- Ear -->
      <ellipse cx="37" cy="18" rx="4" ry="2.5" fill="#e8b090" transform="rotate(-20 37 18)"/>
      <!-- Horns -->
      <path d="M37,17 Q33,10 31,13" stroke="#c8a858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M46,15 Q48,8 50,11" stroke="#c8a858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Snout (voxel block) -->
      <polygon points="46.5,24 51,21.5 55.5,24 51,26.5"  fill="#e8b0a0"/>
      <polygon points="46.5,24 51,26.5 51,31.5 46.5,29"  fill="#c09080"/>
      <polygon points="55.5,24 51,26.5 51,31.5 55.5,29"  fill="#d0a090"/>
      <!-- Nostrils -->
      <circle cx="49.5" cy="28"   r="1.5" fill="#a05060"/>
      <circle cx="53"   cy="27.5" r="1.5" fill="#a05060"/>
      <!-- Eye -->
      <circle cx="46"  cy="21" r="2.8" fill="#1a0a04"/>
      <circle cx="47.2" cy="20" r="1.1" fill="white"/>
      <!-- Udder -->
      <ellipse cx="21" cy="40" rx="5" ry="2.5" fill="#f0c0b8"/>
      <circle cx="19" cy="42"   r="1.5" fill="#d09088"/>
      <circle cx="23" cy="42.5" r="1.5" fill="#d09088"/>
      <!-- Legs -->
      <rect x="12" y="39" width="4" height="5" rx="2" fill="#c8c8b0"/>
      <rect x="18" y="39" width="4" height="5" rx="2" fill="#c8c8b0"/>
      <rect x="26" y="39" width="4" height="5" rx="2" fill="#c8c8b0"/>
      <rect x="32" y="39" width="4" height="5" rx="2" fill="#c8c8b0"/>
    </symbol>

    <!-- ── FISH ── -->
    <symbol id="spr-fish" viewBox="0 0 52 36">
      <!-- Tail fin -->
      <path d="M10 4 L10 32 L2 18Z" fill="#3870d8"/>
      <!-- Body -->
      <ellipse cx="30" cy="18" rx="20" ry="12" fill="#4888f0"/>
      <!-- Belly highlight -->
      <ellipse cx="32" cy="21" rx="15" ry="8" fill="#80b8ff" opacity="0.6"/>
      <!-- Dorsal fin -->
      <path d="M22 6 L34 6 L30 12Z"  fill="#3060c8"/>
      <!-- Ventral fin -->
      <path d="M22 30 L34 30 L28 24Z" fill="#3060c8"/>
      <!-- Scale arcs -->
      <path d="M30 12 Q36 10 40 16" stroke="#5080e8" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M24 12 Q30 10 34 16" stroke="#5080e8" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M30 22 Q36 24 40 20" stroke="#5080e8" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <!-- Eye -->
      <circle cx="42" cy="15" r="4"   fill="white"/>
      <circle cx="43" cy="15" r="2.5" fill="#1a1a2a"/>
      <circle cx="44" cy="14" r="1"   fill="white"/>
      <!-- Mouth -->
      <path d="M48 17 Q50 19 48 21" stroke="#2858b0" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </symbol>

    <!-- ── RICE ── -->
    <symbol id="spr-rice" viewBox="0 0 40 48">
      <!-- Stem -->
      <line x1="20" y1="48" x2="20" y2="14" stroke="#5a8838" stroke-width="3" stroke-linecap="round"/>
      <!-- Leaves -->
      <path d="M20 36 Q32 28 34 18" stroke="#6a9e3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M20 38 Q8 30 6 20"   stroke="#6a9e3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Grain stalks -->
      <line x1="20" y1="18" x2="28" y2="26" stroke="#7aaa3a" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="20" x2="26" y2="30" stroke="#7aaa3a" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="22" x2="23" y2="32" stroke="#7aaa3a" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="18" x2="12" y2="26" stroke="#7aaa3a" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="20" x2="14" y2="30" stroke="#7aaa3a" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="22" x2="17" y2="32" stroke="#7aaa3a" stroke-width="2" stroke-linecap="round"/>
      <!-- Rice grains -->
      <ellipse cx="28" cy="27" rx="3"   ry="4.5" fill="#e8c838" transform="rotate(25 28 27)"/>
      <ellipse cx="26" cy="31" rx="3"   ry="4.5" fill="#d8b828" transform="rotate(15 26 31)"/>
      <ellipse cx="23" cy="33" rx="3"   ry="4.5" fill="#e8c838" transform="rotate(5 23 33)"/>
      <ellipse cx="20" cy="14" rx="3"   ry="4.5" fill="#e8c838"/>
      <ellipse cx="12" cy="27" rx="3"   ry="4.5" fill="#e8c838" transform="rotate(-25 12 27)"/>
      <ellipse cx="14" cy="31" rx="3"   ry="4.5" fill="#d8b828" transform="rotate(-15 14 31)"/>
      <ellipse cx="17" cy="33" rx="3"   ry="4.5" fill="#e8c838" transform="rotate(-5 17 33)"/>
    </symbol>

    <!-- ── VEGGIE (Carrot) ── -->
    <symbol id="spr-veggie" viewBox="0 0 36 48">
      <!-- Ground dirt -->
      <rect x="8" y="18" width="20" height="5" rx="2.5" fill="#a07040" opacity="0.55"/>
      <!-- Carrot body -->
      <path d="M13 18 L23 18 L20 46 L18 48 L16 46Z" fill="#f07218"/>
      <!-- Shading lines -->
      <line x1="16" y1="22" x2="15" y2="42" stroke="#d05a10" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
      <line x1="20" y1="22" x2="21" y2="42" stroke="#d05a10" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
      <!-- Leaves -->
      <path d="M18 18 Q10 8 8 0"   stroke="#2a8820" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M18 18 Q18 6 18 0"  stroke="#2a8820" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M18 18 Q26 8 28 0"  stroke="#2a8820" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M18 18 Q12 10 14 4" stroke="#50a040" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M18 18 Q24 10 22 4" stroke="#50a040" stroke-width="2" fill="none" stroke-linecap="round"/>
    </symbol>

  </defs>
</svg>

<script src="app.js"></script>
</body>
</html>
