<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C&K | Floor View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./floor.css" />
  </head>
  <body class="floor-fullscreen">
    <div class="floor-page">
      <div class="floor-titlebar">Floor View</div>
      <div class="floor-toolbar">
        <span id="syncStatus">Connecting…</span>
        <button id="togglePoolBtn" title="Show / hide unassigned guests">Pool</button>
        <a href="./index.html">← Arranger</a>
      </div>

      <div id="canvas" class="floor-canvas">
        <div class="floor-canvas-inner">
          <div id="stage" class="floor-stage">
            <span class="material-icons-outlined" style="font-size: 16px">arrow_upward</span>
            <span>STAGE</span>
          </div>
        </div>
      </div>

      <div id="pool" class="floor-pool">
        <div class="floor-pool-header" id="poolHeader">
          <span class="floor-pool-title">Unassigned</span>
          <span class="floor-pool-count" id="poolCount">0</span>
          <span class="floor-pool-hint hidden md:inline">Drag a name onto any chair to seat them</span>
          <span style="flex: 1"></span>
          <span id="poolCaret" class="material-icons-outlined floor-pool-caret">expand_more</span>
        </div>
        <div id="poolChips" class="floor-pool-chips"></div>
      </div>

      <div
        id="toast"
        class="fixed bottom-24 right-4 bg-stone-800 text-white px-4 py-2 rounded-lg text-xs uppercase tracking-widest opacity-0 transition-opacity pointer-events-none z-50"
      ></div>
    </div>

    <script type="module" src="./floor.js"></script>
  </body>
</html>
