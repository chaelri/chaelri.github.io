<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C&K | Floor View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./floor.css" />
  </head>
  <body class="bg-[#faf9f6] min-h-screen">
    <nav class="p-4 bg-white border-b border-stone-200 sticky top-0 z-50">
      <div class="max-w-7xl mx-auto flex justify-between items-center">
        <h1 class="serif italic text-xl md:text-2xl text-[#7b8a5b]">
          Floor View
        </h1>
        <div class="flex items-center gap-4">
          <span
            id="syncStatus"
            class="text-[10px] uppercase tracking-widest text-stone-400 font-bold hidden md:inline"
            >Connecting…</span
          >
          <button
            id="resetLayoutBtn"
            class="text-[10px] uppercase tracking-widest text-stone-400 hover:text-stone-800"
            title="Auto-arrange tables in a default grid"
          >Auto-arrange</button>
          <a
            href="./index.html"
            class="text-[10px] uppercase tracking-widest text-stone-400 hover:text-stone-800"
            >← Arranger</a
          >
        </div>
      </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
      <p
        class="text-[11px] md:text-xs text-stone-500 mb-4 md:mb-6 max-w-3xl leading-relaxed"
      >
        Drag tables to mirror your venue. <strong>Click a table</strong> to see
        its seat list. Stage is up top — orient tables so seat 1 faces stage
        where possible. Shapes are automatic: VIPs are wide rectangles, Kids is
        a square, regular tables are round.
      </p>

      <div id="canvas" class="floor-canvas">
        <div id="stage" class="floor-stage">
          <span class="material-icons-outlined" style="font-size:14px">arrow_upward</span>
          <span>STAGE</span>
        </div>
        <div id="tables"></div>
      </div>
    </main>

    <div
      id="toast"
      class="fixed bottom-4 right-4 bg-stone-800 text-white px-4 py-2 rounded-lg text-xs uppercase tracking-widest opacity-0 transition-opacity pointer-events-none z-50"
    ></div>

    <script type="module" src="./floor.js"></script>
  </body>
</html>
