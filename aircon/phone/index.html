<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#07080b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Aircon Remote</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    :root { color-scheme: dark; }
    html, body { background: #07080b; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-image:
        radial-gradient(ellipse 70% 50% at 50% 60%, rgba(14,165,233,0.22), transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(34,211,238,0.14), transparent 60%);
      background-attachment: fixed;
      overscroll-behavior: none;
    }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }

    .power-btn {
      transition: transform 90ms cubic-bezier(0.22,1,0.36,1), box-shadow 280ms ease;
      will-change: transform;
      background-image: linear-gradient(to bottom right, #38bdf8, #0369a1);
      box-shadow: 0 24px 70px -15px rgba(14,165,233,0.65), inset 0 1px 0 rgba(255,255,255,0.22), inset 0 -10px 24px rgba(0,0,0,0.30);
    }
    .power-btn:active { transform: scale(0.94); transition-duration: 60ms; }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%      { opacity: 0.85; transform: scale(1.08); }
    }
    .ambient-glow { animation: pulseGlow 3.6s ease-in-out infinite; }

    @keyframes ripple {
      0%   { transform: scale(0.55); opacity: 0.55; }
      100% { transform: scale(1.95); opacity: 0; }
    }
    .ripple { animation: ripple 700ms ease-out forwards; transform-origin: center; }

    @keyframes pressFlash { 0%,100% { opacity: 1 } 50% { opacity: 0.55 } }
    .clicking { animation: pressFlash 400ms ease-in-out 2; }
  </style>
</head>
<body class="min-h-screen text-slate-200 antialiased">
  <div class="max-w-md mx-auto px-5 pt-7 pb-7 min-h-screen flex flex-col">

    <header class="flex items-center gap-2.5">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-500 to-cyan-600 grid place-items-center shadow-lg shadow-sky-500/30">
        <span class="material-symbols-outlined text-white" style="font-size:20px">ac_unit</span>
      </div>
      <div>
        <div class="font-semibold text-white leading-tight">Aircon Remote</div>
        <div class="text-[11px] text-slate-500 mono">SG90 servo · 1 button</div>
      </div>
      <span class="ml-auto inline-flex items-center gap-1.5 text-[10px] uppercase tracking-wider text-slate-500">
        <span id="connDot" class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
        <span id="connText">connecting</span>
      </span>
    </header>

    <div class="flex-1 flex flex-col items-center justify-center gap-6">
      <div class="relative">
        <div class="ambient-glow absolute -inset-12 rounded-full bg-gradient-to-br from-sky-500/40 to-cyan-500/30 blur-3xl pointer-events-none"></div>
        <div id="rippleHost" class="absolute inset-0 rounded-full overflow-hidden pointer-events-none"></div>
        <button id="powerBtn"
          aria-label="Press aircon power button"
          class="power-btn relative w-56 h-56 rounded-full grid place-items-center">
          <div class="absolute inset-3 rounded-full border border-white/15 pointer-events-none"></div>
          <div class="text-center select-none">
            <span class="material-symbols-outlined text-white block" id="powerIcon" style="font-size:64px">power_settings_new</span>
            <div class="text-white font-extrabold tracking-[0.2em] text-base mt-1">POWER</div>
          </div>
        </button>
      </div>
      <div class="text-[11px] text-slate-500 mono uppercase tracking-[0.2em]">
        tap to physically press the remote
      </div>
    </div>

    <div class="rounded-2xl bg-white/[0.03] border border-white/[0.05] overflow-hidden">
      <div class="px-4 py-3 flex items-center gap-3 text-xs">
        <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-600"></span>
        <span id="statusText" class="mono text-slate-400 flex-1 truncate">tap the button to click</span>
        <span class="mono text-slate-600 text-[10px]" id="lastTime"></span>
      </div>
      <div class="px-4 py-3 border-t border-white/[0.05] grid grid-cols-2 gap-2 text-[10px] mono uppercase tracking-[0.16em] text-slate-500">
        <div>
          <div class="text-slate-600">click count</div>
          <div class="text-slate-300 text-sm normal-case tracking-normal mt-0.5" id="diagCount">—</div>
        </div>
        <div>
          <div class="text-slate-600">last duration</div>
          <div class="text-slate-300 text-sm normal-case tracking-normal mt-0.5" id="diagMs">—</div>
        </div>
      </div>
    </div>

    <p class="text-[10px] text-slate-600 mt-4 text-center">
      Charlie's DIY aircon controller · ESP32-C3 + SG90 servo
    </p>
  </div>

  <script type="module">
    import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
    import { getAuth, signInAnonymously }     from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyB8ahT56WbEUaGAymsRNNA-DrfZnUnWIwk",
      authDomain: "test-database-55379.firebaseapp.com",
      databaseURL: "https://test-database-55379-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "test-database-55379"
    });
    const db   = getDatabase(app);
    const auth = getAuth(app);
    signInAnonymously(auth).catch(e => console.warn("anon signin failed:", e));

    const $ = id => document.getElementById(id);
    const connDot   = $("connDot"),   connText   = $("connText");
    const statusDot = $("statusDot"), statusText = $("statusText"), lastTime = $("lastTime");
    const powerBtn  = $("powerBtn"),  powerIcon  = $("powerIcon"),  rippleHost = $("rippleHost");
    const diagCount = $("diagCount"), diagMs     = $("diagMs");

    onValue(ref(db, ".info/connected"), snap => {
      const ok = snap.val() === true;
      connDot.className = "w-1.5 h-1.5 rounded-full " + (ok ? "bg-emerald-400" : "bg-slate-600");
      connText.textContent = ok ? "online" : "offline";
    });

    const stateColors = { send:"bg-amber-400", ok:"bg-emerald-400", err:"bg-rose-500", idle:"bg-slate-600" };
    function setStatus(state, msg) {
      statusDot.className = "w-2 h-2 rounded-full " + stateColors[state];
      statusText.textContent = msg;
    }

    function spawnRipple() {
      const r = document.createElement("div");
      r.className = "ripple absolute inset-0 rounded-full bg-white/30";
      rippleHost.appendChild(r);
      setTimeout(() => r.remove(), 750);
    }

    onValue(ref(db, "aircon/state"), snap => {
      const v = snap.val();
      if (!v || typeof v !== "object") return;
      diagCount.textContent = (v.count|0) ? "#" + (v.count|0) : "—";
      diagMs.textContent    = (v.click_ms|0) ? (v.click_ms|0) + " ms" : "—";
      if (v.last === "click" && (v.count|0) > 0) {
        setStatus("ok", "clicked · " + (v.click_ms|0) + " ms");
      }
    });

    async function fire() {
      if (navigator.vibrate) navigator.vibrate(20);
      spawnRipple();
      powerIcon.classList.add("clicking");
      setStatus("send", "pressing remote button…");
      try {
        await set(ref(db, "aircon/command"), { cmd: "click" });
        lastTime.textContent = new Date().toLocaleTimeString();
      } catch (err) {
        console.error(err);
        setStatus("err", "failed: " + (err.message || err.code || err));
      } finally {
        setTimeout(() => powerIcon.classList.remove("clicking"), 900);
      }
    }

    powerBtn.addEventListener("click", fire);
  </script>
</body>
</html>
