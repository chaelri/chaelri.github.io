<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#07080b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Aircon Remote</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    :root { color-scheme: dark; }
    html, body { background: #07080b; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-image:
        radial-gradient(ellipse 70% 50% at 50% 60%, rgba(14,165,233,0.20), transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(34,211,238,0.13), transparent 60%);
      background-attachment: fixed;
      overscroll-behavior: none;
    }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }

    /* Big action buttons */
    .action-btn { transition: transform 90ms cubic-bezier(0.22,1,0.36,1), box-shadow 220ms ease; will-change: transform; }
    .action-btn:active { transform: scale(0.94); transition-duration: 60ms; }
    .action-btn:disabled { opacity: 0.5; pointer-events: none; }

    /* Ambient glow */
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%      { opacity: 0.78; transform: scale(1.06); }
    }
    .ambient-glow { animation: pulseGlow 4s ease-in-out infinite; }

    /* Tap ripple */
    @keyframes ripple {
      0%   { transform: scale(0.55); opacity: 0.55; }
      100% { transform: scale(1.9);  opacity: 0; }
    }
    .ripple { animation: ripple 650ms ease-out forwards; transform-origin: center; }

    /* Step buttons */
    .step-btn { transition: transform 90ms ease, background 200ms ease; }
    .step-btn:active { transform: scale(0.92); }

    /* Sending pulse */
    @keyframes sendPulse { 0%,100% { opacity: 1 } 50% { opacity: 0.5 } }
    .sending { animation: sendPulse 600ms ease-in-out infinite; }
  </style>
</head>
<body class="min-h-screen text-slate-200 antialiased">
  <div class="max-w-md mx-auto px-5 pt-7 pb-7 min-h-screen flex flex-col">

    <header class="flex items-center gap-2.5">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-500 to-cyan-600 grid place-items-center shadow-lg shadow-sky-500/30">
        <span class="material-symbols-outlined text-white" style="font-size:20px">ac_unit</span>
      </div>
      <div>
        <div class="font-semibold text-white leading-tight">Aircon Remote</div>
        <div class="text-[11px] text-slate-500 mono">TAC-09CSA · Raw IR</div>
      </div>
      <span class="ml-auto inline-flex items-center gap-1.5 text-[10px] uppercase tracking-wider text-slate-500">
        <span id="connDot" class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
        <span id="connText">connecting</span>
      </span>
    </header>

    <div class="flex-1 flex flex-col items-center justify-center py-6 gap-7">

      <!-- POWER ON / POWER OFF row -->
      <div class="grid grid-cols-2 gap-4 w-full">
        <div class="relative">
          <div class="ambient-glow absolute -inset-4 rounded-3xl bg-gradient-to-br from-sky-500/40 to-cyan-500/30 blur-2xl pointer-events-none"></div>
          <button id="powerOnBtn"
            class="action-btn relative w-full h-28 rounded-3xl grid place-items-center
                   bg-gradient-to-br from-sky-400 to-sky-700
                   shadow-[0_20px_50px_-12px_rgba(14,165,233,0.6),inset_0_1px_0_rgba(255,255,255,0.18)]">
            <div class="text-center select-none">
              <span class="material-symbols-outlined text-white block" style="font-size:36px">power_settings_new</span>
              <div class="text-white font-bold tracking-[0.18em] text-xs mt-1">POWER ON</div>
            </div>
          </button>
        </div>
        <button id="powerOffBtn"
          class="action-btn relative w-full h-28 rounded-3xl grid place-items-center
                 bg-gradient-to-br from-slate-600 to-slate-800
                 shadow-[0_12px_30px_-12px_rgba(0,0,0,0.6),inset_0_1px_0_rgba(255,255,255,0.06)]">
          <div class="text-center select-none">
            <span class="material-symbols-outlined text-slate-300 block" style="font-size:36px">power_off</span>
            <div class="text-slate-300 font-bold tracking-[0.18em] text-xs mt-1">POWER OFF</div>
          </div>
        </button>
      </div>

      <!-- TEMP +/- row -->
      <div class="flex flex-col items-center gap-3">
        <div class="text-[10px] mono uppercase tracking-[0.22em] text-slate-500">Temperature</div>
        <div class="flex items-center gap-6">
          <button id="tempDown"
            class="step-btn w-20 h-20 rounded-full grid place-items-center text-3xl font-light text-cyan-300
                   bg-white/[0.04] border border-cyan-400/20 hover:bg-cyan-400/10">
            <span class="material-symbols-outlined" style="font-size:32px">remove</span>
          </button>
          <button id="tempUp"
            class="step-btn w-20 h-20 rounded-full grid place-items-center text-3xl font-light text-cyan-300
                   bg-white/[0.04] border border-cyan-400/20 hover:bg-cyan-400/10">
            <span class="material-symbols-outlined" style="font-size:32px">add</span>
          </button>
        </div>
      </div>

      <!-- SWING -->
      <button id="swingBtn"
        class="action-btn px-7 py-4 rounded-full text-sm font-semibold uppercase tracking-[0.16em] text-cyan-100
               bg-gradient-to-br from-cyan-500/20 to-sky-600/20 border border-cyan-400/30
               inline-flex items-center gap-2.5">
        <span class="material-symbols-outlined" style="font-size:22px">swap_vert</span>
        Swing
      </button>
    </div>

    <div class="rounded-2xl bg-white/[0.03] border border-white/[0.05] overflow-hidden">
      <div class="px-4 py-3 flex items-center gap-3 text-xs">
        <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-600"></span>
        <span id="statusText" class="mono text-slate-400 flex-1 truncate">tap a button to send</span>
        <span class="mono text-slate-600 text-[10px]" id="lastTime"></span>
      </div>
    </div>

    <p class="text-[10px] text-slate-600 mt-4 text-center">
      Charlie's DIY aircon controller · ESP32-C3 + 940nm IR LED
    </p>
  </div>

  <script type="module">
    import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
    import { getAuth, signInAnonymously }     from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyB8ahT56WbEUaGAymsRNNA-DrfZnUnWIwk",
      authDomain: "test-database-55379.firebaseapp.com",
      databaseURL: "https://test-database-55379-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "test-database-55379"
    });
    const db   = getDatabase(app);
    const auth = getAuth(app);
    signInAnonymously(auth).catch(e => console.warn("anon signin failed:", e));

    const $ = id => document.getElementById(id);
    const connDot   = $("connDot"),   connText   = $("connText");
    const statusDot = $("statusDot"), statusText = $("statusText"), lastTime = $("lastTime");

    onValue(ref(db, ".info/connected"), snap => {
      const ok = snap.val() === true;
      connDot.className = "w-1.5 h-1.5 rounded-full " + (ok ? "bg-emerald-400" : "bg-slate-600");
      connText.textContent = ok ? "online" : "offline";
    });

    const stateColors = { send:"bg-amber-400", ok:"bg-emerald-400", err:"bg-rose-500", idle:"bg-slate-600" };
    function setStatus(state, msg) {
      statusDot.className = "w-2 h-2 rounded-full " + stateColors[state];
      statusText.textContent = msg;
    }

    onValue(ref(db, "aircon/state"), snap => {
      const v = snap.val();
      if (!v || typeof v !== "object" || !v.last) return;
      setStatus("ok", "sent " + v.last);
    });

    async function fire(cmd, haptic) {
      if (navigator.vibrate) navigator.vibrate(haptic || 8);
      setStatus("send", "sending " + cmd + "…");
      try {
        await set(ref(db, "aircon/command"), { cmd });
        lastTime.textContent = new Date().toLocaleTimeString();
      } catch (err) {
        console.error(err);
        setStatus("err", "failed: " + (err.message || err.code || err));
      }
    }

    $("powerOnBtn") .addEventListener("click", () => fire("power_on",  15));
    $("powerOffBtn").addEventListener("click", () => fire("power_off", 15));
    $("tempUp")    .addEventListener("click", () => fire("temp_up",    8));
    $("tempDown")  .addEventListener("click", () => fire("temp_down",  8));
    $("swingBtn")  .addEventListener("click", () => fire("swing",      8));
  </script>
</body>
</html>
