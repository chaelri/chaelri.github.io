<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#07080b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Aircon Remote</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    :root { color-scheme: dark; }
    html, body { background: #07080b; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-image:
        radial-gradient(ellipse 70% 50% at 50% 60%, rgba(14,165,233,0.20), transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(34,211,238,0.13), transparent 60%);
      background-attachment: fixed;
      overscroll-behavior: none;
    }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }

    /* Big power button */
    .power-btn { transition: transform 90ms cubic-bezier(0.22,1,0.36,1), background 280ms ease, box-shadow 280ms ease; will-change: transform; }
    .power-btn:active { transform: scale(0.94); transition-duration: 60ms; }

    /* On state — sky/cyan glow */
    .power-btn.on {
      background-image: linear-gradient(to bottom right, #38bdf8, #0369a1) !important;
      box-shadow: 0 20px 60px -15px rgba(14,165,233,0.7), inset 0 1px 0 rgba(255,255,255,0.18);
    }

    /* Ambient glow behind button */
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.55; transform: scale(1); }
      50%      { opacity: 0.78; transform: scale(1.07); }
    }
    .ambient-glow { animation: pulseGlow 3.6s ease-in-out infinite; transition: background 280ms ease; }
    .ambient-glow.on { background-image: linear-gradient(to bottom right, rgba(14,165,233,0.45), rgba(34,211,238,0.35)) !important; }

    /* Tap ripple */
    @keyframes ripple {
      0%   { transform: scale(0.55); opacity: 0.55; }
      100% { transform: scale(1.9);  opacity: 0; }
    }
    .ripple { animation: ripple 650ms ease-out forwards; transform-origin: center; }

    /* Step buttons */
    .step-btn { transition: transform 90ms ease, background 200ms ease; }
    .step-btn:active { transform: scale(0.92); }

    /* Mode/fan chips */
    .chip { transition: all 200ms ease; }
    .chip.active {
      background: linear-gradient(135deg, rgba(14,165,233,0.35), rgba(34,211,238,0.25));
      border-color: rgba(103,232,249,0.5);
      color: #cffafe;
    }
    .chip:active { transform: scale(0.95); }

    /* Sending pulse on temp number */
    @keyframes sendPulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }
    .sending { animation: sendPulse 600ms ease-in-out infinite; }
  </style>
</head>
<body class="min-h-screen text-slate-200 antialiased">
  <div class="max-w-md mx-auto px-5 pt-7 pb-7 min-h-screen flex flex-col">

    <!-- header -->
    <header class="flex items-center gap-2.5">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-500 to-cyan-600 grid place-items-center shadow-lg shadow-sky-500/30">
        <span class="material-symbols-outlined text-white" style="font-size:20px">ac_unit</span>
      </div>
      <div>
        <div class="font-semibold text-white leading-tight">Aircon Remote</div>
        <div class="text-[11px] text-slate-500 mono">TCL TAC-09CSA · 112AC</div>
      </div>
      <span class="ml-auto inline-flex items-center gap-1.5 text-[10px] uppercase tracking-wider text-slate-500">
        <span id="connDot" class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
        <span id="connText">connecting</span>
      </span>
    </header>

    <!-- temp display + steppers -->
    <div class="flex-1 flex flex-col items-center justify-center py-6 gap-7">
      <div class="flex items-center gap-5">
        <button id="tempDown"
          class="step-btn w-14 h-14 rounded-full grid place-items-center text-xl font-light text-cyan-300
                 bg-white/[0.04] border border-cyan-400/20 hover:bg-cyan-400/10">
          <span class="material-symbols-outlined">remove</span>
        </button>
        <div class="text-center">
          <div class="flex items-baseline gap-1 leading-none">
            <span id="tempVal" class="text-7xl font-extralight text-white tabular-nums" style="letter-spacing:-0.04em">24</span>
            <span class="text-2xl text-cyan-300 font-light">°C</span>
          </div>
          <div class="text-[10px] mono uppercase tracking-[0.22em] text-slate-500 mt-2" id="modeLabel">cool</div>
        </div>
        <button id="tempUp"
          class="step-btn w-14 h-14 rounded-full grid place-items-center text-xl font-light text-cyan-300
                 bg-white/[0.04] border border-cyan-400/20 hover:bg-cyan-400/10">
          <span class="material-symbols-outlined">add</span>
        </button>
      </div>

      <!-- big power button -->
      <div class="relative">
        <div id="ambientGlow" class="ambient-glow absolute -inset-10 rounded-full bg-gradient-to-br from-slate-600/30 to-slate-700/30 blur-3xl pointer-events-none"></div>
        <div id="rippleHost" class="absolute inset-0 rounded-full overflow-hidden pointer-events-none"></div>
        <button id="powerBtn"
          aria-label="Toggle aircon power"
          class="power-btn relative w-44 h-44 rounded-full grid place-items-center
                 bg-gradient-to-br from-slate-600 to-slate-800
                 shadow-[0_20px_60px_-15px_rgba(0,0,0,0.6),inset_0_1px_0_rgba(255,255,255,0.08)]">
          <div class="absolute inset-3 rounded-full border border-white/10 pointer-events-none"></div>
          <div class="text-center select-none">
            <span class="material-symbols-outlined text-white block" style="font-size:48px">power_settings_new</span>
            <div id="powerLabel" class="text-white font-extrabold tracking-[0.18em] text-base mt-0.5">OFF</div>
          </div>
        </button>
      </div>

      <!-- mode chips -->
      <div>
        <div class="text-[10px] mono uppercase tracking-[0.22em] text-slate-500 mb-2 text-center">mode</div>
        <div class="flex flex-wrap justify-center gap-2" id="modeRow">
          <button class="chip px-3.5 py-2 rounded-full text-xs font-semibold uppercase tracking-[0.14em] text-slate-400 bg-white/[0.04] border border-white/[0.08]" data-mode="cool">cool</button>
          <button class="chip px-3.5 py-2 rounded-full text-xs font-semibold uppercase tracking-[0.14em] text-slate-400 bg-white/[0.04] border border-white/[0.08]" data-mode="dry">dry</button>
          <button class="chip px-3.5 py-2 rounded-full text-xs font-semibold uppercase tracking-[0.14em] text-slate-400 bg-white/[0.04] border border-white/[0.08]" data-mode="fan">fan</button>
          <button class="chip px-3.5 py-2 rounded-full text-xs font-semibold uppercase tracking-[0.14em] text-slate-400 bg-white/[0.04] border border-white/[0.08]" data-mode="auto">auto</button>
        </div>
      </div>

      <!-- fan chips -->
      <div>
        <div class="text-[10px] mono uppercase tracking-[0.22em] text-slate-500 mb-2 text-center">fan</div>
        <div class="flex flex-wrap justify-center gap-2" id="fanRow">
          <button class="chip px-3.5 py-2 rounded-full text-xs font-semibold uppercase tracking-[0.14em] text-slate-400 bg-white/[0.04] border border-white/[0.08]" data-fan="auto">auto</button>
          <button class="chip px-3.5 py-2 rounded-full text-xs font-semibold uppercase tracking-[0.14em] text-slate-400 bg-white/[0.04] border border-white/[0.08]" data-fan="low">low</button>
          <button class="chip px-3.5 py-2 rounded-full text-xs font-semibold uppercase tracking-[0.14em] text-slate-400 bg-white/[0.04] border border-white/[0.08]" data-fan="med">med</button>
          <button class="chip px-3.5 py-2 rounded-full text-xs font-semibold uppercase tracking-[0.14em] text-slate-400 bg-white/[0.04] border border-white/[0.08]" data-fan="high">high</button>
        </div>
      </div>
    </div>

    <!-- status footer -->
    <div class="rounded-2xl bg-white/[0.03] border border-white/[0.05] overflow-hidden">
      <div class="px-4 py-3 flex items-center gap-3 text-xs">
        <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-600"></span>
        <span id="statusText" class="mono text-slate-400 flex-1 truncate">tap a button to send</span>
        <span class="mono text-slate-600 text-[10px]" id="lastTime"></span>
      </div>
    </div>

    <p class="text-[10px] text-slate-600 mt-4 text-center">
      Charlie's DIY aircon controller · ESP32-C3 + 940nm IR LED
    </p>
  </div>

  <script type="module">
    import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
    import { getAuth, signInAnonymously }     from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyB8ahT56WbEUaGAymsRNNA-DrfZnUnWIwk",
      authDomain: "test-database-55379.firebaseapp.com",
      databaseURL: "https://test-database-55379-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "test-database-55379"
    });
    const db   = getDatabase(app);
    const auth = getAuth(app);
    signInAnonymously(auth).catch(e => console.warn("anon signin failed:", e));

    const $ = id => document.getElementById(id);
    const connDot   = $("connDot"),   connText   = $("connText");
    const statusDot = $("statusDot"), statusText = $("statusText"), lastTime = $("lastTime");
    const powerBtn  = $("powerBtn"),  powerLabel = $("powerLabel");
    const tempVal   = $("tempVal"),   modeLabel  = $("modeLabel");
    const tempUp    = $("tempUp"),    tempDown   = $("tempDown");
    const rippleHost = $("rippleHost"), ambientGlow = $("ambientGlow");

    // online indicator
    onValue(ref(db, ".info/connected"), snap => {
      const ok = snap.val() === true;
      connDot.className = "w-1.5 h-1.5 rounded-full " + (ok ? "bg-emerald-400" : "bg-slate-600");
      connText.textContent = ok ? "online" : "offline";
    });

    const stateColors = { send:"bg-amber-400", ok:"bg-emerald-400", err:"bg-rose-500", idle:"bg-slate-600" };
    function setStatus(state, msg) {
      statusDot.className = "w-2 h-2 rounded-full " + stateColors[state];
      statusText.textContent = msg;
    }

    function spawnRipple() {
      const r = document.createElement("div");
      r.className = "ripple absolute inset-0 rounded-full bg-white/25";
      rippleHost.appendChild(r);
      setTimeout(() => r.remove(), 700);
    }

    // Authoritative state — read live from Firebase, written by ESP32 after
    // every IR send. Reflects truth regardless of which platform triggered.
    let s = { power: false, mode: "cool", temp: 24, fan: "auto", swing: false };

    function render() {
      tempVal.textContent = s.temp;
      modeLabel.textContent = s.mode;
      powerLabel.textContent = s.power ? "ON" : "OFF";
      powerBtn.classList.toggle("on", s.power);
      ambientGlow.classList.toggle("on", s.power);
      document.querySelectorAll("[data-mode]").forEach(b =>
        b.classList.toggle("active", b.dataset.mode === s.mode));
      document.querySelectorAll("[data-fan]").forEach(b =>
        b.classList.toggle("active", b.dataset.fan === s.fan));
    }

    onValue(ref(db, "aircon/state"), snap => {
      const v = snap.val();
      if (!v || typeof v !== "object") return;
      s = { ...s, ...v };
      render();
      if (!statusText.textContent.includes("…") && !statusText.textContent.includes("failed")) {
        setStatus("ok", `${s.power ? "on" : "off"} · ${s.mode} · ${s.temp}°C · fan ${s.fan}`);
      }
    });

    async function sendCmd() {
      try {
        tempVal.classList.add("sending");
        await set(ref(db, "aircon/command"), s);
        lastTime.textContent = new Date().toLocaleTimeString();
        setStatus("send", "sending IR…");
        return true;
      } catch (err) {
        console.error(err);
        setStatus("err", "failed: " + (err.message || err.code || err));
        return false;
      } finally {
        setTimeout(() => tempVal.classList.remove("sending"), 600);
      }
    }

    powerBtn.addEventListener("click", async () => {
      if (navigator.vibrate) navigator.vibrate(15);
      spawnRipple();
      s.power = !s.power;
      render();
      await sendCmd();
    });

    tempUp.addEventListener("click", async () => {
      if (s.temp >= 30) return;
      if (navigator.vibrate) navigator.vibrate(8);
      s.temp += 1;
      render();
      await sendCmd();
    });

    tempDown.addEventListener("click", async () => {
      if (s.temp <= 16) return;
      if (navigator.vibrate) navigator.vibrate(8);
      s.temp -= 1;
      render();
      await sendCmd();
    });

    document.querySelectorAll("[data-mode]").forEach(b => {
      b.addEventListener("click", async () => {
        if (navigator.vibrate) navigator.vibrate(8);
        s.mode = b.dataset.mode;
        render();
        await sendCmd();
      });
    });

    document.querySelectorAll("[data-fan]").forEach(b => {
      b.addEventListener("click", async () => {
        if (navigator.vibrate) navigator.vibrate(8);
        s.fan = b.dataset.fan;
        render();
        await sendCmd();
      });
    });

    render();
  </script>
</body>
</html>
