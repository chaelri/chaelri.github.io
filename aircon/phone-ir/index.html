<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#07080b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Aircon IR Remote</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    :root { color-scheme: dark; }
    html, body { background: #07080b; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-image:
        radial-gradient(ellipse 70% 50% at 50% 60%, rgba(14,165,233,0.22), transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(34,211,238,0.14), transparent 60%);
      background-attachment: fixed;
      overscroll-behavior: none;
    }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }

    .key {
      position: relative;
      transition: transform 90ms cubic-bezier(0.22,1,0.36,1), box-shadow 200ms ease, filter 200ms ease;
      will-change: transform;
    }
    .key:active { transform: scale(0.95); transition-duration: 60ms; }
    .key:disabled { opacity: 0.55; filter: grayscale(0.4); pointer-events: none; }

    .key-on {
      background-image: linear-gradient(160deg, #22d3ee, #0ea5e9 55%, #0369a1);
      box-shadow:
        0 18px 50px -10px rgba(14,165,233,0.55),
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -10px 24px rgba(0,0,0,0.30);
    }
    .key-off {
      background-image: linear-gradient(160deg, #475569, #334155 55%, #1e293b);
      box-shadow:
        0 14px 40px -12px rgba(15,23,42,0.6),
        inset 0 1px 0 rgba(255,255,255,0.10),
        inset 0 -10px 24px rgba(0,0,0,0.30);
    }
    .key-slate {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(148,163,184,0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.45; transform: scale(1); }
      50%      { opacity: 0.75; transform: scale(1.05); }
    }
    .ambient-glow { animation: pulseGlow 3.6s ease-in-out infinite; }

    @keyframes pressFlash { 0%,100% { opacity: 1 } 50% { opacity: 0.55 } }
    .sending { animation: pressFlash 400ms ease-in-out 2; }
  </style>
</head>
<body class="min-h-screen text-slate-200 antialiased">
  <div class="max-w-md mx-auto px-5 pt-7 pb-7 min-h-screen flex flex-col">

    <header class="flex items-center gap-2.5">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-500 to-cyan-600 grid place-items-center shadow-lg shadow-sky-500/30">
        <span class="material-symbols-outlined text-white" style="font-size:20px">ac_unit</span>
      </div>
      <div>
        <div class="font-semibold text-white leading-tight">Aircon IR Remote</div>
        <div class="text-[11px] text-slate-500 mono">ESP32-C3 · IR LED · TCL112AC replay</div>
      </div>
      <span class="ml-auto inline-flex items-center gap-1.5 text-[10px] uppercase tracking-wider text-slate-500">
        <span id="connDot" class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
        <span id="connText">connecting</span>
      </span>
    </header>

    <div class="flex-1 flex flex-col items-stretch justify-center gap-4 py-6">

      <!-- Power row -->
      <div class="relative">
        <div class="ambient-glow absolute -inset-4 rounded-3xl bg-gradient-to-br from-sky-500/25 to-cyan-500/15 blur-2xl pointer-events-none"></div>
        <div class="relative grid grid-cols-2 gap-3">
          <button class="key key-on rounded-2xl py-5 px-3 grid place-items-center gap-1" data-cmd="power_on" aria-label="Power on">
            <span class="material-symbols-outlined text-white" style="font-size:36px">power_settings_new</span>
            <span class="text-white font-extrabold tracking-[0.16em] text-xs">POWER ON</span>
          </button>
          <button class="key key-off rounded-2xl py-5 px-3 grid place-items-center gap-1" data-cmd="power_off" aria-label="Power off">
            <span class="material-symbols-outlined text-slate-300" style="font-size:36px">power_off</span>
            <span class="text-slate-200 font-extrabold tracking-[0.16em] text-xs">POWER OFF</span>
          </button>
        </div>
      </div>

      <!-- Temp row -->
      <div class="grid grid-cols-2 gap-3">
        <button class="key key-slate rounded-2xl py-5 px-3 grid place-items-center gap-1" data-cmd="temp_down" aria-label="Temp down">
          <span class="material-symbols-outlined text-sky-300" style="font-size:34px">remove</span>
          <span class="text-slate-300 font-bold tracking-[0.16em] text-xs">TEMP −</span>
        </button>
        <button class="key key-slate rounded-2xl py-5 px-3 grid place-items-center gap-1" data-cmd="temp_up" aria-label="Temp up">
          <span class="material-symbols-outlined text-sky-300" style="font-size:34px">add</span>
          <span class="text-slate-300 font-bold tracking-[0.16em] text-xs">TEMP +</span>
        </button>
      </div>

      <!-- Swing row -->
      <button class="key key-slate rounded-2xl py-5 px-3 grid place-items-center gap-1" data-cmd="swing" aria-label="Swing">
        <span class="material-symbols-outlined text-sky-300" style="font-size:34px">swap_vert</span>
        <span class="text-slate-300 font-bold tracking-[0.16em] text-xs">SWING</span>
      </button>

    </div>

    <div class="rounded-2xl bg-white/[0.03] border border-white/[0.05] overflow-hidden">
      <div class="px-4 py-3 flex items-center gap-3 text-xs">
        <span id="statusDot" class="w-2 h-2 rounded-full bg-slate-600"></span>
        <span id="statusText" class="mono text-slate-400 flex-1 truncate">tap a button to fire IR</span>
        <span class="mono text-slate-600 text-[10px]" id="lastTime"></span>
      </div>
      <div class="px-4 py-3 border-t border-white/[0.05] grid grid-cols-3 gap-2 text-[10px] mono uppercase tracking-[0.16em] text-slate-500">
        <div>
          <div class="text-slate-600">last cmd</div>
          <div class="text-slate-300 text-sm normal-case tracking-normal mt-0.5" id="diagLast">—</div>
        </div>
        <div>
          <div class="text-slate-600">sends</div>
          <div class="text-slate-300 text-sm normal-case tracking-normal mt-0.5" id="diagCount">—</div>
        </div>
        <div>
          <div class="text-slate-600">duration</div>
          <div class="text-slate-300 text-sm normal-case tracking-normal mt-0.5" id="diagMs">—</div>
        </div>
      </div>
    </div>

    <p class="text-[10px] text-slate-600 mt-4 text-center">
      Charlie's DIY aircon controller · ESP32-C3 + IR transmitter module
    </p>
  </div>

  <script type="module">
    import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
    import { getAuth, signInAnonymously }     from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const app = initializeApp({
      apiKey: "AIzaSyB8ahT56WbEUaGAymsRNNA-DrfZnUnWIwk",
      authDomain: "test-database-55379.firebaseapp.com",
      databaseURL: "https://test-database-55379-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "test-database-55379"
    });
    const db   = getDatabase(app);
    const auth = getAuth(app);
    signInAnonymously(auth).catch(e => console.warn("anon signin failed:", e));

    const $ = id => document.getElementById(id);
    const connDot   = $("connDot"),   connText   = $("connText");
    const statusDot = $("statusDot"), statusText = $("statusText"), lastTime = $("lastTime");
    const diagLast  = $("diagLast"),  diagCount  = $("diagCount"),  diagMs   = $("diagMs");
    const buttons   = document.querySelectorAll("button[data-cmd]");

    onValue(ref(db, ".info/connected"), snap => {
      const ok = snap.val() === true;
      connDot.className = "w-1.5 h-1.5 rounded-full " + (ok ? "bg-emerald-400" : "bg-slate-600");
      connText.textContent = ok ? "online" : "offline";
    });

    const stateColors = { send:"bg-amber-400", ok:"bg-emerald-400", err:"bg-rose-500", idle:"bg-slate-600" };
    function setStatus(state, msg) {
      statusDot.className = "w-2 h-2 rounded-full " + stateColors[state];
      statusText.textContent = msg;
    }

    let lastKnownCount = 0;
    onValue(ref(db, "aircon/ir/state"), snap => {
      const v = snap.val();
      if (!v || typeof v !== "object") return;
      diagLast.textContent  = v.last || "—";
      diagCount.textContent = (v.count|0) ? "#" + (v.count|0) : "—";
      diagMs.textContent    = (v.duration_ms|0) ? (v.duration_ms|0) + " ms" : "—";
      if ((v.count|0) > lastKnownCount) {
        lastKnownCount = v.count|0;
        setStatus("ok", (v.last || "sent") + " · " + (v.duration_ms|0) + " ms");
      }
    });

    async function fire(cmd, btn) {
      if (navigator.vibrate) navigator.vibrate(cmd.startsWith("power") ? 15 : 8);
      btn.classList.add("sending");
      buttons.forEach(b => b.disabled = true);
      setStatus("send", "sending " + cmd + "…");
      try {
        await set(ref(db, "aircon/ir/command"), { cmd });
        lastTime.textContent = new Date().toLocaleTimeString();
      } catch (err) {
        console.error(err);
        setStatus("err", "failed: " + (err.message || err.code || err));
      } finally {
        setTimeout(() => {
          btn.classList.remove("sending");
          buttons.forEach(b => b.disabled = false);
        }, 700);
      }
    }

    buttons.forEach(b => b.addEventListener("click", () => fire(b.dataset.cmd, b)));
  </script>
</body>
</html>
