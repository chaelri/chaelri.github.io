<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Vows · for Karla</title>
<meta name="theme-color" content="#faf9f6" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- lock screen (shown on first visit until correct code is entered) -->
<div id="lock" class="lock-overlay" aria-hidden="false">
  <div class="lock-card">
    <span class="material-symbols-rounded lock-icon">lock</span>
    <div class="lock-title">private</div>
    <div class="lock-sub">just for Charlie · enter the code</div>
    <form id="lockForm" class="lock-form" autocomplete="off">
      <input id="lockInput" type="password" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" maxlength="8" aria-label="passcode" />
      <button type="submit" class="solid-btn lock-btn">unlock</button>
    </form>
    <div id="lockError" class="lock-error">wrong code · try again</div>
  </div>
</div>

<!-- ambient backdrop -->
<div class="bg-veil"></div>
<canvas id="petals" class="petals"></canvas>

<div class="app">

  <!-- top header -->
  <header class="topbar">
    <div class="brand">
      <span class="material-symbols-rounded brand-icon">favorite</span>
      <div class="brand-text">
        <div class="brand-label">vows</div>
        <div class="brand-sub">for Karla · 07.02.26</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="stats">
        <div class="stat">
          <div id="statEntries" class="stat-value">0</div>
          <div class="stat-label">entries</div>
        </div>
        <div class="stat">
          <div id="statWords" class="stat-value">0</div>
          <div class="stat-label">words</div>
        </div>
        <div class="stat">
          <div id="statTime" class="stat-value">0:00</div>
          <div class="stat-label">speech</div>
        </div>
      </div>
      <div id="syncDot" class="sync-dot" title="connecting…"></div>
    </div>
  </header>

  <!-- scrollable feed -->
  <main id="feed" class="feed">
    <div id="feedEmpty" class="feed-empty" hidden>
      <div class="feed-empty-title">nothing here yet</div>
      <div class="feed-empty-sub">start with whatever's on your heart — every line, every joke, every thought.</div>
    </div>
  </main>

  <!-- composer -->
  <footer class="composer">
    <form id="addForm" class="composer-form" autocomplete="off">
      <textarea id="composerInput" placeholder="write what's on your heart…&#10;(Enter to save · Shift+Enter for a new line)" rows="3"></textarea>
      <button type="submit" class="composer-btn" title="Save">
        <span class="material-symbols-rounded">arrow_upward</span>
      </button>
    </form>
  </footer>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
