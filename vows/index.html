<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Vows · for Karla</title>
<meta name="theme-color" content="#faf9f6" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- lock screen (shown on first visit until correct code is entered) -->
<div id="lock" class="lock-overlay" aria-hidden="false">
  <div class="lock-card">
    <span class="material-symbols-rounded lock-icon">lock</span>
    <div class="lock-title">private</div>
    <div class="lock-sub">just for Charlie · enter the code</div>
    <form id="lockForm" class="lock-form" autocomplete="off">
      <input id="lockInput" type="password" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" maxlength="8" aria-label="passcode" />
      <button type="submit" class="solid-btn lock-btn">unlock</button>
    </form>
    <div id="lockError" class="lock-error">wrong code · try again</div>
  </div>
</div>

<!-- ambient backdrop -->
<div class="bg-veil"></div>
<canvas id="petals" class="petals"></canvas>

<!-- top bar -->
<header class="topbar">
  <div class="brand">
    <span class="material-symbols-rounded brand-icon">favorite</span>
    <div class="brand-text">
      <div class="brand-label">vows</div>
      <div class="brand-sub">for Karla · 07.02.26</div>
    </div>
  </div>
  <div class="topbar-actions">
    <button id="addSectionBtn" class="pill-btn" title="Add section">
      <span class="material-symbols-rounded">add</span>
      <span class="pill-label">section</span>
    </button>
    <div id="syncDot" class="sync-dot" title="connecting…"></div>
  </div>
</header>

<!-- mindmap canvas -->
<main class="stage">
  <svg id="connectors" class="connectors" preserveAspectRatio="none"></svg>
  <div id="map" class="map">
    <div id="center" class="center-node">
      <div class="center-ring"></div>
      <div class="center-inner">
        <div class="center-monogram">K</div>
        <div class="center-name">Karla</div>
        <div class="center-tag">my forever</div>
      </div>
    </div>
    <!-- section nodes are injected here -->
  </div>
</main>

<!-- section panel (slides in) -->
<aside id="panel" class="panel" aria-hidden="true">
  <div class="panel-head">
    <div class="panel-title-wrap">
      <span id="panelIcon" class="material-symbols-rounded panel-icon">favorite</span>
      <div>
        <div id="panelTitle" class="panel-title" contenteditable="false">Section</div>
        <div id="panelCount" class="panel-count">0 entries</div>
      </div>
    </div>
    <div class="panel-actions">
      <button id="renameSectionBtn" class="ghost-btn" title="Rename"><span class="material-symbols-rounded">edit</span></button>
      <button id="deleteSectionBtn" class="ghost-btn ghost-btn--danger" title="Delete section"><span class="material-symbols-rounded">delete</span></button>
      <button id="closePanelBtn" class="ghost-btn" title="Close"><span class="material-symbols-rounded">close</span></button>
    </div>
  </div>

  <div id="itemList" class="item-list">
    <!-- items injected -->
  </div>

  <form id="addItemForm" class="add-item">
    <textarea id="itemInput" placeholder="write what's on your heart…&#10;(Enter to save · Shift+Enter for a new line)" rows="3"></textarea>
    <button type="submit" class="add-btn" title="Save">
      <span class="material-symbols-rounded">arrow_upward</span>
    </button>
  </form>
</aside>

<div id="panelScrim" class="panel-scrim"></div>

<!-- add-section modal -->
<div id="modal" class="modal" aria-hidden="true">
  <div class="modal-card">
    <div class="modal-head">
      <div id="modalTitle" class="modal-title">New section</div>
      <button id="modalClose" class="ghost-btn"><span class="material-symbols-rounded">close</span></button>
    </div>
    <form id="modalForm" class="modal-body">
      <label class="field">
        <span class="field-label">name</span>
        <input id="sectionName" type="text" placeholder="e.g. things I love about her" maxlength="40" required />
      </label>
      <div class="field">
        <span class="field-label">color</span>
        <div id="hueRow" class="hue-row">
          <button type="button" class="hue-chip" data-hue="sage" style="--c:#7b8a5b"></button>
          <button type="button" class="hue-chip" data-hue="rose" style="--c:#d4889a"></button>
          <button type="button" class="hue-chip" data-hue="peach" style="--c:#e6a37a"></button>
          <button type="button" class="hue-chip" data-hue="amber" style="--c:#c89b4d"></button>
          <button type="button" class="hue-chip" data-hue="lilac" style="--c:#b893c8"></button>
          <button type="button" class="hue-chip" data-hue="sky" style="--c:#7aaecc"></button>
          <button type="button" class="hue-chip" data-hue="emerald" style="--c:#6fa885"></button>
        </div>
      </div>
      <div class="field">
        <span class="field-label">icon</span>
        <div id="iconRow" class="icon-row">
          <button type="button" class="icon-chip" data-icon="favorite"><span class="material-symbols-rounded">favorite</span></button>
          <button type="button" class="icon-chip" data-icon="mood"><span class="material-symbols-rounded">mood</span></button>
          <button type="button" class="icon-chip" data-icon="format_quote"><span class="material-symbols-rounded">format_quote</span></button>
          <button type="button" class="icon-chip" data-icon="playlist_add_check"><span class="material-symbols-rounded">playlist_add_check</span></button>
          <button type="button" class="icon-chip" data-icon="auto_awesome"><span class="material-symbols-rounded">auto_awesome</span></button>
          <button type="button" class="icon-chip" data-icon="lightbulb"><span class="material-symbols-rounded">lightbulb</span></button>
          <button type="button" class="icon-chip" data-icon="celebration"><span class="material-symbols-rounded">celebration</span></button>
          <button type="button" class="icon-chip" data-icon="psychology"><span class="material-symbols-rounded">psychology</span></button>
          <button type="button" class="icon-chip" data-icon="bookmark"><span class="material-symbols-rounded">bookmark</span></button>
          <button type="button" class="icon-chip" data-icon="theater_comedy"><span class="material-symbols-rounded">theater_comedy</span></button>
          <button type="button" class="icon-chip" data-icon="self_improvement"><span class="material-symbols-rounded">self_improvement</span></button>
          <button type="button" class="icon-chip" data-icon="local_florist"><span class="material-symbols-rounded">local_florist</span></button>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" id="modalCancel" class="ghost-btn ghost-btn--wide">cancel</button>
        <button type="submit" class="solid-btn">save</button>
      </div>
    </form>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
