<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devotion — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Google Sans Flex', system-ui, sans-serif;
      background: #0b1220;
      color: #e6edf7;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    .admin-header {
      padding: 40px 24px 20px;
      max-width: 700px;
      margin: 0 auto;
    }
    .admin-brand {
      font-family: "Editors Note", serif;
      font-style: italic;
      font-size: 1.6rem;
      opacity: 0.4;
      margin-bottom: 16px;
    }
    .admin-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .admin-subtitle {
      font-size: 14px;
      opacity: 0.4;
      margin-top: 4px;
    }

    .admin-stats {
      display: flex;
      gap: 12px;
      padding: 20px 24px;
      max-width: 700px;
      margin: 0 auto;
    }
    .stat-card {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
    }
    .stat-num {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #486bec, #db2777);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.4;
      margin-top: 4px;
      font-weight: 600;
    }

    .admin-list {
      padding: 12px 24px;
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .user-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 16px 18px;
      transition: background 0.15s;
    }
    .user-card:hover { background: rgba(255,255,255,0.06); }

    .user-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .user-name {
      font-size: 16px;
      font-weight: 700;
    }
    .user-time {
      font-size: 11px;
      opacity: 0.35;
    }

    .user-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .user-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(200,48,134,0.12);
      border: 1px solid rgba(200,48,134,0.2);
      border-radius: 20px;
      padding: 3px 10px 3px 6px;
      font-size: 11px;
      font-weight: 600;
      color: #e060a8;
    }
    .user-chip .material-icons { font-size: 13px; }
    .user-chip.blue {
      background: rgba(72,107,236,0.12);
      border-color: rgba(72,107,236,0.2);
      color: #7b9cf7;
    }

    .user-notes {
      font-size: 12px;
      line-height: 1.5;
      opacity: 0.4;
      font-style: italic;
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .user-status .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .dot.green { background: #22c55e; }
    .dot.yellow { background: #eab308; }
    .dot.red { background: #ef4444; }

    .admin-loading {
      text-align: center;
      padding: 60px 24px;
      opacity: 0.3;
      font-size: 14px;
    }

    .admin-actions {
      padding: 16px 24px;
      max-width: 700px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }
    .admin-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Google Sans Flex', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .admin-btn.primary {
      background: linear-gradient(135deg, #486bec, #db2777);
      color: #fff;
    }
    .admin-btn.ghost {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
    }
    .admin-btn .material-icons { font-size: 16px; }
    .admin-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1f2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .admin-toast.show { opacity: 1; }

    /* Composer */
    .composer {
      padding: 0 24px 8px;
      max-width: 700px;
      margin: 0 auto;
    }
    .composer[hidden] { display: none !important; }
    .composer-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: slideDown 0.25s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .composer-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .composer-title {
      font-size: 15px;
      font-weight: 700;
      flex: 1;
    }
    .composer-close {
      background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer;
      display: flex; padding: 4px;
    }
    .composer-close .material-icons { font-size: 20px; }
    .composer-field label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.4;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .composer-field input,
    .composer-field textarea {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e6edf7;
      font-size: 14px;
      padding: 10px 14px;
      font-family: 'Google Sans Flex', sans-serif;
      outline: none;
      resize: none;
    }
    .composer-field input:focus,
    .composer-field textarea:focus {
      border-color: rgba(219,39,119,0.4);
    }
    .composer-targets {
      display: flex;
      gap: 16px;
    }
    .target-option {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      cursor: pointer;
      opacity: 0.7;
    }
    .target-option input { accent-color: #db2777; }
    .target-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .target-list[hidden] { display: none !important; }
    .target-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .target-chip.selected {
      background: rgba(219,39,119,0.15);
      border-color: rgba(219,39,119,0.4);
      color: #e060a8;
    }
    .composer-send {
      width: 100%;
      justify-content: center;
      padding: 12px !important;
      font-size: 14px !important;
      border-radius: 12px;
    }

    /* Send button on user cards */
    .user-send-btn {
      background: none; border: none; color: rgba(255,255,255,0.25);
      cursor: pointer; padding: 4px; display: flex; align-items: center;
      border-radius: 6px; transition: color 0.15s;
    }
    .user-send-btn:hover { color: #db2777; }
    .user-send-btn .material-icons { font-size: 18px; }
  </style>
  <style>
    @font-face {
      font-family: "Editors Note";
      src: url("assets/EditorsNote-Italic.ttf") format("truetype");
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="admin-header">
    <div class="admin-brand">devotion.</div>
    <div class="admin-title">Subscribers</div>
    <div class="admin-subtitle" id="lastUpdated"></div>
  </div>

  <div class="admin-stats" id="statsRow">
    <div class="stat-card">
      <div class="stat-num" id="totalSubs">—</div>
      <div class="stat-label">Subscribers</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="activeToday">—</div>
      <div class="stat-label">Active Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="activeWeek">—</div>
      <div class="stat-label">This Week</div>
    </div>
  </div>

  <div class="admin-actions">
    <button class="admin-btn primary" onclick="openComposer()">
      <span class="material-icons">campaign</span> Broadcast
    </button>
    <button class="admin-btn ghost" onclick="sendTestPush()">
      <span class="material-icons">notifications</span> AI nudge
    </button>
    <button class="admin-btn ghost" onclick="loadData()">
      <span class="material-icons">refresh</span> Refresh
    </button>
  </div>

  <!-- Broadcast Composer -->
  <div class="composer" id="composer" hidden>
    <div class="composer-card">
      <div class="composer-header">
        <span class="material-icons" style="color:#db2777">campaign</span>
        <span class="composer-title">Broadcast Message</span>
        <button class="composer-close" onclick="closeComposer()"><span class="material-icons">close</span></button>
      </div>
      <div class="composer-field">
        <label>Title</label>
        <input type="text" id="bcTitle" value="Devotion" placeholder="Notification title">
      </div>
      <div class="composer-field">
        <label>Message</label>
        <textarea id="bcBody" rows="3" placeholder="Type your announcement..."></textarea>
      </div>
      <div class="composer-field">
        <label>Send to</label>
        <div class="composer-targets" id="bcTargets">
          <label class="target-option">
            <input type="radio" name="bcTarget" value="all" checked onchange="toggleTargetList()"> Everyone
          </label>
          <label class="target-option">
            <input type="radio" name="bcTarget" value="specific" onchange="toggleTargetList()"> Specific people
          </label>
        </div>
        <div class="target-list" id="targetList" hidden></div>
      </div>
      <button class="admin-btn primary composer-send" onclick="sendBroadcast()">
        <span class="material-icons">send</span> Send broadcast
      </button>
    </div>
  </div>

  <div class="admin-list" id="userList">
    <div class="admin-loading">Loading subscribers...</div>
  </div>

  <div class="admin-toast" id="toast"></div>

  <script>
    const API = "https://gemini-proxy-668755364170.asia-southeast1.run.app";
    let allSubscribers = [];

    function timeAgo(ts) {
      if (!ts) return "Never";
      const diff = Date.now() - ts;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return "Just now";
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      const days = Math.floor(hrs / 24);
      return `${days}d ago`;
    }

    function activityStatus(lastVisit) {
      if (!lastVisit) return { cls: "red", label: "No activity" };
      const hrs = (Date.now() - lastVisit) / 3600000;
      if (hrs < 6) return { cls: "green", label: "Active" };
      if (hrs < 24) return { cls: "yellow", label: "Today" };
      return { cls: "red", label: timeAgo(lastVisit) };
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }

    function esc(s) {
      return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // ── AI nudge (test push) ──
    async function sendTestPush() {
      showToast("Sending AI nudges...");
      try {
        const res = await fetch(API + "/test-push", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({}),
        });
        const data = await res.json();
        showToast(`Sent ${data.sent} AI nudge${data.sent !== 1 ? "s" : ""}`);
      } catch (e) {
        showToast("Failed to send");
      }
    }

    // ── Composer ──
    function openComposer(prefillName) {
      document.getElementById("composer").hidden = false;
      document.getElementById("bcBody").value = "";
      document.getElementById("bcTitle").value = "Devotion";
      // Build target chips
      const targetList = document.getElementById("targetList");
      targetList.innerHTML = allSubscribers.map(s =>
        `<div class="target-chip" data-name="${esc(s.name)}" onclick="this.classList.toggle('selected')">${esc(s.name)}</div>`
      ).join("");
      // If opened for specific person, pre-select them
      if (prefillName) {
        document.querySelector('input[name="bcTarget"][value="specific"]').checked = true;
        toggleTargetList();
        targetList.querySelectorAll(".target-chip").forEach(c => {
          if (c.dataset.name === prefillName) c.classList.add("selected");
        });
      } else {
        document.querySelector('input[name="bcTarget"][value="all"]').checked = true;
        toggleTargetList();
      }
      document.getElementById("bcBody").focus();
    }

    function closeComposer() {
      document.getElementById("composer").hidden = true;
    }

    function toggleTargetList() {
      const isSpecific = document.querySelector('input[name="bcTarget"]:checked').value === "specific";
      document.getElementById("targetList").hidden = !isSpecific;
    }

    async function sendBroadcast() {
      const title = document.getElementById("bcTitle").value.trim() || "Devotion";
      const body = document.getElementById("bcBody").value.trim();
      if (!body) { showToast("Write a message first"); return; }

      const isAll = document.querySelector('input[name="bcTarget"]:checked').value === "all";
      let targets = null;
      if (!isAll) {
        targets = [...document.querySelectorAll(".target-chip.selected")].map(c => c.dataset.name);
        if (!targets.length) { showToast("Select at least one person"); return; }
      }

      showToast("Sending...");
      try {
        const res = await fetch(API + "/broadcast", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, body, targets }),
        });
        const data = await res.json();
        showToast(`Broadcast sent to ${data.sent} subscriber${data.sent !== 1 ? "s" : ""}`);
        closeComposer();
      } catch (e) {
        showToast("Failed to send broadcast");
      }
    }

    // ── Quick send to specific person ──
    function quickSend(name) {
      openComposer(name);
    }

    // ── Load data ──
    async function loadData() {
      const list = document.getElementById("userList");
      list.innerHTML = '<div class="admin-loading">Loading...</div>';

      try {
        const res = await fetch(API + "/admin-stats");
        const data = await res.json();
        allSubscribers = data.subscribers;

        document.getElementById("totalSubs").textContent = data.total;
        document.getElementById("lastUpdated").textContent = `Updated ${new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })}`;

        const now = Date.now();
        const dayAgo = now - 24 * 3600000;
        const weekAgo = now - 7 * 24 * 3600000;
        document.getElementById("activeToday").textContent = data.subscribers.filter(s => s.lastVisit > dayAgo).length;
        document.getElementById("activeWeek").textContent = data.subscribers.filter(s => s.lastVisit > weekAgo).length;

        if (!data.subscribers.length) {
          list.innerHTML = '<div class="admin-loading">No subscribers yet</div>';
          return;
        }

        list.innerHTML = data.subscribers.map(s => {
          const status = activityStatus(s.lastVisit);
          const visitStr = s.lastVisit ? new Date(s.lastVisit).toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }) : "Never";
          return `
            <div class="user-card">
              <div class="user-top">
                <div class="user-name">${esc(s.name)}</div>
                <div style="display:flex;align-items:center;gap:8px;">
                  <button class="user-send-btn" onclick="quickSend('${esc(s.name)}')" title="Send to ${esc(s.name)}">
                    <span class="material-icons">send</span>
                  </button>
                  <div class="user-status"><span class="dot ${status.cls}"></span> ${status.label}</div>
                </div>
              </div>
              <div class="user-meta">
                ${s.lastPassage ? `<span class="user-chip blue"><span class="material-icons">menu_book</span>${esc(s.lastPassage)}</span>` : ""}
                <span class="user-chip"><span class="material-icons">schedule</span>${visitStr}</span>
              </div>
              ${s.notes ? `<div class="user-notes">${esc(s.notes.slice(0, 200))}</div>` : ""}
            </div>
          `;
        }).join("");
      } catch (e) {
        list.innerHTML = `<div class="admin-loading">Error: ${e.message}</div>`;
      }
    }

    loadData();
  </script>
</body>
</html>
