<!doctype html>
<html lang="en">
  <head>
    <base target="_top" />
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <title>Devotion</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icons/icon-192.png" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <meta name="theme-color" content="#0b1220" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Monsieur+La+Doulaise&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="layout layout-unset">
      <div id="app-splash" class="splash-screen">
        <div class="splash-logo">devotion.</div>
      </div>
      <div class="main">
        <div id="topActions" style="padding: 4rem 16px 0">
          <button id="homeBtn" class="secondary" hidden>
            <span class="material-symbols-outlined"> home </span> Back to Home
          </button>
        </div>
        <div class="controls smart-header">
          <div class="control">
            <div class="control-label">Book</div>
            <select id="book"></select>
          </div>

          <div class="control">
            <div class="control-label">Chapter</div>
            <select id="chapter"></select>
          </div>

          <div class="control">
            <div class="control-label">Verse</div>
            <select id="verse">
              <option value="">All verses</option>
            </select>
          </div>

          <button id="load" class="primary">Search</button>

          <div class="control" id="versionControl">
            <div class="control-label">Version</div>
            <select id="versionSelect">
              <option value="NASB">NASB 2020</option>
              <option value="EASY">EASY 2024</option>
            </select>
          </div>
          <div class="flex" style="gap:8px;">
            <button id="prevChapterBtn" class="secondary hidden">
              <span class="material-symbols-outlined"> navigate_before </span>
            </button>

            <button id="nextChapterBtn" class="secondary hidden">
              <span class="material-symbols-outlined"> navigate_next </span>
            </button>

            <button id="ttsPlayBtn" class="secondary hidden">
              <span class="material-symbols-outlined">headphones</span>
            </button>

              <div id="mode-toggle" class="mode-toggle">
            <span class="material-symbols-outlined">light_mode</span>
          </div>
          </div>

        
        </div>

        <div id="passageTitle" class="passage-title" hidden></div>

        <div id="output" class="bible"></div>
      </div>

      <aside class="summary">
        <div id="aiContextSummary"></div>
        <button id="toggleReflectionBtn" hidden>
          🙏 Show Guided Reflection
        </button>

        <div id="aiReflection"></div>
        <div id="summaryTitle" class="summary-title" hidden></div>

        <div id="summaryContent">
          Select a verse, range, or chapter to see notes.
        </div>
        <button id="copyNotesBtn" style="margin-top: 12px">
          📋 Copy Notes
        </button>
        <div id="notesCopyStatus"></div>
      </aside>
    </div>
    <button id="scrollTopBtn" class="scroll-top-btn" aria-label="Scroll to top">
      <span class="material-symbols-outlined">arrow_upward</span>
    </button>

    <div id="modalOverlay" class="modal-overlay" hidden>
      <div class="modal-card">
        <button id="modalClose" class="modal-close">✕</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <div id="ttsPlayer" class="tts-player" hidden>
      <div id="ttsProgressBar" class="tts-progress-bar"></div>
      <span id="ttsPassage" class="tts-passage"></span>
      <div class="tts-controls">
        <button id="ttsPrevBtn" class="tts-btn">
          <span class="material-symbols-outlined">skip_previous</span>
        </button>
        <button id="ttsPauseBtn" class="tts-btn">
          <span class="material-symbols-outlined">pause</span>
        </button>
        <button id="ttsNextBtn" class="tts-btn">
          <span class="material-symbols-outlined">skip_next</span>
        </button>
        <span id="ttsStatus"></span>
        <button id="ttsCloseBtn" class="tts-btn tts-close">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
    </div>

    <!-- TTS IMMERSIVE OVERLAY -->
    <div id="ttsImmersive" class="tts-immersive" hidden>
      <!-- Top bar -->
      <div class="tts-imm-bar">
        <div class="tts-imm-header-info">
          <div class="tts-imm-label">NOW PLAYING</div>
          <div class="tts-imm-title" id="ttsImmTitle"></div>
        </div>
        <button class="tts-imm-close-btn" id="ttsImmCloseBtn">
          <span class="material-symbols-outlined">keyboard_arrow_down</span>
        </button>
      </div>

      <!-- Verse stage -->
      <div class="tts-imm-stage">
        <div class="tts-imm-slot tts-imm-slot-prev" id="ttsImmSlotPrev">
          <span class="tts-imm-slot-num" id="ttsImmPrevNum"></span>
          <p class="tts-imm-slot-text" id="ttsImmPrevText"></p>
        </div>
        <div class="tts-imm-slot tts-imm-slot-cur" id="ttsImmSlotCur">
          <span class="tts-imm-slot-num" id="ttsImmCurNum"></span>
          <p class="tts-imm-slot-text" id="ttsImmCurText"></p>
          <div class="tts-imm-heart" id="ttsImmHeart">
            <span class="material-icons">favorite</span>
          </div>
        </div>
        <div class="tts-imm-slot tts-imm-slot-next" id="ttsImmSlotNext">
          <span class="tts-imm-slot-num" id="ttsImmNextNum"></span>
          <p class="tts-imm-slot-text" id="ttsImmNextText"></p>
        </div>
      </div>

      <!-- Footer: load bar + scrubber + controls -->
      <div class="tts-imm-footer">
        <div class="tts-imm-load-bar-wrap">
          <div class="tts-imm-load-bar" id="ttsImmLoadBar"></div>
        </div>
        <div class="tts-imm-scrubber-wrap">
          <div class="tts-imm-scrubber" id="ttsImmScrubber"></div>
        </div>
        <div class="tts-imm-controls">
          <button class="tts-imm-btn" id="ttsImmPrevBtn">
            <span class="material-symbols-outlined">skip_previous</span>
          </button>
          <button class="tts-imm-btn tts-imm-btn-play" id="ttsImmPauseBtn">
            <span class="material-symbols-outlined">pause</span>
          </button>
          <button class="tts-imm-btn" id="ttsImmNextBtn">
            <span class="material-symbols-outlined">skip_next</span>
          </button>
        </div>
        <div class="tts-imm-hint" id="ttsImmStatusEl"></div>
        <button id="ttsImmReflectBtn" class="tts-imm-reflect-btn" hidden>
          🙏 Guided Reflection
        </button>
      </div>

      <!-- Verse reference popup -->
      <div id="ttsImmVersePopup" class="tts-imm-verse-popup" hidden>
        <div class="tts-imm-verse-popup-backdrop" id="ttsImmVersePopupBackdrop"></div>
        <div class="tts-imm-verse-popup-card">
          <button class="tts-imm-verse-popup-close" id="ttsImmVersePopupClose">
            <span class="material-symbols-outlined">close</span>
          </button>
          <div class="tts-imm-verse-popup-content" id="ttsImmVersePopupContent"></div>
        </div>
      </div>

      <!-- Reflection panel (replaces stage+footer when open) -->
      <div id="ttsImmReflPanel" class="tts-imm-refl-panel" hidden>
        <div class="tts-imm-refl-top">
          <div class="tts-imm-refl-label">GUIDED REFLECTION</div>
          <div class="tts-imm-refl-progress" id="ttsImmReflProgress"></div>
        </div>
        <div class="tts-imm-refl-question" id="ttsImmReflQuestion"></div>
        <textarea class="tts-imm-refl-area" id="ttsImmReflArea" placeholder="Write your thoughts here..."></textarea>
        <div class="tts-imm-refl-actions">
          <button class="tts-imm-refl-back-btn" id="ttsImmReflBack">← Back</button>
          <button class="tts-imm-refl-next-btn" id="ttsImmReflNext">Next →</button>
          <button class="tts-imm-refl-copy-btn" id="ttsImmReflCopy" hidden>📋 Copy Notes</button>
        </div>
        <div class="tts-imm-refl-status" id="ttsImmReflStatus"></div>
      </div>
    </div>

    <script src="config.js" onerror="void 0"></script>
    <script src="bible-meta.js"></script>
    <script src="script.js"></script>
  </body>
</html>
