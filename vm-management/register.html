<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Production — Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  </head>
  <body class="bg-neutral-950 min-h-screen flex items-center justify-center p-4" style="font-family:'Inter',sans-serif;">
    <div id="main-card" class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-6 md:p-8 overflow-hidden">
      <!-- Header -->
      <div class="flex items-center justify-center mb-2">
        <div class="bg-neutral-900 rounded-full w-12 h-12 flex items-center justify-center p-1">
          <img src="ccf-logo.png" alt="CCF Logo" class="h-9 w-9 object-contain" />
        </div>
      </div>
      <h1 class="text-xl font-bold text-center text-neutral-900 tracking-tight mb-0.5">Live Production</h1>
      <p class="text-xs text-center text-neutral-400 font-medium tracking-wide uppercase mb-3">Volunteer Registration</p>
      <hr class="border-neutral-200 mb-5 mx-8" />

      <!-- Tab switcher -->
      <div class="flex gap-2 mb-5">
        <button id="tab-volunteer" class="flex-1 py-2 text-sm font-semibold rounded-lg bg-neutral-900 text-white transition duration-150">Volunteer</button>
        <button id="tab-guest" class="flex-1 py-2 text-sm font-semibold rounded-lg bg-neutral-100 text-neutral-500 hover:bg-neutral-200 transition duration-150">Guest</button>
      </div>

      <!-- Register Form -->
      <div id="stage-register">
        <form id="register-form" class="space-y-4">
          <input type="hidden" id="register-type" value="volunteer" />

          <div class="relative">
            <label for="register-name" class="block text-xs uppercase tracking-widest text-neutral-400 font-semibold mb-1">Full Name</label>
            <input
              type="text"
              id="register-name"
              required
              autocomplete="off"
              placeholder="e.g., Juan Dela Cruz"
              class="block w-full px-3 py-2.5 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:border-neutral-900 sm:text-sm"
            />
            <div id="name-suggestions" class="absolute z-10 left-0 right-0 top-full mt-1 bg-white border border-neutral-200 rounded-lg shadow-lg max-h-40 overflow-y-auto hidden"></div>
            <p id="name-match-msg" class="text-xs mt-1 hidden"></p>
          </div>

          <div id="register-team-group">
            <label class="block text-xs uppercase tracking-widest text-neutral-400 font-semibold mb-2">Segment <span class="text-neutral-300 normal-case tracking-normal">(multi-select)</span></label>
            <input type="hidden" id="register-team" />
            <div id="register-segment-pills" class="flex flex-wrap gap-2 justify-center"></div>
          </div>

          <div id="register-contact-group">
            <label for="register-contact" class="block text-xs uppercase tracking-widest text-neutral-400 font-semibold mb-1">Contact Number <span class="text-neutral-300">(optional)</span></label>
            <input
              type="tel"
              id="register-contact"
              placeholder="e.g., 09171234567"
              class="block w-full px-3 py-2.5 border border-neutral-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-neutral-900 focus:border-neutral-900 sm:text-sm"
            />
          </div>

          <button
            type="submit"
            id="register-submit-btn"
            class="w-full py-3 bg-neutral-900 text-white font-bold rounded-lg shadow-md hover:bg-neutral-700 transition duration-150"
          >
            Register & Generate QR
          </button>
        </form>
      </div>

      <!-- QR Result -->
      <div id="stage-qr-result" class="hidden text-center">
        <span class="material-icons-round text-neutral-800 text-4xl">how_to_reg</span>
        <h2 id="qr-result-title" class="text-xl font-bold text-neutral-900 mt-2">Registered!</h2>
        <p id="qr-result-name" class="text-neutral-500 text-sm mt-1"></p>

        <p class="text-xs text-neutral-400 mt-3 mb-4">Screenshot this QR code for future check-ins</p>

        <div class="flex justify-center mb-4">
          <div id="qr-code-output" class="inline-block p-4 bg-white border border-neutral-200 rounded-xl"></div>
        </div>

        <p id="qr-result-id" class="text-xs text-neutral-300 mb-6 font-mono"></p>

        <button
          id="register-another-btn"
          class="w-full py-3 bg-neutral-900 text-white font-bold rounded-lg shadow-md hover:bg-neutral-700 transition duration-150"
        >
          Register Another
        </button>
      </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-50 flex items-center justify-center hidden">
      <div class="flex flex-col items-center gap-4">
        <div class="bg-neutral-900 rounded-full w-12 h-12 flex items-center justify-center p-1">
          <img src="ccf-logo.png" alt="CCF" class="h-9 w-9 object-contain" />
        </div>
        <div class="text-center">
          <p class="text-base font-bold text-neutral-900">Live Production</p>
          <p class="text-xs text-neutral-400 font-medium tracking-wide uppercase">Volunteer Registration</p>
        </div>
        <div class="flex flex-col items-center gap-2 mt-2">
          <div class="sparkle-row">
            <span class="sparkle-dot"></span>
            <span class="sparkle-dot"></span>
            <span class="sparkle-dot"></span>
          </div>
          <p id="loading-text" class="text-xs text-neutral-400 font-semibold tracking-widest uppercase">Processing...</p>
        </div>
      </div>
    </div>

    <script>
      // Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyB8ahT56WbEUaGAymsRNNA-DrfZnUnWIwk",
        authDomain: "test-database-55379.firebaseapp.com",
        databaseURL: "https://test-database-55379-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "test-database-55379",
        storageBucket: "test-database-55379.firebasestorage.app",
        messagingSenderId: "933688602756",
        appId: "1:933688602756:web:392a3a4ce040cb9d4452d1",
      };
      if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      // Segments
      const segmentRoles = {
        "Audio": [], "Lights": [], "Camera": [], "Stage": [], "Graphics": [],
        "Volunteer Management": [], "Live Prod Crew": [], "Comms": [],
      };

      // Loading
      function showLoading(text = "Processing...") {
        document.getElementById("loading-text").textContent = text;
        document.getElementById("loading-overlay").classList.remove("hidden");
      }
      function hideLoading() {
        document.getElementById("loading-overlay").classList.add("hidden");
      }

      // Tab switching
      const tabVolunteer = document.getElementById("tab-volunteer");
      const tabGuest = document.getElementById("tab-guest");

      function setTab(type) {
        document.getElementById("register-type").value = type;
        document.getElementById("register-form").reset();
        document.getElementById("name-match-msg").classList.add("hidden");
        document.getElementById("name-suggestions").classList.add("hidden");

        if (type === "guest") {
          tabGuest.className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-neutral-900 text-white transition duration-150";
          tabVolunteer.className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-neutral-100 text-neutral-500 hover:bg-neutral-200 transition duration-150";
          document.getElementById("register-team-group").classList.add("hidden");
          document.getElementById("register-submit-btn").textContent = "Generate Guest QR";
        } else {
          tabVolunteer.className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-neutral-900 text-white transition duration-150";
          tabGuest.className = "flex-1 py-2 text-sm font-semibold rounded-lg bg-neutral-100 text-neutral-500 hover:bg-neutral-200 transition duration-150";
          document.getElementById("register-team-group").classList.remove("hidden");
          document.getElementById("register-submit-btn").textContent = "Register & Generate QR";
          renderSegmentPills();
        }
      }

      tabVolunteer.addEventListener("click", () => setTab("volunteer"));
      tabGuest.addEventListener("click", () => setTab("guest"));

      // Segment pills (multi-select)
      const selectedSegments = new Set();

      function renderSegmentPills() {
        const container = document.getElementById("register-segment-pills");
        container.innerHTML = "";
        selectedSegments.clear();
        document.getElementById("register-team").value = "";

        const defaultClass = "px-3 py-1.5 rounded-full text-xs font-medium border border-neutral-300 bg-white text-neutral-700 hover:bg-neutral-900 hover:text-white hover:border-neutral-900 transition duration-150";
        const activeClass = "px-3 py-1.5 rounded-full text-xs font-medium border-2 border-neutral-900 bg-neutral-900 text-white transition duration-150";

        Object.keys(segmentRoles).forEach((seg) => {
          const pill = document.createElement("button");
          pill.type = "button";
          pill.textContent = seg;
          pill.className = defaultClass;
          pill.addEventListener("click", () => {
            if (selectedSegments.has(seg)) {
              selectedSegments.delete(seg);
              pill.className = defaultClass;
            } else {
              selectedSegments.add(seg);
              pill.className = activeClass;
            }
            document.getElementById("register-team").value = [...selectedSegments].join(", ");
          });
          container.appendChild(pill);
        });
      }

      // Name autocomplete
      let allVolunteers = [];

      async function loadVolunteers() {
        try {
          const snap = await db.ref("volunteers").once("value");
          const data = snap.val() || {};
          allVolunteers = Object.entries(data).map(([id, v]) => ({ id, name: v.name || "" }));
        } catch (e) {}
      }
      loadVolunteers();

      document.getElementById("register-name").addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase().trim();
        const suggestionsEl = document.getElementById("name-suggestions");
        const matchMsg = document.getElementById("name-match-msg");
        suggestionsEl.innerHTML = "";
        matchMsg.classList.add("hidden");

        if (query.length < 2) { suggestionsEl.classList.add("hidden"); return; }

        const matches = allVolunteers.filter((v) => v.name.toLowerCase().includes(query)).slice(0, 5);
        if (matches.length === 0) { suggestionsEl.classList.add("hidden"); return; }

        suggestionsEl.classList.remove("hidden");
        matches.forEach((v) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "w-full text-left px-3 py-2 text-sm hover:bg-neutral-50 transition flex items-center justify-between";
          item.innerHTML = `<span class="font-medium text-neutral-800">${v.name}</span><span class="text-xs text-amber-600 font-medium">Already registered</span>`;
          item.addEventListener("click", () => {
            document.getElementById("register-name").value = v.name;
            suggestionsEl.classList.add("hidden");
            matchMsg.textContent = `"${v.name}" is already registered. They can scan their QR to time in.`;
            matchMsg.className = "text-xs mt-1 text-amber-600";
            matchMsg.classList.remove("hidden");
          });
          suggestionsEl.appendChild(item);
        });
      });

      document.getElementById("register-name").addEventListener("blur", () => {
        setTimeout(() => document.getElementById("name-suggestions").classList.add("hidden"), 200);
      });

      // Form submit
      document.getElementById("register-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const type = document.getElementById("register-type").value;
        const name = document.getElementById("register-name").value.trim();
        const team = document.getElementById("register-team").value.trim();
        const contact = document.getElementById("register-contact").value.trim();

        if (!name) { alert("Please enter a name."); return; }

        showLoading("Registering...");

        const prefix = type === "guest" ? "GUEST" : "VOL";
        const newId = `${prefix}-${Date.now()}-${Math.random().toString(36).substring(2, 6).toUpperCase()}`;

        try {
          const volunteerData = { name, type, registeredAt: new Date().toISOString() };
          if (type === "volunteer" && team) volunteerData.team = team;
          if (contact) volunteerData.contact = contact;

          await db.ref(`volunteers/${newId}`).set(volunteerData);

          // Show QR result
          document.getElementById("qr-result-title").textContent = type === "guest" ? "Guest Registered!" : "Volunteer Registered!";
          document.getElementById("qr-result-name").textContent = `${name}${team ? " — " + team : ""}`;
          document.getElementById("qr-result-id").textContent = `ID: ${newId}`;

          const qrContainer = document.getElementById("qr-code-output");
          qrContainer.innerHTML = "";
          new QRCode(qrContainer, { text: newId, width: 200, height: 200, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });

          document.getElementById("stage-register").classList.add("hidden");
          document.getElementById("stage-qr-result").classList.remove("hidden");

          // Refresh autocomplete cache
          loadVolunteers();

          hideLoading();
        } catch (error) {
          hideLoading();
          console.error("Registration error:", error);
          alert("Registration failed. Please try again.");
        }
      });

      // Register another
      document.getElementById("register-another-btn").addEventListener("click", () => {
        document.getElementById("stage-qr-result").classList.add("hidden");
        document.getElementById("stage-register").classList.remove("hidden");
        document.getElementById("register-form").reset();
        document.getElementById("name-match-msg").classList.add("hidden");
        setTab(document.getElementById("register-type").value);
      });

      // Init
      renderSegmentPills();
    </script>
  </body>
</html>
