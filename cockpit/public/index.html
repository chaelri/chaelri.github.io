<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <title>Claude Code Cockpit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            ink: { 950: '#0a0a0c', 900: '#101014', 800: '#16161d', 700: '#1d1d27', 600: '#252532' },
            line: { DEFAULT: '#2a2a36', soft: '#1f1f29' },
            accent: { DEFAULT: '#7aa2f7', soft: '#3d4a6b' },
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .mono { font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
    .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: #2a2a36; border-radius: 4px; }
    .scroll-thin::-webkit-scrollbar-track { background: transparent; }
    .thinking-collapsed { max-height: 1.5em; overflow: hidden; }
    .pulse-dot { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    .md p { margin: 0 0 0.5em 0; } .md p:last-child { margin-bottom: 0; }
    .md h1, .md h2, .md h3 { font-weight: 600; margin: 0.6em 0 0.3em; }
    .md h1 { font-size: 1.1em; } .md h2 { font-size: 1.05em; } .md h3 { font-size: 1em; }
    .md ul, .md ol { margin: 0.3em 0 0.5em 1.2em; }
    .md li { margin: 0.15em 0; }
    .md code { background: #0a0a0c; border: 1px solid #2a2a36; padding: 1px 4px; border-radius: 3px; font-family: ui-monospace, Menlo, monospace; font-size: 0.9em; }
    .md pre { background: #0a0a0c; border: 1px solid #2a2a36; padding: 8px 10px; border-radius: 4px; overflow-x: auto; margin: 0.4em 0; }
    .md pre code { background: transparent; border: 0; padding: 0; }
    .md a { color: #7aa2f7; text-decoration: underline; }
    .md blockquote { border-left: 3px solid #2a2a36; padding-left: 8px; color: #aaa; margin: 0.4em 0; }
  </style>
</head>
<body class="bg-ink-950 text-gray-200 min-h-screen">
  <div class="max-w-5xl mx-auto px-6 py-6">
    <header class="flex items-center justify-between mb-5">
      <div>
        <h1 class="text-lg font-semibold">Claude Code Cockpit</h1>
        <p class="text-xs text-gray-500 mono">Path #1b · <code>claude -p</code> subprocess · Max sub auth</p>
      </div>
      <div class="flex items-center gap-3 text-xs">
        <span id="ws-status" class="flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-gray-500 pulse-dot" id="ws-dot"></span>
          <span id="ws-text" class="text-gray-400">connecting…</span>
        </span>
        <span class="mono text-gray-500" title="cost of this conversation (resets with New session)">$<span id="total-cost">0.000000</span></span>
        <button id="cancel-btn" class="hidden px-2 py-1 rounded bg-red-900/50 hover:bg-red-900 border border-red-800 text-red-300">Cancel</button>
        <button id="reset-btn" class="px-2 py-1 rounded bg-ink-700 hover:bg-ink-600 border border-line text-gray-300">New session</button>
      </div>
    </header>

    <section class="mb-5 bg-ink-900 border border-line rounded-lg p-3">
      <div class="flex items-center justify-between mb-2">
        <div class="text-xs uppercase tracking-wider text-gray-500">This Week (Mon → now, UTC)</div>
        <div class="text-xs text-gray-500 mono" id="budget-meta">—</div>
      </div>
      <div id="budget-bars" class="space-y-1.5"></div>
    </section>

    <section class="mb-5">
      <div class="text-xs uppercase tracking-wider text-gray-500 mb-2">Mode</div>
      <div id="mode-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2"></div>
    </section>

    <section id="chat" class="bg-ink-900 border border-line rounded-lg p-4 mb-3 h-[55vh] overflow-y-auto scroll-thin space-y-3">
      <div class="text-xs text-gray-600 italic">Pick a mode and send a prompt. Multi-turn within this connection — click "New session" to reset.</div>
    </section>

    <form id="prompt-form" class="flex gap-2">
      <textarea id="prompt" rows="2" placeholder="Type a prompt… (Cmd/Ctrl+Enter to send)"
        class="flex-1 bg-ink-800 border border-line rounded px-3 py-2 text-sm focus:outline-none focus:border-accent resize-none"></textarea>
      <button id="send-btn" type="submit" class="px-4 py-2 rounded bg-accent text-ink-950 font-semibold text-sm hover:bg-accent/90 disabled:opacity-40">Send</button>
    </form>
  </div>

  <script type="module">
    const $ = (id) => document.getElementById(id);
    const chat = $("chat");
    const promptEl = $("prompt");
    const sendBtn = $("send-btn");
    const form = $("prompt-form");
    const grid = $("mode-grid");
    const wsDot = $("ws-dot");
    const wsText = $("ws-text");
    const totalCostEl = $("total-cost");
    const resetBtn = $("reset-btn");
    const cancelBtn = $("cancel-btn");

    let selectedMode = null;
    let totalCost = 0;
    let ws = null;
    let currentTurnEl = null;
    let budget = null;
    let allModes = [];

    const escapeHtml = (s) => String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

    function appendNode(html) {
      const wrap = document.createElement("div");
      wrap.innerHTML = html;
      const node = wrap.firstElementChild;
      chat.appendChild(node);
      chat.scrollTop = chat.scrollHeight;
      return node;
    }

    function userMsg(text) {
      appendNode(`<div class="flex justify-end"><div class="max-w-[80%] bg-accent/15 border border-accent/30 text-gray-100 rounded-lg px-3 py-2 text-sm whitespace-pre-wrap">${escapeHtml(text)}</div></div>`);
    }

    function startTurn(mode, resumed) {
      const tag = mode ? `${mode.icon || ""} ${escapeHtml(mode.label)} · ${escapeHtml(mode.model || "default")}` : "no mode";
      const resumedTag = resumed ? '<span class="text-accent">↻ resumed</span>' : '<span class="text-gray-600">new session</span>';
      currentTurnEl = appendNode(`
        <div class="space-y-2">
          <div class="text-xs text-gray-500 mono flex items-center gap-2">
            <span class="w-1.5 h-1.5 rounded-full bg-accent pulse-dot"></span>
            <span>${tag}</span>
            <span class="text-gray-700">·</span>
            ${resumedTag}
          </div>
          <div class="turn-blocks space-y-2"></div>
          <div class="turn-result text-xs text-gray-500 mono"></div>
        </div>
      `);
      return currentTurnEl;
    }

    function turnBlocks() { return currentTurnEl?.querySelector(".turn-blocks"); }
    function turnResult() { return currentTurnEl?.querySelector(".turn-result"); }

    function renderAssistantBlock(block) {
      const blocks = turnBlocks();
      if (!blocks) return;
      if (block.type === "text") {
        const el = document.createElement("div");
        el.className = "md bg-ink-800 border border-line rounded-lg px-3 py-2 text-sm";
        try {
          el.innerHTML = marked.parse(block.text || "", { breaks: true, gfm: true });
        } catch (_) {
          el.textContent = block.text || "";
        }
        blocks.appendChild(el);
      } else if (block.type === "thinking") {
        const el = document.createElement("details");
        el.className = "text-xs text-gray-500 italic bg-ink-900/40 border border-line/50 rounded px-2 py-1";
        el.innerHTML = `<summary class="cursor-pointer text-gray-500">thinking…</summary><div class="mt-1 whitespace-pre-wrap">${escapeHtml(block.thinking || "")}</div>`;
        blocks.appendChild(el);
      } else if (block.type === "tool_use") {
        const el = document.createElement("div");
        el.className = "text-xs mono text-accent/80 bg-accent/5 border border-accent/20 rounded px-2 py-1";
        const args = JSON.stringify(block.input || {});
        el.textContent = `🛠 ${block.name}(${args.length > 100 ? args.slice(0, 100) + "…" : args})`;
        blocks.appendChild(el);
      }
      chat.scrollTop = chat.scrollHeight;
    }

    function renderResult(e) {
      const r = turnResult();
      if (!r) return;
      const cost = e.total_cost_usd ?? 0;
      totalCost += cost;
      totalCostEl.textContent = totalCost.toFixed(6);
      const usage = e.usage || {};
      r.textContent = `cost=$${cost.toFixed(6)} · ${e.duration_ms}ms · in=${usage.input_tokens || 0} out=${usage.output_tokens || 0} cache_read=${usage.cache_read_input_tokens || 0} cache_create=${usage.cache_creation_input_tokens || 0}`;
    }

    function setWs(state) {
      const map = {
        connecting: ["bg-yellow-400", "connecting…"],
        open: ["bg-green-400", "connected"],
        closed: ["bg-red-400", "disconnected"],
      };
      const [cls, label] = map[state] || map.closed;
      wsDot.className = `w-2 h-2 rounded-full ${cls} ${state === "open" ? "" : "pulse-dot"}`;
      wsText.textContent = label;
    }

    function selectMode(mode, btnEl) {
      selectedMode = mode;
      grid.querySelectorAll("button").forEach((b) => b.classList.remove("border-accent", "bg-accent/10"));
      if (btnEl) btnEl.classList.add("border-accent", "bg-accent/10");
    }

    function isModeLockedOut(mode) {
      if (!budget || !mode) return false;
      const fam = (mode.model || "").toLowerCase();
      const family = ["opus", "sonnet", "haiku"].find((f) => fam.includes(f));
      if (!family) return false;
      const familyPct = budget.by_model?.[family]?.pct ?? 0;
      const totalPct = budget.total_pct ?? 0;
      return familyPct >= budget.lockout_pct || totalPct >= budget.lockout_pct;
    }

    function renderModes() {
      grid.innerHTML = "";
      const noMode = document.createElement("button");
      noMode.type = "button";
      noMode.className = "text-left px-3 py-2 rounded border border-line bg-ink-800 hover:bg-ink-700 text-xs";
      noMode.innerHTML = `<div>🚫 No mode</div><div class="text-gray-500 mt-0.5">bare prompt · default model</div>`;
      noMode.onclick = () => selectMode(null, noMode);
      grid.appendChild(noMode);

      for (const m of allModes) {
        const locked = isModeLockedOut(m);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.disabled = locked;
        btn.className = `text-left px-3 py-2 rounded border text-xs ${locked
          ? "border-red-900/40 bg-red-950/30 text-gray-500 cursor-not-allowed"
          : "border-line bg-ink-800 hover:bg-ink-700"}`;
        const lockNote = locked ? '<div class="text-red-400 mt-0.5">🔒 weekly cap</div>' : "";
        btn.innerHTML = `<div>${m.icon || ""} ${escapeHtml(m.label)}</div><div class="text-gray-500 mt-0.5 mono">${escapeHtml(m.model || "default")} · ${m.permission_mode || "default"}</div>${lockNote}`;
        if (!locked) btn.onclick = () => selectMode(m, btn);
        grid.appendChild(btn);
      }
    }

    function renderBudget() {
      const bars = $("budget-bars");
      const meta = $("budget-meta");
      if (!budget) { meta.textContent = "loading…"; return; }
      const rows = [
        ["opus", "Opus", budget.by_model.opus],
        ["sonnet", "Sonnet", budget.by_model.sonnet],
        ["haiku", "Haiku", budget.by_model.haiku],
        ["total", "Total", { cost_usd: budget.total_cost_usd, cap_usd: budget.total_cap_usd, pct: budget.total_pct, calls: null }],
      ];
      bars.innerHTML = rows.map(([key, label, b]) => {
        const pct = Math.min(b.pct, 100);
        const color = b.pct >= budget.hard_cap_pct ? "bg-red-500"
          : b.pct >= budget.lockout_pct ? "bg-orange-500"
          : b.pct >= 60 ? "bg-yellow-500"
          : "bg-green-500";
        const callsTxt = b.calls != null ? ` · ${b.calls} calls` : "";
        return `
          <div class="flex items-center gap-2 text-xs">
            <div class="w-14 text-gray-400">${label}</div>
            <div class="flex-1 bg-ink-800 rounded h-2 overflow-hidden">
              <div class="${color} h-full transition-all" style="width: ${pct}%"></div>
            </div>
            <div class="w-44 text-right mono text-gray-400">$${b.cost_usd.toFixed(2)} / $${b.cap_usd.toFixed(0)} · ${b.pct.toFixed(1)}%${callsTxt}</div>
          </div>`;
      }).join("");
      const since = new Date(budget.week_start_utc).toLocaleString();
      meta.textContent = `since ${since} · ${budget.files_scanned} files`;
    }

    function refreshBudget() {
      fetch("/api/budget").then((r) => r.json()).then((b) => {
        budget = b;
        renderBudget();
        renderModes();
      }).catch(() => {});
    }

    fetch("/api/modes").then((r) => r.json()).then((m) => {
      allModes = m;
      renderModes();
    });
    refreshBudget();
    setInterval(refreshBudget, 30000);

    function connect() {
      setWs("connecting");
      ws = new WebSocket(`ws://${location.host}/ws/chat`);
      ws.onopen = () => setWs("open");
      ws.onclose = () => { setWs("closed"); setTimeout(connect, 1500); };
      ws.onerror = () => setWs("closed");
      ws.onmessage = (ev) => {
        const e = JSON.parse(ev.data);
        switch (e.type) {
          case "_runner_start":
            startTurn(selectedMode, !!e.resumed);
            cancelBtn.classList.remove("hidden");
            break;
          case "system":
            if (e.subtype === "init" && currentTurnEl) {
              const note = document.createElement("div");
              note.className = "text-[10px] text-gray-600 mono";
              note.textContent = `init · session=${e.session_id?.slice(0, 8)}… · ${e.model} · apiKeySource=${e.apiKeySource}`;
              turnBlocks().appendChild(note);
            }
            break;
          case "assistant":
            for (const b of e.message?.content || []) renderAssistantBlock(b);
            break;
          case "result":
            renderResult(e);
            sendBtn.disabled = false;
            cancelBtn.classList.add("hidden");
            break;
          case "_runner_done":
            sendBtn.disabled = false;
            cancelBtn.classList.add("hidden");
            break;
          case "_session_reset":
            appendNode(`<div class="text-xs text-gray-600 italic">— session reset —</div>`);
            break;
          case "_locked_out":
            appendNode(`<div class="text-xs text-red-400 italic">🔒 ${e.family} is at ${e.family_pct.toFixed(1)}% (lockout ${e.lockout_pct}%). Pick a smaller model or wait for week reset.</div>`);
            sendBtn.disabled = false;
            cancelBtn.classList.add("hidden");
            refreshBudget();
            break;
          case "_cancelled":
            appendNode(`<div class="text-xs text-gray-500 italic">— cancelled —</div>`);
            sendBtn.disabled = false;
            cancelBtn.classList.add("hidden");
            break;
          case "_process_error":
          case "_error":
            appendNode(`<div class="text-xs text-red-400 mono whitespace-pre-wrap">${escapeHtml(JSON.stringify(e, null, 2))}</div>`);
            sendBtn.disabled = false;
            cancelBtn.classList.add("hidden");
            break;
        }
      };
    }
    connect();

    function submit() {
      const text = promptEl.value.trim();
      if (!text || ws?.readyState !== 1) return;
      userMsg(text);
      ws.send(JSON.stringify({ prompt: text, mode_id: selectedMode?.id }));
      promptEl.value = "";
      sendBtn.disabled = true;
    }

    form.addEventListener("submit", (e) => { e.preventDefault(); submit(); });
    promptEl.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") { e.preventDefault(); submit(); }
    });
    resetBtn.addEventListener("click", () => {
      if (ws?.readyState === 1) ws.send(JSON.stringify({ action: "reset_session" }));
      totalCost = 0;
      totalCostEl.textContent = totalCost.toFixed(6);
    });
    cancelBtn.addEventListener("click", () => {
      // Close+reconnect: server's disconnect handler SIGTERMs the in-flight subprocess.
      // Note: this resets session_id since reconnect makes a fresh ws.
      if (ws) ws.close();
      appendNode(`<div class="text-xs text-gray-500 italic">— cancelled (session reset on reconnect) —</div>`);
      sendBtn.disabled = false;
      cancelBtn.classList.add("hidden");
    });
  </script>
</body>
</html>
