<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<title>Sermon Listener — Taglish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #14141c;
    --panel-2: #1c1c28;
    --border: #2a2a3a;
    --text: #ececf2;
    --muted: #8a8aa0;
    --accent: #ff6b6b;
    --accent-2: #ffb86b;
    --ok: #6bff9e;
    --live: #ff4d6d;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
  body { min-height: 100dvh; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
  .app { max-width: 760px; margin: 0 auto; padding: 16px 14px 220px; }

  header { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 6px 4px 14px; }
  .title { display: flex; align-items: center; gap: 10px; }
  .title h1 { font-size: 17px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
  .title .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .lang-pill {
    font-size: 11px; color: var(--muted); background: var(--panel); border: 1px solid var(--border);
    padding: 4px 9px; border-radius: 999px; font-weight: 500;
  }

  .stat-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px;
  }
  .stat {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 12px; text-align: center;
  }
  .stat .v { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

  .transcript {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px; min-height: 50vh; max-height: 65vh; overflow-y: auto;
    font-size: 16px; line-height: 1.65; -webkit-overflow-scrolling: touch;
  }
  .transcript:empty::before {
    content: 'Tap Start. Magsalita ka na — lahat ng sasabihin mo lalabas dito verbatim.';
    color: var(--muted); font-style: italic; font-size: 14px;
  }
  .seg { margin-bottom: 12px; }
  .seg .ts { color: var(--muted); font-size: 11px; font-variant-numeric: tabular-nums; margin-right: 8px; }
  .seg .txt { color: var(--text); }
  .seg.tentative .txt { color: var(--accent-2); opacity: 0.92; }
  .seg .tmark { color: var(--accent-2); font-weight: 700; margin-right: 6px; cursor: help; }
  .interim {
    color: var(--accent-2); font-style: italic; opacity: 0.85; min-height: 1.65em;
    padding: 8px 2px 0; font-size: 15px;
  }
  .interim:empty { display: none; }

  .controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
    padding: 30px 14px calc(env(safe-area-inset-bottom) + 14px); z-index: 10;
  }
  .controls-inner { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: stretch; }
  .btn {
    flex: 1; background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; font: inherit; font-weight: 600; font-size: 15px;
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 0.06s ease, background 0.15s, border-color 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn .material-symbols-outlined { font-size: 22px; }
  .btn-primary {
    background: var(--accent); color: #1a0606; border-color: var(--accent);
    flex: 2; font-size: 17px; padding: 20px;
  }
  .btn-primary.rec {
    background: var(--live); border-color: var(--live); color: #fff;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.55); }
    50% { box-shadow: 0 0 0 18px rgba(255, 77, 109, 0); }
  }
  .btn-icon { flex: 0 0 56px; padding: 16px; }

  .toolbar {
    display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
  }
  .tool {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 12px; font: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  }
  .tool .material-symbols-outlined { font-size: 17px; }
  .tool:active { background: var(--panel-2); }
  .tool.danger { color: var(--accent); border-color: rgba(255,107,107,0.3); }
  .tool.primary {
    background: linear-gradient(135deg, #6b8aff, #a06bff);
    color: #fff; border-color: transparent; font-weight: 600;
  }
  .tool.primary:active { filter: brightness(0.9); }
  .tool:disabled { opacity: 0.5; cursor: not-allowed; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    display: none; z-index: 50; padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 16px;
    width: 100%; max-width: 760px; max-height: 90dvh; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .modal-header h2 { margin: 0; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .modal-header .close {
    background: transparent; border: none; color: var(--muted); cursor: pointer;
    padding: 4px; display: flex; align-items: center; justify-content: center;
  }
  .modal-body {
    flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch;
    font-size: 15px; line-height: 1.7;
  }
  .modal-body h1, .modal-body h2, .modal-body h3 { color: var(--accent-2); margin: 18px 0 8px; }
  .modal-body h1 { font-size: 18px; }
  .modal-body h2 { font-size: 16px; }
  .modal-body h3 { font-size: 15px; }
  .modal-body p { margin: 8px 0; }
  .modal-body ul, .modal-body ol { padding-left: 22px; }
  .modal-body strong { color: #fff; }
  .modal-body em { color: var(--muted); }
  .modal-body blockquote { border-left: 3px solid var(--accent-2); margin: 10px 0; padding: 4px 12px; color: var(--muted); }
  .modal-footer {
    display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .modal-loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 40px 16px; color: var(--muted);
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent-2);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .stream-cursor {
    display: inline-block; width: 8px; height: 1em; background: var(--accent-2);
    vertical-align: text-bottom; animation: blink 0.8s infinite;
  }

  .toast {
    position: fixed; top: calc(env(safe-area-inset-top) + 12px); left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 16px; border-radius: 999px; font-size: 13px; font-weight: 500;
    opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; z-index: 20;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .unsupported {
    background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3);
    border-radius: 12px; padding: 14px; color: var(--accent); font-size: 13px; margin-bottom: 14px;
  }

  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin-right: 6px; vertical-align: middle; }
  .dot.live { background: var(--live); animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">
      <span class="material-symbols-outlined" style="font-size:28px; color:var(--accent);">graphic_eq</span>
      <div>
        <h1>Sermon Listener</h1>
        <div class="sub"><span id="statusDot" class="dot"></span><span id="statusText">Idle</span></div>
      </div>
    </div>
    <span class="lang-pill" id="langPill">fil-PH · Taglish</span>
  </header>

  <div id="unsupported" class="unsupported" style="display:none;">
    Hindi suportado ng browser mo ang Web Speech API. Gamitin ang Chrome (Android/Desktop) or Safari (iOS).
  </div>

  <div class="stat-row">
    <div class="stat"><div class="v" id="statTime">00:00</div><div class="l">Elapsed</div></div>
    <div class="stat"><div class="v" id="statWords">0</div><div class="l">Words</div></div>
    <div class="stat"><div class="v" id="statSegs">0</div><div class="l">Segments</div></div>
  </div>

  <div class="toolbar">
    <button class="tool primary" id="cleanBtn"><span class="material-symbols-outlined">auto_awesome</span>Clean &amp; Document</button>
    <button class="tool" id="copyBtn"><span class="material-symbols-outlined">content_copy</span>Copy all</button>
    <button class="tool" id="downloadBtn"><span class="material-symbols-outlined">download</span>Download .txt</button>
    <button class="tool" id="audioBtn" style="display:none"><span class="material-symbols-outlined">audio_file</span>Audio backup</button>
    <button class="tool" id="langBtn"><span class="material-symbols-outlined">language</span>Language</button>
    <button class="tool danger" id="clearBtn"><span class="material-symbols-outlined">delete</span>Clear</button>
  </div>

  <div class="transcript" id="transcript"></div>
  <div class="interim" id="interim"></div>
</div>

<div class="controls">
  <div class="controls-inner">
    <button class="btn btn-primary" id="recordBtn">
      <span class="material-symbols-outlined">mic</span>
      <span id="recordLabel">Start</span>
    </button>
    <button class="btn btn-icon" id="scrollBtn" title="Scroll to bottom">
      <span class="material-symbols-outlined">vertical_align_bottom</span>
    </button>
  </div>
</div>

<div class="toast" id="toast">Copied</div>

<div class="modal-overlay" id="cleanModal">
  <div class="modal">
    <div class="modal-header">
      <h2><span class="material-symbols-outlined" style="color:var(--accent-2)">auto_awesome</span>Cleaned Sermon Notes</h2>
      <button class="close" id="modalClose" aria-label="Close"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="tool" id="cleanCopyBtn"><span class="material-symbols-outlined">content_copy</span>Copy</button>
      <button class="tool" id="cleanDownloadBtn"><span class="material-symbols-outlined">download</span>Download .md</button>
      <button class="tool" id="cleanRerunBtn"><span class="material-symbols-outlined">refresh</span>Re-run</button>
    </div>
  </div>
</div>

<script>
(() => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const LS_KEY = 'sermon_listener_v1';
  const LANG_KEY = 'sermon_listener_lang';
  const LANGS = [
    { code: 'fil-PH', label: 'fil-PH · Taglish' },
    { code: 'en-PH',  label: 'en-PH · Philippine English' },
    { code: 'en-US',  label: 'en-US · English' },
    { code: 'tl-PH',  label: 'tl-PH · Tagalog' },
  ];

  const $ = id => document.getElementById(id);
  const transcriptEl = $('transcript');
  const interimEl    = $('interim');
  const recordBtn    = $('recordBtn');
  const recordLabel  = $('recordLabel');
  const langPill     = $('langPill');
  const statusDot    = $('statusDot');
  const statusText   = $('statusText');
  const statTime     = $('statTime');
  const statWords    = $('statWords');
  const statSegs     = $('statSegs');
  const toastEl      = $('toast');

  // ---- state
  let recognition = null;
  let isRecording = false;
  let userStopped = false;
  let segments = JSON.parse(localStorage.getItem(LS_KEY) || '[]'); // [{ ts, text, tentative? }]
  let startedAt = null;
  let elapsedMs = 0;
  let timerId = null;
  let currentLang = localStorage.getItem(LANG_KEY) || 'fil-PH';
  let lastInterim = '';        // accumulating interim text since last final
  let lastInterimTs = 0;       // when that interim first appeared
  let mediaRecorder = null;
  let audioChunks = [];
  let audioMime = '';

  function setLang(code) {
    currentLang = code;
    localStorage.setItem(LANG_KEY, code);
    const m = LANGS.find(l => l.code === code) || LANGS[0];
    langPill.textContent = m.label;
    if (recognition && isRecording) {
      // Restart with new lang
      userStopped = true;
      try { recognition.stop(); } catch {}
      setTimeout(() => start(), 250);
    } else if (recognition) {
      recognition.lang = code;
    }
  }

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toastEl.classList.remove('show'), 1600);
  }

  function fmtTime(ms) {
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
    return h > 0
      ? `${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`
      : `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  }

  function fmtClock(d) {
    return d.toLocaleTimeString('en-US', { hour12: false });
  }

  function countWords(txt) {
    return (txt.trim().match(/\S+/g) || []).length;
  }

  function renderSegmentEl(seg) {
    const div = document.createElement('div');
    div.className = 'seg' + (seg.tentative ? ' tentative' : '');
    const marker = seg.tentative ? '<span class="tmark" title="Rescued from interim (engine restarted before finalizing)">~</span>' : '';
    div.innerHTML = `<span class="ts">${fmtClock(new Date(seg.ts))}</span>${marker}<span class="txt"></span>`;
    div.querySelector('.txt').textContent = seg.text;
    return div;
  }

  function renderAll() {
    transcriptEl.innerHTML = '';
    let totalWords = 0;
    for (const seg of segments) {
      transcriptEl.appendChild(renderSegmentEl(seg));
      totalWords += countWords(seg.text);
    }
    statWords.textContent = totalWords;
    statSegs.textContent = segments.length;
    scrollToBottom();
  }

  function appendSegment(text, opts = {}) {
    const seg = { ts: Date.now(), text: text.trim() };
    if (opts.tentative) seg.tentative = true;
    if (!seg.text) return;
    // De-dupe: if the previous segment has the same text within last 5s, skip
    // (avoids interim-rescue duplicating a final result that just arrived).
    const prev = segments[segments.length - 1];
    if (prev && prev.text === seg.text && (seg.ts - prev.ts) < 5000) return;
    // Also skip tentative if the previous final already contains this text
    if (opts.tentative && prev && prev.text.toLowerCase().includes(seg.text.toLowerCase())) return;
    segments.push(seg);
    persist();
    transcriptEl.appendChild(renderSegmentEl(seg));
    statWords.textContent = parseInt(statWords.textContent, 10) + countWords(seg.text);
    statSegs.textContent  = segments.length;
    scrollToBottom();
  }

  function persist() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(segments)); } catch {}
  }

  function scrollToBottom() {
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
  }

  // ---- timer
  function startTimer() {
    startedAt = Date.now() - elapsedMs;
    timerId = setInterval(() => {
      elapsedMs = Date.now() - startedAt;
      statTime.textContent = fmtTime(elapsedMs);
    }, 500);
  }
  function stopTimer() {
    clearInterval(timerId);
    timerId = null;
  }

  // ---- recognition
  function buildRecognition() {
    const r = new SR();
    r.continuous = true;
    r.interimResults = true;
    r.lang = currentLang;
    r.maxAlternatives = 1;

    r.onresult = (e) => {
      let interim = '';
      let gotFinal = false;
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const res = e.results[i];
        if (res.isFinal) {
          appendSegment(res[0].transcript);
          gotFinal = true;
        } else {
          interim += res[0].transcript;
        }
      }
      interimEl.textContent = interim;
      // Track interim so we can rescue it if recognition ends before finalizing.
      if (gotFinal) {
        // Final cleared whatever interim came before
        lastInterim = interim;
        lastInterimTs = interim ? Date.now() : 0;
      } else if (interim) {
        if (!lastInterim) lastInterimTs = Date.now();
        lastInterim = interim;
      }
    };

    r.onerror = (ev) => {
      // 'no-speech', 'audio-capture', 'not-allowed', 'aborted', 'network', 'language-not-supported'
      console.warn('[sermon] recognition error:', ev.error, ev);
      if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') {
        toast('Mic permission denied — check site settings');
        statusText.textContent = 'Mic blocked';
        userStopped = true;
        setIdle();
        return;
      }
      if (ev.error === 'language-not-supported') {
        // Fallback chain: fil-PH → en-PH → en-US
        const fallback = currentLang === 'fil-PH' ? 'en-PH' : (currentLang === 'en-PH' ? 'en-US' : null);
        if (fallback) {
          toast(`Lang not supported — switching to ${fallback}`);
          setLang(fallback);
        } else {
          statusText.textContent = 'No supported language';
          stop();
        }
        return;
      }
      if (ev.error === 'audio-capture') {
        toast('No microphone detected');
        statusText.textContent = 'No mic';
        stop();
        return;
      }
      if (ev.error === 'no-speech') {
        // Common during pauses — onend will restart
        statusText.textContent = 'Waiting…';
        return;
      }
      // network / aborted / unknown — show but keep going
      statusText.textContent = `Err: ${ev.error}`;
    };

    r.onend = () => {
      // Rescue: if there's lingering interim text that never got finalized,
      // save it as a tentative segment so it isn't lost on restart.
      if (lastInterim && lastInterim.trim().length >= 3) {
        appendSegment(lastInterim, { tentative: true });
      }
      lastInterim = '';
      lastInterimTs = 0;
      interimEl.textContent = '';

      if (!userStopped && isRecording) {
        // Web Speech auto-stops after silence — restart silently
        try { r.start(); } catch (err) {
          // start() can throw if called too soon; retry shortly
          setTimeout(() => {
            if (!userStopped && isRecording) {
              try { r.start(); } catch {}
            }
          }, 300);
        }
      }
    };

    return r;
  }

  function start() {
    if (!SR) { toast('Browser does not support speech recognition'); return; }
    userStopped = false;
    recognition = buildRecognition();
    try {
      recognition.start();
    } catch (err) {
      console.warn('[sermon] recognition.start() threw:', err);
      // If already started, treat as already-running. Otherwise surface it.
      if (String(err && err.name) !== 'InvalidStateError') {
        toast('Start failed: ' + (err && err.message || err));
        statusText.textContent = 'Start failed';
        return;
      }
    }
    isRecording = true;
    recordBtn.classList.add('rec');
    recordLabel.textContent = 'Stop';
    recordBtn.querySelector('.material-symbols-outlined').textContent = 'stop_circle';
    statusDot.classList.add('live');
    statusText.textContent = 'Listening';
    startTimer();
    // Best-effort audio backup — runs alongside STT so missed words are recoverable
    startAudioBackup();
  }

  function stop() {
    userStopped = true;
    isRecording = false;
    if (recognition) {
      try { recognition.stop(); } catch {}
      recognition = null;
    }
    // Rescue any lingering interim before stopping
    if (lastInterim && lastInterim.trim().length >= 3) {
      appendSegment(lastInterim, { tentative: true });
    }
    lastInterim = '';
    interimEl.textContent = '';
    stopAudioBackup();
    setIdle();
  }

  // ---- Audio backup (MediaRecorder)
  function pickMime() {
    const candidates = [
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/mp4',
      'audio/ogg;codecs=opus',
      '',
    ];
    for (const m of candidates) {
      if (!m) return '';
      try { if (window.MediaRecorder && MediaRecorder.isTypeSupported(m)) return m; } catch {}
    }
    return '';
  }

  async function startAudioBackup() {
    if (!window.MediaRecorder || !navigator.mediaDevices?.getUserMedia) return;
    if (mediaRecorder && mediaRecorder.state !== 'inactive') return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioMime = pickMime();
      mediaRecorder = audioMime ? new MediaRecorder(stream, { mimeType: audioMime })
                                : new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size) { audioChunks.push(e.data); updateAudioBtn(); }
      };
      mediaRecorder.onstop = () => {
        // Detach mic
        stream.getTracks().forEach(t => t.stop());
        updateAudioBtn();
      };
      mediaRecorder.start(5000); // 5s chunks — survives crashes better than one big blob
      updateAudioBtn();
    } catch (err) {
      console.warn('[sermon] audio backup not started:', err);
    }
  }

  function stopAudioBackup() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      try { mediaRecorder.stop(); } catch {}
    }
  }

  function updateAudioBtn() {
    const btn = $('audioBtn');
    if (audioChunks.length) {
      btn.style.display = '';
      const mb = (audioChunks.reduce((a, c) => a + c.size, 0) / (1024 * 1024)).toFixed(1);
      btn.innerHTML = `<span class="material-symbols-outlined">audio_file</span>Audio backup (${mb} MB)`;
    } else {
      btn.style.display = 'none';
    }
  }

  document.getElementById('audioBtn').addEventListener('click', () => {
    if (!audioChunks.length) { toast('Walang audio backup'); return; }
    const blob = new Blob(audioChunks, { type: audioMime || 'audio/webm' });
    const ext = (audioMime && audioMime.includes('mp4')) ? 'm4a' : 'webm';
    const date = new Date();
    const pad = n => String(n).padStart(2,'0');
    const fname = `sermon-audio-${date.getFullYear()}${pad(date.getMonth()+1)}${pad(date.getDate())}-${pad(date.getHours())}${pad(date.getMinutes())}.${ext}`;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname; document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
    toast(`Saved ${fname}`);
  });

  function setIdle() {
    recordBtn.classList.remove('rec');
    recordLabel.textContent = 'Start';
    recordBtn.querySelector('.material-symbols-outlined').textContent = 'mic';
    statusDot.classList.remove('live');
    statusText.textContent = 'Idle';
    stopTimer();
  }

  // ---- UI bindings
  recordBtn.addEventListener('click', () => {
    if (isRecording) stop(); else start();
  }, { passive: true });

  $('scrollBtn').addEventListener('click', scrollToBottom);

  $('copyBtn').addEventListener('click', async () => {
    const txt = segments.map(s => `[${fmtClock(new Date(s.ts))}] ${s.text}`).join('\n\n');
    if (!txt) { toast('Walang laman pa'); return; }
    try {
      await navigator.clipboard.writeText(txt);
      toast('Copied to clipboard');
    } catch {
      // fallback
      const ta = document.createElement('textarea');
      ta.value = txt; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
      toast('Copied');
    }
  });

  $('downloadBtn').addEventListener('click', () => {
    if (!segments.length) { toast('Walang laman pa'); return; }
    const date = new Date();
    const pad = n => String(n).padStart(2,'0');
    const fname = `sermon-${date.getFullYear()}${pad(date.getMonth()+1)}${pad(date.getDate())}-${pad(date.getHours())}${pad(date.getMinutes())}.txt`;
    const body = segments.map(s => `[${fmtClock(new Date(s.ts))}] ${s.text}`).join('\n\n');
    const header = `Sermon Listener Transcript\nDate: ${date.toLocaleString()}\nLanguage: ${currentLang}\nSegments: ${segments.length}\n\n`;
    const blob = new Blob([header + body], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname; document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
    toast('Downloaded');
  });

  $('langBtn').addEventListener('click', () => {
    const idx = LANGS.findIndex(l => l.code === currentLang);
    const next = LANGS[(idx + 1) % LANGS.length];
    setLang(next.code);
    toast(`Lang: ${next.label}`);
  });

  // ---- Clean & Document (Gemini)
  const PROXY_URL = 'https://gemini-proxy-668755364170.asia-southeast1.run.app/';
  const CLEAN_KEY = 'sermon_listener_cleaned_v1';
  const cleanModal     = $('cleanModal');
  const modalBody      = $('modalBody');
  const cleanBtn       = $('cleanBtn');
  let lastCleaned = localStorage.getItem(CLEAN_KEY) || '';

  function buildCleanPrompt(rawJoined) {
    return `You are cleaning a live speech-to-text transcript of a Taglish (Filipino + English) sermon or Christian teaching. The speech recognizer made systematic errors:
- English words substituted for similar-sounding Filipino words (and vice versa)
- Proper nouns mangled (church names, ministry names, Bible names — e.g., "DNA", "Gigabytes", "CCF", "Christ's Commission Fellowship", book names, "evangelize")
- Run-on phrases with no punctuation
- Code-switched Taglish kept as the speaker said it

YOUR TASK (very important — read carefully):
1. **DO NOT SUMMARIZE.** Preserve every idea, illustration, exhortation, and example. The output should be at least as long as the input.
2. **Reconstruct the speaker's intended words** using context. Fix obvious mishears (e.g., "Evans and evangelis in training" → "evangelize and evangelism in training"; "ding loftus assembly" → likely "Gigabytes assembly" if context is CCF student ministry).
3. **Preserve Taglish naturally** — do not translate Filipino to English or vice versa. Keep the speaker's voice.
4. **Add proper punctuation, paragraph breaks, and section headings** so it reads like well-edited sermon notes.
5. **Bible references**: if you can confidently identify a verse the speaker cited, format as **Book Chapter:Verse**. If unclear, leave the speaker's words as-is.
6. **Truly unrecoverable phrases**: mark inline as \`[unclear: "original mishear"]\` — do not invent meaning.
7. **Structure the output** as Markdown:
   - Start with \`# Theme\` line (your best guess of the one-line theme)
   - Use \`## Section\` headings to group related points where natural breaks occur
   - Use bullet lists for enumerations
   - Use \`> blockquote\` for quoted Bible verses or strong exhortations
8. **End with a \`## Key Takeaways\`** section — 3 to 7 bullets of the speaker's main points (this section is the only place you may condense, and only as a recap; the main body must remain full).

RAW TRANSCRIPT (timestamped segments from the speech recognizer):
<<<
${rawJoined}
>>>

Output ONLY the cleaned Markdown — no preamble, no "Here is the cleaned version", just the document starting with \`# Theme: ...\`.`;
  }

  // Tiny markdown → HTML (good enough for headings, paragraphs, lists, bold, italic, blockquote, code)
  function md2html(md) {
    const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const lines = md.split('\n');
    let html = '';
    let inUl = false, inOl = false, inBq = false, paraBuf = [];
    const flushPara = () => {
      if (paraBuf.length) {
        html += '<p>' + inlineFmt(paraBuf.join(' ')) + '</p>';
        paraBuf = [];
      }
    };
    const closeLists = () => {
      if (inUl) { html += '</ul>'; inUl = false; }
      if (inOl) { html += '</ol>'; inOl = false; }
    };
    const closeBq = () => { if (inBq) { html += '</blockquote>'; inBq = false; } };
    const inlineFmt = (s) => esc(s)
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/(^|\W)\*([^*]+)\*(?=\W|$)/g, '$1<em>$2</em>')
      .replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:4px;font-size:0.92em">$1</code>');

    for (let raw of lines) {
      const line = raw.trimEnd();
      if (!line.trim()) { flushPara(); closeLists(); closeBq(); continue; }
      let m;
      if ((m = line.match(/^(#{1,4})\s+(.*)$/))) {
        flushPara(); closeLists(); closeBq();
        const lvl = Math.min(m[1].length, 3);
        html += `<h${lvl}>${inlineFmt(m[2])}</h${lvl}>`;
      } else if ((m = line.match(/^\s*[-*]\s+(.*)$/))) {
        flushPara(); closeBq();
        if (inOl) { html += '</ol>'; inOl = false; }
        if (!inUl) { html += '<ul>'; inUl = true; }
        html += `<li>${inlineFmt(m[1])}</li>`;
      } else if ((m = line.match(/^\s*\d+\.\s+(.*)$/))) {
        flushPara(); closeBq();
        if (inUl) { html += '</ul>'; inUl = false; }
        if (!inOl) { html += '<ol>'; inOl = true; }
        html += `<li>${inlineFmt(m[1])}</li>`;
      } else if ((m = line.match(/^>\s?(.*)$/))) {
        flushPara(); closeLists();
        if (!inBq) { html += '<blockquote>'; inBq = true; }
        html += inlineFmt(m[1]) + '<br>';
      } else {
        closeLists(); closeBq();
        paraBuf.push(line);
      }
    }
    flushPara(); closeLists(); closeBq();
    return html;
  }

  function openModal() { cleanModal.classList.add('open'); }
  function closeModal() { cleanModal.classList.remove('open'); }

  async function runClean() {
    if (!segments.length) { toast('Walang transcript pa'); return; }
    const rawJoined = segments.map(s => `[${fmtClock(new Date(s.ts))}] ${s.text}`).join('\n');
    const prompt = buildCleanPrompt(rawJoined);

    cleanBtn.disabled = true;
    cleanBtn.innerHTML = '<span class="material-symbols-outlined">hourglass_top</span>Cleaning…';
    openModal();
    modalBody.innerHTML = '<div class="modal-loading"><div class="spinner"></div><div>Cleaning transcript… (Gemini)</div></div>';

    const SAFETY = [
      { category: 'HARM_CATEGORY_HARASSMENT',        threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_HATE_SPEECH',       threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_ONLY_HIGH' },
      { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_ONLY_HIGH' },
    ];

    try {
      const res = await fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ role: 'user', parts: [{ text: prompt }] }],
          safetySettings: SAFETY,
          generationConfig: {
            temperature: 0.4,
            maxOutputTokens: 16384,
            thinkingConfig: { thinkingBudget: 0 },
          },
        }),
      });
      const data = await res.json();
      console.log('[sermon] gemini response:', data);

      if (!res.ok) {
        modalBody.innerHTML = `<div style="color:var(--accent);padding:14px">
          HTTP ${res.status}<br><br>
          <pre style="white-space:pre-wrap;font-size:12px;color:var(--muted)">${escapeHtml(JSON.stringify(data, null, 2))}</pre></div>`;
        return;
      }

      const cand = data?.candidates?.[0];
      const text = cand?.content?.parts?.map(p => p.text).filter(Boolean).join('') || '';
      const finishReason = cand?.finishReason;
      const blockReason = data?.promptFeedback?.blockReason;

      if (!text) {
        // Show what came back so we can diagnose
        const diag = {
          finishReason,
          blockReason,
          promptFeedback: data?.promptFeedback,
          safetyRatings: cand?.safetyRatings,
        };
        modalBody.innerHTML = `<div style="padding:14px">
          <div style="color:var(--accent);font-weight:600;margin-bottom:8px">Gemini returned no text.</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:10px">finishReason: <b style="color:var(--text)">${finishReason || 'unknown'}</b>${blockReason ? ' · blockReason: <b style="color:var(--text)">' + blockReason + '</b>' : ''}</div>
          <pre style="white-space:pre-wrap;font-size:11px;color:var(--muted);background:var(--panel-2);padding:10px;border-radius:8px">${escapeHtml(JSON.stringify(diag, null, 2))}</pre>
          <div style="font-size:13px;margin-top:10px;color:var(--muted)">Tap <b style="color:var(--text)">Re-run</b> para subukan ulit.</div>
        </div>`;
        return;
      }

      modalBody.innerHTML = md2html(text);
      lastCleaned = text;
      try { localStorage.setItem(CLEAN_KEY, text); } catch {}
    } catch (err) {
      console.error('[sermon] clean failed:', err);
      modalBody.innerHTML = `<div style="color:var(--accent);padding:14px">Clean failed: ${escapeHtml(err.message || String(err))}<br><br>Pakiretry sa <b>Re-run</b>.</div>`;
    } finally {
      cleanBtn.disabled = false;
      cleanBtn.innerHTML = '<span class="material-symbols-outlined">auto_awesome</span>Clean &amp; Document';
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  cleanBtn.addEventListener('click', () => {
    if (lastCleaned && segments.length) {
      // If we already have a cleaned version, show it first; user can Re-run
      modalBody.innerHTML = md2html(lastCleaned);
      openModal();
    } else {
      runClean();
    }
  });
  $('cleanRerunBtn').addEventListener('click', runClean);
  $('modalClose').addEventListener('click', closeModal);
  cleanModal.addEventListener('click', (e) => { if (e.target === cleanModal) closeModal(); });

  $('cleanCopyBtn').addEventListener('click', async () => {
    if (!lastCleaned) { toast('Wala pang cleaned version'); return; }
    try { await navigator.clipboard.writeText(lastCleaned); toast('Cleaned text copied'); }
    catch { toast('Copy failed'); }
  });

  $('cleanDownloadBtn').addEventListener('click', () => {
    if (!lastCleaned) { toast('Wala pang cleaned version'); return; }
    const date = new Date();
    const pad = n => String(n).padStart(2,'0');
    const fname = `sermon-cleaned-${date.getFullYear()}${pad(date.getMonth()+1)}${pad(date.getDate())}-${pad(date.getHours())}${pad(date.getMinutes())}.md`;
    const blob = new Blob([lastCleaned], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname; document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
    toast('Downloaded');
  });

  $('clearBtn').addEventListener('click', () => {
    if (!segments.length) return;
    if (!confirm('Burahin lahat ng transcript? Hindi na maibabalik.')) return;
    segments = [];
    persist();
    elapsedMs = 0;
    statTime.textContent = '00:00';
    renderAll();
    toast('Cleared');
  });

  // Wake lock (best-effort — keeps screen on while recording)
  let wakeLock = null;
  async function acquireWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch {}
  }
  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && isRecording && !wakeLock) acquireWakeLock();
  });

  // Hook wake-lock onto the existing start/stop without rebinding click handlers
  const _origStart = start;
  const _origStop = stop;
  start = function() { _origStart(); acquireWakeLock(); };
  stop  = function() { _origStop();  releaseWakeLock(); };

  // ---- init
  if (!SR) {
    $('unsupported').style.display = 'block';
    recordBtn.disabled = true;
  }
  setLang(currentLang);
  renderAll();
})();
</script>
