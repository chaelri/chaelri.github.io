<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>CharLa | Money</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <!-- 💸 money-with-wings favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%B8%3C/text%3E%3C/svg%3E"
    />
    <link rel="apple-touch-icon" href="assets/money-icon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="bg-slate-900 text-slate-100 overflow-hidden font-sans select-none"
  >
    <!-- INTRO SPLASH -->
    <div
      id="intro-screen"
      class="fixed inset-0 z-[100] bg-slate-900 flex flex-col items-center justify-center pointer-events-auto overflow-hidden transition-opacity duration-700"
    >
      <div id="intro-particles" class="absolute inset-0"></div>
      <div
        id="intro-content"
        class="relative z-10 flex flex-col items-center gap-4 transition-all duration-700"
      >
        <div class="intro-avatars">
          <img src="assets/avatar-charlie.jpg" id="intro-charlie" class="intro-av" alt="Charlie" />
          <img src="assets/avatar-karla.jpg" id="intro-karla" class="intro-av" alt="Karla" />
          <img src="assets/money-icon.png" id="intro-money" class="intro-money" alt="Money" />
        </div>
        <div
          class="text-center leading-[0.9] px-8 opacity-0 transition-opacity duration-500"
          id="intro-tag"
        >
          <p class="text-2xl md:text-3xl font-black italic uppercase tracking-tight text-white">
            Charlie &amp; Karla's
          </p>
          <p class="text-lg md:text-xl font-black uppercase tracking-[0.3em] mt-2 bg-gradient-to-r from-indigo-400 via-violet-400 to-indigo-400 bg-clip-text text-transparent">
            Money
          </p>
        </div>
      </div>
    </div>

    <!-- MONEY FALLING CANVAS OVERLAY -->
    <canvas
      id="money-canvas"
      class="fixed inset-0 pointer-events-none z-[60] opacity-0 transition-opacity duration-300"
    ></canvas>

    <!-- APP SHELL -->
    <div
      id="app"
      class="h-screen flex flex-col opacity-0 transition-opacity duration-500 max-w-2xl md:max-w-5xl mx-auto bg-slate-900"
    >
      <!-- SYNC INDICATOR -->
      <div
        id="sync-bar"
        class="h-[2px] bg-slate-900 relative overflow-hidden flex-shrink-0"
        style="opacity: 0; transition: opacity 0.3s ease"
      >
        <div
          class="absolute inset-0 bg-gradient-to-r from-blue-500 via-indigo-500 to-blue-500 animate-sync-slide"
        ></div>
      </div>

      <!-- HEADER -->
      <header
        class="px-6 md:px-8 pt-6 pb-3 flex justify-between items-end bg-slate-900/80 backdrop-blur-md sticky top-0 z-40 flex-shrink-0"
      >
        <div>
          <h1
            id="current-month-display"
            class="text-3xl font-black tracking-tight text-white uppercase italic leading-none"
          >
            JULY
          </h1>
          <p
            class="text-indigo-400 text-[10px] font-black tracking-[0.4em] uppercase mt-1"
          >
            <span id="current-year-display">2026</span>
          </p>
        </div>
        <div class="flex items-center gap-3">
          <button
            onclick="openMore()"
            class="w-12 h-12 flex items-center justify-center bg-slate-800 rounded-2xl transition-transform shadow-lg"
          >
            <span class="material-icons text-indigo-400">insights</span>
          </button>
          <button
            onclick="toggleMonthPicker()"
            class="w-12 h-12 flex items-center justify-center bg-slate-800 rounded-2xl transition-transform shadow-lg md:hidden"
          >
            <span class="material-icons text-indigo-400">calendar_month</span>
          </button>
        </div>
      </header>

      <!-- VIEWS -->
      <main id="view-container" class="flex-1 relative overflow-hidden">
        <!-- BUDGET VIEW -->
        <div
          id="budget-view"
          class="absolute inset-0 overflow-y-auto pb-10"
        >
          <!-- Month strip -->
          <div
            id="month-strip"
            class="flex items-center gap-2 overflow-x-auto px-6 md:px-8 pt-6 pb-3 no-scrollbar"
          >
            <!-- month chips injected -->
          </div>

          <div id="month-banner" class="px-6 md:px-8 pb-2"></div>

          <div class="px-6 md:px-8 space-y-5 md:space-y-0 md:grid md:grid-cols-2 md:gap-5 md:items-start stagger-in" id="budget-body">
            <!-- month detail injected -->
          </div>
        </div>

      </main>
    </div>

    <!-- MORE SHEET (installments + projection) -->
    <div
      id="more-overlay"
      class="fixed inset-0 z-[55] bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 flex items-end sm:items-center justify-center p-0 sm:p-4"
    >
      <div
        id="more-sheet"
        class="bg-slate-900 w-full max-w-2xl rounded-t-3xl sm:rounded-3xl border border-white/5 shadow-2xl flex flex-col max-h-[85vh] translate-y-full sm:translate-y-6 sm:opacity-0 transition-all duration-400 ease-out"
      >
        <div class="flex items-center justify-between px-6 pt-5 pb-3 flex-shrink-0">
          <h3 class="text-lg font-black uppercase tracking-wide text-white">Overview</h3>
          <button onclick="closeMore()" class="w-10 h-10 flex items-center justify-center bg-slate-800 rounded-xl">
            <span class="material-icons text-slate-400">close</span>
          </button>
        </div>
        <div id="more-body" class="px-6 pb-8 space-y-4 overflow-y-auto custom-scrollbar">
          <!-- installments + projection injected -->
        </div>
      </div>
    </div>

    <!-- MODAL POPUP -->
    <div
      id="modal-overlay"
      class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 flex items-end sm:items-center justify-center p-4"
    >
      <div
        id="modal-content"
        class="bg-slate-800 w-full max-w-md rounded-t-2xl sm:rounded-2xl p-8 translate-y-full transition-transform duration-500 ease-out shadow-2xl border border-white/5 flex flex-col max-h-[90vh]"
      >
        <div
          class="w-12 h-1.5 bg-slate-700 rounded-full mx-auto mb-6 sm:hidden flex-shrink-0"
        ></div>
        <div class="flex justify-between items-start mb-6 flex-shrink-0">
          <h3
            id="modal-title"
            class="text-2xl font-black uppercase tracking-tight text-white"
          >
            Edit Item
          </h3>
          <button
            id="delete-btn"
            class="text-rose-500 p-2 hidden transition-transform"
          >
            <span class="material-icons">delete_outline</span>
          </button>
        </div>

        <div
          id="modal-body"
          class="space-y-6 overflow-y-auto pr-2 custom-scrollbar flex-1"
        >
          <!-- Inputs injected dynamically -->
        </div>

        <div class="mt-8 flex gap-4 flex-shrink-0">
          <button
            onclick="closeModal()"
            class="flex-1 py-5 font-bold text-slate-400 bg-slate-700/50 rounded-2xl transition-transform"
          >
            Cancel
          </button>
          <button
            id="save-btn"
            onclick="saveModal()"
            class="flex-1 py-5 font-bold text-white bg-indigo-600 rounded-2xl transition-transform shadow-lg shadow-indigo-900/40 disabled:opacity-50 disabled:pointer-events-none"
          >
            Save
          </button>
        </div>
      </div>
    </div>

    <!-- MONTH PICKER -->
    <div
      id="month-picker"
      class="fixed inset-0 z-[55] bg-slate-950/95 backdrop-blur-lg opacity-0 pointer-events-none transition-opacity duration-300 overflow-y-auto"
    >
      <div id="month-picker-grid" class="p-8 pb-28 space-y-6">
        <!-- Year groups injected -->
      </div>
      <button
        onclick="toggleMonthPicker()"
        class="fixed bottom-8 left-1/2 -translate-x-1/2 w-14 h-14 flex items-center justify-center bg-slate-800 rounded-full shadow-2xl transition-transform aspect-square"
      >
        <span class="material-icons">close</span>
      </button>
    </div>

    <!-- CONFIRM MODAL -->
    <div
      id="confirm-overlay"
      class="fixed inset-0 z-[70] bg-black/70 backdrop-blur-md opacity-0 pointer-events-none transition-all duration-300 flex items-center justify-center p-6"
    >
      <div
        id="confirm-card"
        class="bg-slate-800 w-full max-w-sm rounded-2xl p-8 scale-90 opacity-0 transition-all duration-500 ease-out shadow-2xl border border-white/5 space-y-6"
      >
        <div class="flex justify-center">
          <div
            id="confirm-icon"
            class="w-16 h-16 rounded-[1.5rem] bg-gradient-to-br from-rose-500 to-red-600 flex items-center justify-center shadow-lg shadow-rose-500/20"
          >
            <span class="material-icons text-white text-3xl">delete_outline</span>
          </div>
        </div>
        <h3 id="confirm-title" class="text-xl font-black text-white text-center">
          Delete item?
        </h3>
        <p id="confirm-sub" class="text-sm text-slate-400 text-center">
          This removes it from every month.
        </p>
        <div class="space-y-2 pt-2">
          <button
            id="confirm-action-btn"
            class="w-full py-4 font-black text-white bg-rose-600 rounded-2xl transition-transform shadow-lg shadow-rose-900/30"
          >
            Delete
          </button>
          <button
            onclick="closeConfirm()"
            class="w-full py-4 font-bold text-slate-400 bg-slate-700/50 rounded-2xl transition-transform"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div
      id="toast"
      class="fixed top-6 left-1/2 -translate-x-1/2 z-[80] px-5 py-3 bg-slate-800 border border-white/10 rounded-2xl shadow-2xl flex items-center gap-3 opacity-0 -translate-y-4 pointer-events-none transition-all duration-500"
    >
      <span id="toast-icon" class="material-icons text-emerald-400 text-lg"
        >check_circle</span
      >
      <span id="toast-text" class="text-sm font-bold text-white">Done!</span>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
