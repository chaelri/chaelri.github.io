<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Happy 4th Monthsary, Love!</title>
    <link rel="stylesheet" href="styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;700&family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="Chalee1.png" />
  </head>
  <body>
    <!-- 🔹 Firebase Login Card -->
    <div id="login-container" class="signin-card">
      <h1 class="pacifico-regular signin-title">For Charlie &amp; Karla 💕</h1>
      <p class="signin-subtitle">Sign in to peek inside</p>
      <button id="googleSignIn" class="signin-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2a10 10 0 0 0-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92A8.78 8.78 0 0 0 17.64 9.2z"/>
          <path fill="#34A853" d="M9 18a8.6 8.6 0 0 0 5.96-2.18l-2.92-2.26a5.4 5.4 0 0 1-8.06-2.84H.96v2.34A9 9 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.98 10.72a5.4 5.4 0 0 1 0-3.44V4.94H.96a9 9 0 0 0 0 8.12l3.02-2.34z"/>
          <path fill="#EA4335" d="M9 3.58a4.86 4.86 0 0 1 3.44 1.34L15.04 2.34A8.6 8.6 0 0 0 9 0 9 9 0 0 0 .96 4.94l3.02 2.34A5.4 5.4 0 0 1 9 3.58z"/>
        </svg>
        Sign in with Google
      </button>
      <p id="signInStatus" class="signin-status"></p>
    </div>
    <section id="protected-content" style="display: none">
      <div class="container">
        <div class="online-wrapper">
          <p id="online-status" class="zain-bold"></p>
          <button id="sign-out-button">Sign Out</button>
        </div>

        <h1 class="pacifico-regular monthsary">Happy 4th monthsary, love!</h1>
        <div class="zain-bold missmoko">Miss mo ko love? 🥹</div>

        <div id="counter-container">
          <img
            src="Chalee1.png"
            id="clickableImage"
            class="clickable-image"
            alt="Chalee"
          />
          <div id="floating-text-container"></div>
          <div id="counter-text">Miss counter: <span id="counter"></span></div>
          <!-- New section to display click timestamps -->
          <div id="click-history-container">
            <h3>Click History:</h3>
            <ul id="click-history"></ul>
          </div>
        </div>
      </div>
      <!-- Open Chat Button -->
      <button id="openChat" class="chat-button">💬 Open Chat</button>

      <!-- Chat Modal -->
      <div id="chatModal" class="chat-modal">
        <div class="chat-modal-content">
          <span class="close-chat">&times;</span>
          <h2>Chalee & Karlyy's Chat 💕</h2>
          <!-- Chat Display -->
          <div id="chatBox" class="chat-box"></div>

          <!-- Real-time Typing Display -->
          <div id="typingCharlie" class="typing-indicator"></div>
          <div id="typingKarla" class="typing-indicator"></div>

          <div class="send-message-wrapper">
            <!-- Input Box -->
            <textarea
              id="messageInput"
              placeholder="Type a message..."
            ></textarea>

            <!-- Send Button -->
            <button id="sendMessage">Send</button>
          </div>
        </div>
      </div>
    </section>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="script.js"></script>

    <audio id="apaSound" preload="auto">
      <source src="apa.mp3" type="audio/mpeg" />
    </audio>
    <audio id="ilySound" preload="auto">
      <source src="ily.mp3" type="audio/mpeg" />
    </audio>
    <audio id="whoAmIToYouSound" preload="auto">
      <source src="who am i to you.mp3" type="audio/mpeg" />
    </audio>
    <audio id="hmmmpSound" preload="auto">
      <source src="hmmmp.mp3" type="audio/mpeg" />
    </audio>
  </body>
</html>
