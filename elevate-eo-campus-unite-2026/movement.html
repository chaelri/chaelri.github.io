<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Count Me In — Campus UNITE 2026</title>

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/favicon.svg" />
  <meta name="theme-color" content="#14100a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Count Me In" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta property="og:title" content="Count Me In — Campus UNITE 2026" />
  <meta property="og:description" content="I want to be part of a Campus Movement / Small Group. Elevate East Ortigas." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

  <style>
    /* ===== Fonts (self-hosted from Downloads) ===== */
    @font-face {
      font-family: "Champion Featherweight";
      src: url("assets/fonts/Champion-HTF-Featherweight.otf") format("opentype");
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: "Helvetica Neue Bold";
      src: url("assets/fonts/HelveticaNeueBold.otf") format("opentype");
      font-weight: 700; font-style: normal; font-display: swap;
    }

    :root {
      --blue:   #0866ff;
      --blue-d: #0a4fc4;
      --red:    #d00000;
      --red-d:  #9e0000;
      --yellow: #fbc627;
      --yellow-d:#e0aa12;
      --ink:    #111111;
      --card:   #17130c;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; height: 100%;
      background: #8a5a2b url("assets/corkboard.jpg") center/cover no-repeat fixed;
      color: #fff;
      font-family: "Helvetica Neue Bold", "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(120% 90% at 50% 40%, rgba(0,0,0,0) 55%, rgba(60,30,10,0.28) 100%);
    }
    .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; vertical-align: middle; }

    /* ============ SHARED ============ */
    .lead {
      display: block;
      font-family: "Helvetica Neue Bold", sans-serif;
      color: #fff; letter-spacing: -0.02em;
      text-shadow: 0 2px 8px rgba(40,20,5,0.55), 0 1px 0 rgba(0,0,0,0.25);
      line-height: 0.95;
    }
    .tag {
      display: inline-block; background: var(--yellow); color: var(--ink);
      font-family: "Champion Featherweight", Impact, sans-serif;
      font-weight: 400; line-height: 0.9; padding: 0.16em 0.34em 0.08em;
      box-shadow: 0 6px 16px rgba(0,0,0,0.30);
    }
    .dot { border-radius: 50%; display: block; }
    .dot.blue { background: var(--blue); box-shadow: 0 5px 12px rgba(0,0,0,0.30); }
    .dot.red  { background: var(--red);  box-shadow: 0 5px 12px rgba(0,0,0,0.30); }

    .screen { position: relative; z-index: 1; min-height: 100dvh; display: none; }
    .screen.active { display: block; }

    /* ================================================================
       CHOOSE — corkboard composition (matches the Canva)
       ================================================================ */
    .board { position: relative; width: 100%; min-height: 100dvh; overflow: hidden; }

    .diagonal { position: absolute; inset: 0; width: 100%; height: 100%;
      z-index: 2; pointer-events: none; transition: opacity .4s ease; }
    .dg-port { display: none; }

    .opt {
      position: absolute; z-index: 3; display: block; text-align: left;
      border: none; background: none; cursor: pointer; padding: 0; margin: 0;
      transition: left .55s cubic-bezier(.2,.7,.2,1), top .55s cubic-bezier(.2,.7,.2,1),
                  transform .55s cubic-bezier(.2,.7,.2,1), opacity .4s ease, width .55s cubic-bezier(.2,.7,.2,1);
    }
    .opt .dot { margin-bottom: 0.55em; }
    .opt .lead { font-size: clamp(1.05rem, 3vw, 2.7rem); margin: 0 0 0.28em; }
    .opt .tag  { font-size: clamp(2.1rem, 6.1vw, 5.6rem); }

    .opt-movement { left: 6%;  top: 20%; width: 52%; }
    .opt-movement .dot { width: clamp(2.6rem, 6.7vw, 8rem); aspect-ratio: 1; margin-left: 26%; }
    /* right edge lands at 49%+45% = 94% → 6% margin from the right, mirroring
       .opt-movement's 6% from the left. */
    .opt-dgroup   { left: 49%; top: 56%; width: 45%; text-align: right; }
    .opt-dgroup .dot { width: clamp(2.9rem, 8vw, 9rem); aspect-ratio: 1; margin-left: auto; margin-right: 10%; }

    .opt:hover { filter: brightness(1.04); }
    .opt:active { transform: scale(0.985); }
    .opt.done-hidden { display: none; }

    .board.picking .diagonal { opacity: 0; }
    .board.picking .opt:not(.chosen) { opacity: 0; transform: scale(0.82); pointer-events: none; }
    .board.picking .opt.chosen {
      left: 50%; top: 42%; width: min(88%, 720px);
      transform: translate(-50%, -50%); text-align: center;
    }
    .board.picking .opt.chosen .dot { margin-left: auto; margin-right: auto; }
    .board.picking .opt.chosen .lead { font-size: clamp(1.3rem, 5vw, 3rem); }
    .board.picking .opt.chosen .tag  { font-size: clamp(2.6rem, 9vw, 6rem); }

    /* confirm bar — punchy dark, no sticky note */
    .confirm-bar {
      position: fixed; left: 50%; bottom: max(1rem, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(150%);
      z-index: 6; width: min(94%, 480px);
      background: linear-gradient(180deg, #201a10 0%, #14100a 100%);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px; padding: 1.05rem 1.1rem 1.15rem;
      box-shadow: 0 26px 54px rgba(0,0,0,0.6), 0 6px 0 rgba(0,0,0,0.25);
      opacity: 0; transition: transform .45s cubic-bezier(.2,.7,.2,1), opacity .35s ease;
      text-align: center;
    }
    .confirm-bar.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .confirm-q { font-family: "Helvetica Neue Bold", sans-serif; color: #fff;
      font-size: 1rem; letter-spacing: -0.01em; margin: 0.1rem 0 0.95rem; }
    .confirm-q b { color: var(--red); }
    .confirm-q.blue b { color: #4d93ff; }
    .actions { display: flex; gap: 0.6rem; }
    .btn {
      flex: 1; font-family: "Helvetica Neue Bold", sans-serif; text-transform: uppercase;
      letter-spacing: 0.05em; font-size: 0.94rem; border: none; border-radius: 0;
      padding: 0.9rem 0.6rem; cursor: pointer; display: inline-flex; align-items: center;
      justify-content: center; gap: 0.35rem; transition: transform .12s ease, filter .12s ease;
    }
    .btn:active { transform: scale(0.97); }
    .btn-cancel { background: transparent; color: #ded3bd; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.22); }
    .btn-cancel:hover { box-shadow: inset 0 0 0 2px rgba(255,255,255,0.4); }
    .btn-continue { color: #fff; }
    .btn-continue.blue { background: var(--blue); }
    .btn-continue.red  { background: var(--red); }
    .btn-continue:disabled { opacity: 0.6; cursor: default; }

    /* "you're in as" pill */
    .whoami {
      position: fixed; top: max(0.9rem, env(safe-area-inset-top)); left: 50%;
      transform: translateX(-50%); z-index: 5;
      background: rgba(20,10,2,0.62); color: #fff; backdrop-filter: blur(4px);
      font-family: "Helvetica Neue Bold", sans-serif; font-size: 0.72rem;
      letter-spacing: 0.04em; padding: 0.4rem 0.9rem; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18); white-space: nowrap; max-width: 90vw;
      overflow: hidden; text-overflow: ellipsis;
    }
    .whoami .nm { color: var(--yellow); }

    /* ================================================================
       CARD — dark, punchy (gate + done). Taped to the cork.
       ================================================================ */
    .card-wrap { min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      padding: clamp(1.5rem, 6vw, 3rem) 1.1rem; }
    .card {
      position: relative; width: 100%; max-width: 470px;
      background: linear-gradient(180deg, #201a10 0%, #14100a 100%);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 18px;
      padding: clamp(2.2rem, 7vw, 3rem) clamp(1.4rem, 5vw, 2rem) clamp(1.7rem,5vw,2.2rem);
      box-shadow: 0 36px 74px rgba(20,10,2,0.64), 0 8px 0 rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.10);
      animation: pop .45s cubic-bezier(.2,.7,.2,1) both;
    }
    .card::before, .card::after {
      content: ""; position: absolute; top: -12px; width: 90px; height: 26px;
      background: repeating-linear-gradient(90deg, rgba(251,198,39,0.9) 0 8px, rgba(240,186,20,0.9) 8px 9px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
    }
    .card::before { left: 24px; transform: rotate(-6deg); }
    .card::after  { right: 24px; transform: rotate(5deg); }

    .card-logo { display: block; width: min(78%, 320px); height: auto; margin: 0 auto 0.4rem;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.5)); }
    .card-cta { text-align: center; margin: 0.2rem auto 0.1rem; }
    .card-cta .tag { font-size: clamp(1.9rem, 8vw, 2.6rem); transform: rotate(-2deg); }
    .card-sub { text-align: center; color: #d9cfbb; font-size: 0.94rem; margin: 1rem 0 1.5rem;
      font-family: "Helvetica Neue Bold", sans-serif; font-weight: 700; line-height: 1.35; }

    /* controls — flat, bold, no rounded corners */
    .scan-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.55rem;
      background: var(--blue); color: #fff; font-family: "Helvetica Neue Bold", sans-serif;
      font-size: 1.02rem; text-transform: uppercase; letter-spacing: 0.04em;
      border: none; border-radius: 0; padding: 1.05rem; cursor: pointer;
      box-shadow: 0 10px 22px rgba(8,60,180,0.35); transition: transform .12s ease, filter .12s ease;
    }
    .scan-btn:active { transform: scale(0.985); filter: brightness(0.96); }
    .scan-btn .material-symbols-outlined { font-size: 1.5rem; }
    .or-div { display: flex; align-items: center; gap: 0.8rem; color: #9a8a63;
      margin: 1rem 0; font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.18em; }
    .or-div::before, .or-div::after { content: ""; flex: 1; height: 1px; background: rgba(255,255,255,0.12); }

    /* input + GO connected, flat (no gap, no radius) */
    .ticket-row { display: flex; gap: 0; }
    .ticket-input {
      flex: 1; min-width: 0; background: #fffdf6; border: 2px solid #000; border-right: none;
      border-radius: 0; color: var(--ink); font-family: "Helvetica Neue Bold", sans-serif;
      font-size: 1.12rem; letter-spacing: 0.05em; text-align: center; text-transform: uppercase;
      padding: 0.95rem 0.7rem;
    }
    .ticket-input::placeholder { color: #b8a06a; letter-spacing: 0.02em; text-transform: none; }
    .ticket-input:focus { outline: none; }
    .go-btn {
      background: var(--red); color: #fff; border: 2px solid #000; border-radius: 0; padding: 0 1.3rem;
      font-family: "Helvetica Neue Bold", sans-serif; font-size: 1rem; text-transform: uppercase;
      letter-spacing: 0.04em; cursor: pointer; min-height: 3.3rem; display: flex; align-items: center;
      justify-content: center; gap: 0.3rem; transition: filter .12s ease; }
    .go-btn:active { filter: brightness(0.92); }
    .go-btn:disabled { opacity: 0.55; }
    .name-note { color: var(--yellow); font-family: "Helvetica Neue Bold", sans-serif;
      font-size: 0.86rem; text-align: center; margin: 0.2rem 0 0.7rem; }
    .gate-err { color: #ff8a8a; font-size: 0.85rem; text-align: center; margin-top: 0.9rem;
      min-height: 1.1rem; font-family: "Helvetica Neue Bold", sans-serif; font-weight: 700; }

    /* done */
    .done-check {
      width: 74px; height: 74px; border-radius: 50%; margin: 0 auto 1.2rem;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(120% 120% at 30% 25%, #6be08a 0%, #17a34a 55%, #0f7a37 100%);
      box-shadow: 0 12px 28px rgba(23,163,74,0.4), inset 0 3px 0 rgba(255,255,255,0.35);
    }
    .done-check .material-symbols-outlined { font-size: 2.5rem; color: #fff; }
    .done-msg { text-align: center; font-family: "Helvetica Neue Bold", sans-serif;
      color: #fff; font-size: clamp(1.25rem, 5.4vw, 1.7rem); line-height: 1.18; letter-spacing: -0.02em; }
    .done-msg .hl-tag { display: inline-block; background: var(--yellow); color: var(--ink);
      font-family: "Champion Featherweight", Impact, sans-serif; font-weight: 400;
      padding: 0.06em 0.24em; line-height: 1; letter-spacing: 0.01em; transform: rotate(-1.5deg);
      font-size: 1.3em; margin: 0.14em 0.06em; }
    .done-name { color: #4d93ff; font-weight: 700; }
    .done-name.red { color: #ff5a5a; }
    .done-foot { text-align: center; color: #b6a988; font-size: 0.85rem; margin-top: 1.4rem;
      font-family: "Helvetica Neue Bold", sans-serif; font-weight: 700; }
    .done-again { display: block; margin: 1.2rem auto 0; background: transparent;
      color: #ded3bd; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.22);
      border: none; border-radius: 0; padding: 0.8rem 1.4rem; cursor: pointer;
      font-family: "Helvetica Neue Bold", sans-serif; text-transform: uppercase; letter-spacing: 0.05em;
      font-size: 0.82rem; }
    .done-again:hover { box-shadow: inset 0 0 0 2px rgba(255,255,255,0.4); }

    /* scanner overlay */
    .scanner { position: fixed; inset: 0; z-index: 50; background: rgba(15,8,2,0.96);
      display: none; flex-direction: column; align-items: center; justify-content: center; padding: 1.25rem; }
    .scanner.show { display: flex; }
    .scanner-box { width: 100%; max-width: 420px; }
    #qr-reader { width: 100%; border-radius: 0; overflow: hidden; background: #000; }
    .scanner h3 { font-family: "Helvetica Neue Bold", sans-serif; text-align: center; color: #fff; margin: 0 0 0.35rem; }
    .scanner p { text-align: center; color: #d8c7a5; font-size: 0.86rem; margin: 0 0 1rem;
      font-family: "Helvetica Neue Bold", sans-serif; font-weight: 700; }
    .scanner-close { margin-top: 1rem; width: 100%; background: var(--yellow); color: var(--ink);
      border: none; border-radius: 0; padding: 0.95rem; cursor: pointer;
      font-family: "Helvetica Neue Bold", sans-serif; text-transform: uppercase; letter-spacing: 0.04em; }

    .hidden { display: none !important; }
    .spin { animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pop { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: none; } }

    /* ---- Portrait: shallow top/bottom split so each option stays whole ---- */
    @media (max-aspect-ratio: 3/4) {
      .dg-land { display: none; }
      .dg-port { display: block; }
      .opt .lead { font-size: clamp(1.1rem, 4.6vw, 2rem); }
      .opt .tag  { font-size: clamp(2.6rem, 11vw, 4.4rem); }
      .opt-movement { left: 6%; top: 12%; width: 88%; }
      .opt-movement .dot { width: 15vw; margin-left: 22%; }
      .opt-dgroup   { left: 6%; top: 64%; width: 88%; text-align: right; }
      .opt-dgroup .dot { width: 16vw; margin-left: auto; margin-right: 12%; }
      .board.picking .opt.chosen { top: 40%; width: 92%; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, .opt, .card, .confirm-bar { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <!-- ============ STATE 1: GATE ============ -->
  <section id="screen-gate" class="screen active">
    <div class="card-wrap">
      <div class="card">
        <img class="card-logo" src="assets/campus-unite-logo.png" alt="Campus UNITE — Elevate's 13th Anniversary" />
        <div class="card-cta"><span class="tag">COUNT ME IN</span></div>
        <p class="card-sub">Scan your ticket QR to begin,<br>or type your ticket number.</p>

        <button id="scan-open" class="scan-btn" type="button">
          <span class="material-symbols-outlined">qr_code_scanner</span>
          Scan ticket QR
        </button>

        <div class="or-div">or</div>

        <div class="ticket-row">
          <input id="ticket-input" class="ticket-input" type="text" inputmode="text"
                 autocomplete="off" placeholder="ECU-0042" aria-label="Ticket number" />
          <button id="ticket-go" class="go-btn" type="button">
            <span id="go-label">Go</span>
            <span id="go-spin" class="material-symbols-outlined spin hidden">progress_activity</span>
          </button>
        </div>

        <!-- Most attendees aren't registered → ask for their full name -->
        <div id="name-fallback" class="hidden" style="margin-top:1.1rem;">
          <div class="name-note">Nice! What's your full name?</div>
          <div class="ticket-row">
            <input id="name-input" class="ticket-input" type="text" style="text-transform:none;letter-spacing:0.01em;"
                   autocomplete="name" placeholder="Your full name" aria-label="Your full name" />
            <button id="name-go" class="go-btn" type="button">Next</button>
          </div>
        </div>

        <div id="gate-err" class="gate-err"></div>
      </div>
    </div>
  </section>

  <!-- ============ STATE 2: CHOOSE ============ -->
  <section id="screen-choose" class="screen">
    <div class="whoami hidden" id="whoami">You're in as <span class="nm" id="whoami-name">Friend</span></div>
    <div class="board" id="board">
      <svg class="diagonal" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <g class="dg-land">
          <line x1="85" y1="0" x2="15" y2="100" stroke="#ec1c24" stroke-width="7" vector-effect="non-scaling-stroke" />
          <line x1="86.6" y1="0" x2="16.6" y2="100" stroke="#111111" stroke-width="3" vector-effect="non-scaling-stroke" />
        </g>
        <g class="dg-port">
          <line x1="0" y1="42" x2="100" y2="60" stroke="#ec1c24" stroke-width="7" vector-effect="non-scaling-stroke" />
          <line x1="0" y1="40.2" x2="100" y2="58.2" stroke="#111111" stroke-width="3" vector-effect="non-scaling-stroke" />
        </g>
      </svg>

      <button class="opt opt-movement" type="button" data-choice="movement">
        <span class="dot blue"></span>
        <span class="lead">I want to be part of a</span>
        <span class="tag">CAMPUS MOVEMENT</span>
      </button>

      <button class="opt opt-dgroup" type="button" data-choice="dgroup">
        <span class="dot red"></span>
        <span class="lead">I want to be part of a</span>
        <span class="tag">SMALL GROUP</span>
      </button>
    </div>

    <div class="confirm-bar" id="confirm-bar">
      <div class="confirm-q" id="confirm-q"></div>
      <div class="actions">
        <button class="btn btn-cancel" id="btn-cancel" type="button">Cancel</button>
        <button class="btn btn-continue" id="btn-continue" type="button">
          <span id="cont-label">Continue</span>
          <span id="cont-spin" class="material-symbols-outlined spin hidden">progress_activity</span>
        </button>
      </div>
    </div>
  </section>

  <!-- ============ STATE 3: DONE ============ -->
  <section id="screen-done" class="screen">
    <div class="card-wrap">
      <div class="card">
        <div class="done-check"><span class="material-symbols-outlined">check</span></div>
        <div class="done-msg" id="done-msg"></div>
        <div class="done-foot">We'll reach out to you soon — see you on campus!</div>
        <button class="done-again hidden" id="done-again" type="button">Choose the other one too</button>
      </div>
    </div>
  </section>

  <!-- Scanner overlay -->
  <div class="scanner" id="scanner">
    <div class="scanner-box">
      <h3>Point at your ticket QR</h3>
      <p>Allow camera access, then hold the QR steady in the frame.</p>
      <div id="qr-reader"></div>
      <button class="scanner-close" id="scanner-close" type="button">Cancel</button>
    </div>
  </div>

  <script type="module">
    import {
      ensureAnonAuth, get, set,
      ticketRef, registrationRef, interestRef,
    } from "./js/firebase.js";

    const CHOICES = {
      movement: { tag: "CAMPUS MOVEMENT", label: "join the campus movement", color: "blue",
                  q: "You want to be part of a <b>Campus Movement</b>." },
      dgroup:   { tag: "SMALL GROUP", label: "be part of a small group", color: "red",
                  q: "You want to be part of a <b>Small Group</b>." },
    };

    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[m]));

    let currentTicket = null, currentName = null, pendingChoice = null;
    const chosen = new Set();   // choices already submitted for this ticket

    ensureAnonAuth().catch((e) => console.warn("auth", e));

    function showScreen(id) {
      ["screen-gate", "screen-choose", "screen-done"].forEach(s =>
        $(s).classList.toggle("active", s === id));
      window.scrollTo({ top: 0 });
    }

    // ---------- Ticket normalization ----------
    function normalizeTicket(raw) {
      if (!raw) return null;
      let s = String(raw).trim();
      const m = s.match(/[?&]id=([^&#\s]+)/i);
      if (m) s = decodeURIComponent(m[1]);
      s = s.trim().toUpperCase();
      let digits = null;
      const em = s.match(/ECU[-\s]?0*(\d{1,4})/);
      if (em) digits = em[1];
      else if (/^\d{1,4}$/.test(s)) digits = s;
      if (!digits) return null;
      const n = parseInt(digits, 10);
      if (!(n >= 1 && n <= 1000)) return null;
      return "ECU-" + String(n).padStart(4, "0");
    }

    // ---------- Gate ----------
    function setGateBusy(b) {
      $("go-label").classList.toggle("hidden", b);
      $("go-spin").classList.toggle("hidden", !b);
      $("ticket-go").disabled = b;
    }
    const gateErr = (m) => { $("gate-err").textContent = m || ""; };

    async function lookupTicket(raw) {
      const id = normalizeTicket(raw);
      if (!id) { gateErr("Hmm, that doesn't look like a ticket number. Try ECU-0042."); return; }
      gateErr(""); setGateBusy(true);
      try {
        await ensureAnonAuth();
        const snap = await get(ticketRef(id));
        if (!snap.exists()) { gateErr(`Ticket ${id} isn't in the system. Double-check your number.`); return; }
        const t = snap.val() || {};
        currentTicket = id;
        currentName = (t.name || "").trim();
        if (!currentName) {
          try { const rs = await get(registrationRef(id)); currentName = ((rs.val() || {}).name || "").trim(); } catch (_) {}
        }
        // Most attendees aren't registered yet → ask their full name.
        if (!currentName) { showNameFallback(); return; }
        goChoose();
      } catch (err) {
        console.error(err);
        gateErr("Couldn't reach the server. Check your connection and try again.");
      } finally { setGateBusy(false); }
    }

    function showNameFallback() {
      $("name-fallback").classList.remove("hidden");
      gateErr(""); setTimeout(() => $("name-input").focus(), 60);
    }

    $("ticket-go").addEventListener("click", () => lookupTicket($("ticket-input").value));
    $("ticket-input").addEventListener("keydown", (e) => { if (e.key === "Enter") lookupTicket($("ticket-input").value); });
    $("name-go").addEventListener("click", () => {
      const nm = $("name-input").value.trim();
      if (nm.length < 2) { gateErr("Please type your full name so we know who to reach out to."); return; }
      currentName = nm; goChoose();
    });
    $("name-input").addEventListener("keydown", (e) => { if (e.key === "Enter") $("name-go").click(); });

    // ---------- Choose ----------
    function firstName(full) {
      full = (full || "").trim();
      if (full.includes(",")) {                       // "Last, First Middle" → First
        const after = (full.split(",")[1] || "").trim().split(/\s+/)[0];
        if (after) return after;
      }
      return full.split(/\s+/)[0] || "Friend";
    }

    function goChoose() {
      $("whoami-name").textContent = firstName(currentName);
      $("whoami").classList.remove("hidden");
      resetBoard();
      // Already-submitted choices don't show again.
      $("board").querySelectorAll(".opt").forEach(o =>
        o.classList.toggle("done-hidden", chosen.has(o.dataset.choice)));
      showScreen("screen-choose");
    }

    function resetBoard() {
      pendingChoice = null;
      const b = $("board");
      b.classList.remove("picking");
      b.querySelectorAll(".opt").forEach(o => o.classList.remove("chosen"));
      $("confirm-bar").classList.remove("show");
    }

    $("board").addEventListener("click", (e) => {
      const opt = e.target.closest(".opt");
      if (opt && !opt.classList.contains("done-hidden")) pick(opt.dataset.choice);
    });

    function pick(choice) {
      if (!CHOICES[choice]) return;
      pendingChoice = choice;
      const b = $("board");
      b.querySelectorAll(".opt").forEach(o => o.classList.toggle("chosen", o.dataset.choice === choice));
      b.classList.add("picking");
      const meta = CHOICES[choice];
      const q = $("confirm-q");
      q.innerHTML = meta.q;
      q.classList.toggle("blue", meta.color === "blue");
      const cont = $("btn-continue");
      cont.classList.remove("blue", "red"); cont.classList.add(meta.color);
      setTimeout(() => $("confirm-bar").classList.add("show"), 260);
    }

    $("btn-cancel").addEventListener("click", resetBoard);

    // ---------- Continue → write + done ----------
    function setContBusy(b) {
      $("cont-label").classList.toggle("hidden", b);
      $("cont-spin").classList.toggle("hidden", !b);
      $("btn-continue").disabled = b; $("btn-cancel").disabled = b;
    }

    $("btn-continue").addEventListener("click", async () => {
      if (!pendingChoice || !currentTicket) return;
      setContBusy(true);
      try {
        await ensureAnonAuth();
        const all = new Set(chosen); all.add(pendingChoice);
        const choicesMap = {};
        all.forEach(c => { choicesMap[c] = true; });
        await set(interestRef(currentTicket), {
          choice: pendingChoice,                 // most recent (satisfies rules .validate)
          choiceLabel: CHOICES[pendingChoice].label,
          choices: choicesMap,                   // every option this person opted into
          ticketId: currentTicket,
          name: currentName || "",
          createdAt: Date.now(),
        });
        chosen.add(pendingChoice);
        showDone(pendingChoice);
      } catch (err) {
        console.error(err);
        setContBusy(false);
        $("confirm-q").innerHTML = `<span style="color:#ff8a8a;">Couldn't save that — try again in a sec.</span>`;
      }
    });

    function showDone(choice) {
      const meta = CHOICES[choice];
      const nm = esc(currentName || "friend");
      $("done-msg").innerHTML =
        `Thank you for your interest to be part of a ` +
        `<span class="hl-tag">${esc(meta.tag)}</span>. ` +
        `We'll reach out to you, <span class="done-name ${meta.color}">${nm}</span>!`;
      // Offer the other option only if it hasn't been chosen yet.
      const remaining = Object.keys(CHOICES).some(c => !chosen.has(c));
      $("done-again").classList.toggle("hidden", !remaining);
      setContBusy(false);
      $("whoami").classList.add("hidden");
      showScreen("screen-done");
    }

    $("done-again").addEventListener("click", () => { goChoose(); });

    // ---------- QR scanner ----------
    let scanner = null;
    async function ensureScannerLib() {
      if (window.Html5Qrcode) return;
      await new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = "https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js";
        s.onload = resolve; s.onerror = reject; document.head.appendChild(s);
      });
    }
    async function openScanner() {
      gateErr(""); $("scanner").classList.add("show");
      try {
        await ensureScannerLib();
        scanner = new Html5Qrcode("qr-reader", { verbose: false });
        await scanner.start({ facingMode: "environment" },
          { fps: 10, qrbox: { width: 220, height: 220 } },
          (decoded) => onScan(decoded), () => {});
      } catch (err) {
        console.error(err); closeScanner();
        gateErr("Couldn't open the camera. Type your ticket number instead.");
      }
    }
    async function closeScanner() {
      $("scanner").classList.remove("show");
      if (scanner) { try { await scanner.stop(); await scanner.clear(); } catch (_) {} scanner = null; }
    }
    function onScan(decoded) {
      const id = normalizeTicket(decoded);
      if (!id) return;
      $("ticket-input").value = id;
      closeScanner().then(() => lookupTicket(id));
    }
    $("scan-open").addEventListener("click", openScanner);
    $("scanner-close").addEventListener("click", closeScanner);

    // Deep-link: movement.html?id=ECU-0042 skips the gate.
    const urlId = new URLSearchParams(location.search).get("id");
    if (urlId) { $("ticket-input").value = normalizeTicket(urlId) || urlId; lookupTicket(urlId); }
  </script>
</body>
</html>
