<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raffle — Campus UNITE 2026</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="alternate icon" href="assets/elevate-logo-red.png" />
  <link rel="apple-touch-icon" href="assets/favicon.svg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#07091a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CU 2026" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-deep min-h-screen">

  <header class="px-4 sm:px-8 py-4 flex items-center justify-between border-b border-[color:var(--line)]">
    <a href="index.html" class="flex items-center gap-3">
      <img src="assets/elevate-east-ortigas.png" alt="Elevate East Ortigas" class="h-10 sm:h-12" />
      <img src="assets/campus-unite-logo.png" alt="Campus UNITE" class="h-10 sm:h-12 hidden sm:inline" />
    </a>
    <nav class="flex items-center gap-1 sm:gap-2 text-sm">
      <a href="index.html" class="btn-ghost"><span class="material-symbols-outlined" style="font-size:18px">home</span><span class="hidden sm:inline">Home</span></a>
      <a href="dashboard.html" class="btn-ghost"><span class="material-symbols-outlined" style="font-size:18px">groups</span><span class="hidden sm:inline">Dashboard</span></a>
      <a href="print.html" class="btn-ghost"><span class="material-symbols-outlined" style="font-size:18px">print</span><span class="hidden sm:inline">Print</span></a>
      <div id="auth-control" class="ml-1"></div>
    </nav>
  </header>

  <!-- Gate -->
  <div id="gate" class="px-4 sm:px-8 max-w-3xl mx-auto py-20 hidden">
    <div class="surface p-8 text-center">
      <span class="material-symbols-outlined text-tape" style="font-size:48px">lock</span>
      <div class="font-extrabold-ui text-xl mt-2">Admin sign-in required</div>
      <p class="text-soft mt-2 text-sm">Sign in with an allowlisted Google account to run the raffle.</p>
      <button id="btn-signin" class="btn-primary mt-6">
        <span class="material-symbols-outlined" style="font-size:18px">login</span>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- Main -->
  <main id="raffle" class="px-4 sm:px-8 max-w-5xl mx-auto py-8 sm:py-12 hidden">

    <div id="raffle-topbar" class="flex items-center gap-3 mb-4">
      <span class="tape-badge">Raffle</span>
      <span class="text-mute text-xs font-extrabold-ui uppercase tracking-widest">Registered tickets only</span>
    </div>

    <!-- Counter row -->
    <div id="raffle-counters" class="flex flex-wrap gap-2 mb-6">
      <span class="kpi-pill tape"><b id="kpi-eligible">0</b> eligible</span>
      <span class="kpi-pill"><b id="kpi-drawn">0</b> already drawn</span>
      <span class="kpi-pill red"><b id="kpi-remaining">0</b> remaining</span>
    </div>

    <!-- Big display -->
    <div class="surface relative p-6 sm:p-12 text-center">
      <!-- Winner block (name + school/fb) reveals ABOVE the number, peeking up from behind it AS ONE UNIT -->
      <div class="winner-name-wrap">
        <div class="winner-name-inner">
          <div id="winner-name" class="winner-name"></div>
          <div id="winner-extra" class="winner-extra"></div>
        </div>
      </div>

      <div class="text-mute text-xs font-extrabold-ui uppercase tracking-widest mt-1">Winning ticket</div>
      <div id="raffle-display" class="raffle-display mt-2">ECU-----</div>

      <div class="mt-8 flex items-center justify-center">
        <button id="btn-draw" class="btn-primary text-lg" style="padding:1rem 2rem;">
          Draw winner
        </button>
      </div>

      <!-- Focus-mode toggle — sits inside the raffle card's bottom-right corner -->
      <button id="btn-fullscreen" class="raffle-fs-btn hidden" title="Toggle focus mode (Esc to exit)" aria-label="Toggle focus mode">
        <span class="material-symbols-outlined" id="fs-icon" style="font-size:20px">fullscreen</span>
      </button>
    </div>

    <!-- History -->
    <section id="raffle-history" class="mt-10">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-display text-3xl text-ink">Draw history</h2>
        <span class="text-mute text-xs font-extrabold-ui uppercase tracking-widest">most recent first</span>
      </div>
      <div class="hr-tape max-w-[120px] mb-4"></div>

      <div class="surface overflow-x-auto">
        <table class="t-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Ticket</th>
              <th>Name</th>
              <th class="hidden sm:table-cell">School</th>
              <th class="hidden sm:table-cell">Drawn at</th>
              <th class="w-10"></th>
            </tr>
          </thead>
          <tbody id="history-tbody">
            <tr><td colspan="6" class="text-center text-mute py-8">No draws yet.</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script type="module">
    import {
      watchAuth, signInWithGoogle, signOutNow,
      get, set, push, onValue,
      registrationsRef, raffleDrawsRef, raffleLastDrawRef, ref, db, SCHEMA_ROOT,
    } from "./js/firebase.js";
    import { confirmModal } from "./js/modal.js";

    const $gate    = document.getElementById("gate");
    const $main    = document.getElementById("raffle");
    const $auth    = document.getElementById("auth-control");
    const $display = document.getElementById("raffle-display");
    const $name    = document.getElementById("winner-name");
    const $extra   = document.getElementById("winner-extra");
    const $draw    = document.getElementById("btn-draw");

    function renderAuth(user, isAdmin) {
      if (!user) { $auth.innerHTML = ""; return; }
      const photo = user.photoURL
        ? `<img src="${user.photoURL}" referrerpolicy="no-referrer" class="rounded-full ring-1 ring-[color:var(--tape)] object-cover shrink-0" style="width:22px;height:22px;" />`
        : `<div class="rounded-full bg-red text-on-red grid place-items-center shrink-0" style="width:22px;height:22px;font-size:10px;font-weight:800;">${(user.displayName||user.email||"?")[0].toUpperCase()}</div>`;
      $auth.innerHTML = `
        <div class="auth-pill flex items-center" style="gap:6px;padding:3px 8px 3px 3px;">
          ${photo}
          <span class="hidden md:inline truncate" style="font-size:11px;font-weight:700;max-width:8rem;">${user.displayName || user.email}</span>
          <span style="font-size:9px;padding:2px 6px;border-radius:4px;background:var(--tape);color:var(--on-tape);font-weight:800;letter-spacing:0.1em;text-transform:uppercase;">Admin</span>
          <button id="btn-signout" class="text-mute hover:text-red" title="Sign out" style="line-height:0;">
            <span class="material-symbols-outlined" style="font-size:14px">logout</span>
          </button>
        </div>`;
      document.getElementById("btn-signout").addEventListener("click", () => signOutNow());
    }

    let regsCache = {};
    let drawsCache = {};
    let unwatchRegs = null, unwatchDraws = null;

    watchAuth(({ user, isAdmin }) => {
      renderAuth(user, isAdmin);
      const $fs = document.getElementById("btn-fullscreen");
      if (!isAdmin) {
        $main.classList.add("hidden");
        $gate.classList.remove("hidden");
        $fs.classList.add("hidden");
        if (document.fullscreenElement) document.exitFullscreen().catch(() => {});
        if (unwatchRegs)  { unwatchRegs();  unwatchRegs  = null; }
        if (unwatchDraws) { unwatchDraws(); unwatchDraws = null; }
        return;
      }
      $gate.classList.add("hidden");
      $main.classList.remove("hidden");
      $fs.classList.remove("hidden");
      startListeners();
    });

    // ===== Focus mode — full-screen the raffle card, hide page chrome =====
    const $fsBtn = document.getElementById("btn-fullscreen");
    const $fsIcon = document.getElementById("fs-icon");
    $fsBtn.addEventListener("click", async () => {
      const isFull = !!document.fullscreenElement;
      try {
        if (isFull) await document.exitFullscreen();
        else await document.documentElement.requestFullscreen();
      } catch (e) {
        // Fullscreen API might be blocked — still toggle the body class so chrome hides.
        document.body.classList.toggle("raffle-focused");
        $fsIcon.textContent = document.body.classList.contains("raffle-focused") ? "fullscreen_exit" : "fullscreen";
      }
    });
    document.addEventListener("fullscreenchange", () => {
      const isFull = !!document.fullscreenElement;
      document.body.classList.toggle("raffle-focused", isFull);
      $fsIcon.textContent = isFull ? "fullscreen_exit" : "fullscreen";
    });

    document.getElementById("btn-signin").addEventListener("click", () => {
      signInWithGoogle().catch(err => { if (err && err.code !== "auth/popup-closed-by-user") alert(err.message); });
    });

    function startListeners() {
      unwatchRegs = onValue(registrationsRef(), (snap) => {
        regsCache = snap.val() || {};
        refreshCounters();
      });
      unwatchDraws = onValue(raffleDrawsRef(), (snap) => {
        drawsCache = snap.val() || {};
        refreshCounters();
        renderHistory();
      });
    }

    function refreshCounters() {
      const total = Object.keys(regsCache).length;
      const drawn = Object.keys(drawsCache).length;
      const remaining = Math.max(0, total - drawn);
      document.getElementById("kpi-eligible").textContent  = total.toLocaleString();
      document.getElementById("kpi-drawn").textContent     = drawn.toLocaleString();
      document.getElementById("kpi-remaining").textContent = remaining.toLocaleString();
    }

    function renderHistory() {
      const list = Object.entries(drawsCache).map(([k, v]) => ({ k, ...v }))
        .sort((a, b) => (b.drawnAt || 0) - (a.drawnAt || 0));
      const $tbody = document.getElementById("history-tbody");
      if (!list.length) {
        $tbody.innerHTML = `<tr><td colspan="6" class="text-center text-mute py-8">No draws yet.</td></tr>`;
        return;
      }
      $tbody.innerHTML = list.map((d, i) => `
        <tr>
          <td class="font-mono text-mute">${list.length - i}</td>
          <td class="t-ticket">${esc(d.ticketId)}</td>
          <td>${esc(d.name || "—")}</td>
          <td class="hidden sm:table-cell text-soft">${esc(d.school || "—")}</td>
          <td class="hidden sm:table-cell text-mute">${fmtDate(d.drawnAt)}</td>
          <td class="text-right pr-2">
            <button class="btn-row-del text-mute hover:text-[color:var(--red)] transition"
                    data-key="${esc(d.k)}" data-ticket="${esc(d.ticketId)}" data-name="${esc(d.name || "")}"
                    title="Remove this draw">
              <span class="material-symbols-outlined" style="font-size:18px">delete</span>
            </button>
          </td>
        </tr>
      `).join("");

      $tbody.querySelectorAll(".btn-row-del").forEach(btn => {
        btn.addEventListener("click", () => deleteDraw(btn.dataset.key, btn.dataset.ticket, btn.dataset.name));
      });
    }

    async function deleteDraw(key, ticket, name) {
      if (!key) return;
      try {
        // Drop this single draw, then re-derive lastDraw from whatever remains.
        await set(ref(db, `${SCHEMA_ROOT}/raffle/draws/${key}`), null);
        const remaining = Object.entries(drawsCache)
          .filter(([k]) => k !== key)
          .map(([, v]) => v)
          .sort((a, b) => (b.drawnAt || 0) - (a.drawnAt || 0));
        await set(raffleLastDrawRef(), remaining[0] || null);
      } catch (err) {
        alert("Delete failed: " + (err && err.message || ""));
      }
    }

    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
    }
    function fmtDate(ms) {
      if (!ms) return "—";
      try { return new Date(ms).toLocaleString("en-PH", { month:"short", day:"numeric", hour:"numeric", minute:"2-digit", hour12: true }); } catch { return "—"; }
    }

    // ===== Draw =====
    $draw.addEventListener("click", drawWinner);

    async function drawWinner() {
      // Previous winners are always excluded — same person can't win twice. Use the
      // per-row delete in history if you ever need to put someone back in the pool.
      const allRegs = Object.values(regsCache);
      const drawnIds = new Set(Object.values(drawsCache).map(d => d.ticketId));
      const pool = allRegs.filter(r => !drawnIds.has(r.ticketId));

      if (!pool.length) {
        const drawnCount = drawnIds.size;
        const totalRegs = allRegs.length;
        const noRegs = totalRegs === 0;
        confirmModal({
          title: noRegs ? "No registered students yet" : "All registered students have already won",
          message: noRegs
            ? `There are no registered attendees to draw from. Once students sign up via QR or the manual ticket form, they'll appear in the eligible pool.`
            : `All <em>${totalRegs}</em> registered student${totalRegs === 1 ? " has" : "s have"} already been drawn. Remove someone from the draw history below to put them back into the pool.`,
          confirmText: "Got it",
          singleAction: true,
          icon: noRegs ? "group_off" : "celebration",
          danger: false,
        });
        return;
      }

      // Reset: hide previous reveal so the new roll feels fresh
      $name.textContent = "";
      $extra.innerHTML = "";
      document.querySelector(".winner-name-wrap").classList.remove("is-revealed");

      $draw.disabled = true;
      $display.classList.add("raffle-rolling");

      // Visual roll: ~2.4s, accelerating sample density.
      const start = performance.now();
      const duration = 2400;
      const winner = pool[Math.floor(Math.random() * pool.length)];

      function frame(now) {
        const t = Math.min(1, (now - start) / duration);
        const sample = pool[Math.floor(Math.random() * pool.length)];
        $display.textContent = sample.ticketId;
        if (t < 1) {
          // Slow down at the end: progressively longer delays
          const delay = 30 + t * t * 220;
          setTimeout(() => requestAnimationFrame(frame), delay);
        } else {
          finalize(winner);
        }
      }
      requestAnimationFrame(frame);
    }

    async function finalize(winner) {
      $display.classList.remove("raffle-rolling");
      $display.textContent = winner.ticketId;

      // Brief pause so the number landing reads first, THEN the name peeks up from behind it.
      setTimeout(() => {
        $name.textContent = winner.name || "";
        $extra.innerHTML = `
          <span class="font-extrabold-ui uppercase tracking-wider text-tape" style="font-size:0.85em;">
            ${esc(winner.school || "—")}
          </span>
          <span class="inline-block rounded-full" style="width:6px;height:6px;background:var(--ink-mute);"></span>
          <span class="text-soft">${esc(winner.fbName || "")}</span>
        `;
        // Force a frame so the transition takes effect cleanly
        requestAnimationFrame(() => {
          document.querySelector(".winner-name-wrap").classList.add("is-revealed");
          fireWinnerConfetti();
        });
      }, 550);

      try {
        const now = Date.now();
        const drawData = {
          ticketId: winner.ticketId,
          name: winner.name,
          school: winner.school || "",
          drawnAt: now,
        };
        await push(raffleDrawsRef(), drawData);
        await set(raffleLastDrawRef(), drawData);
      } catch (err) {
        console.warn("Failed to persist draw:", err);
        alert("Saved the result locally but couldn't write to Firebase. " + (err && err.message || ""));
      } finally {
        $draw.disabled = false;
      }
    }

    // ===== Confetti — brand yellow + red only =====
    function fireWinnerConfetti() {
      if (typeof confetti !== "function") return;
      const colors = ["#f5d518", "#e11d2c"];
      const base = { colors, ticks: 220, gravity: 0.95, scalar: 1.1, disableForReducedMotion: true };
      // Two side cannons firing inward.
      confetti({ ...base, particleCount: 90, angle: 60,  spread: 70, origin: { x: 0,   y: 0.7 } });
      confetti({ ...base, particleCount: 90, angle: 120, spread: 70, origin: { x: 1,   y: 0.7 } });
      // Center burst slightly delayed for a layered finish.
      setTimeout(() => {
        confetti({ ...base, particleCount: 140, spread: 100, startVelocity: 48, origin: { x: 0.5, y: 0.55 } });
      }, 220);
    }
  </script>

</body>
</html>
