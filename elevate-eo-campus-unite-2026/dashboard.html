<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Campus UNITE 2026</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="alternate icon" href="assets/elevate-logo-red.png" />
  <link rel="apple-touch-icon" href="assets/favicon.svg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#07091a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CU 2026" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-deep min-h-screen">

  <header class="px-4 sm:px-8 py-4 flex items-center justify-between border-b border-[color:var(--line)]">
    <a href="index.html" class="flex items-center gap-3">
      <img src="assets/elevate-east-ortigas.png" alt="Elevate East Ortigas" class="h-10 sm:h-12" />
      <img src="assets/campus-unite-logo.png" alt="Campus UNITE" class="h-10 sm:h-12 hidden sm:inline" />
    </a>
    <nav class="flex items-center gap-1 sm:gap-2 text-sm">
      <a href="index.html" class="btn-ghost"><span class="material-symbols-outlined" style="font-size:18px">home</span><span class="hidden sm:inline">Home</span></a>
      <a href="print.html" class="btn-ghost"><span class="material-symbols-outlined" style="font-size:18px">print</span><span class="hidden sm:inline">Print</span></a>
      <a href="raffle.html" class="btn-ghost"><span class="material-symbols-outlined" style="font-size:18px">casino</span><span class="hidden sm:inline">Raffle</span></a>
      <div id="auth-control" class="ml-1"></div>
    </nav>
  </header>

  <!-- Gate -->
  <div id="gate" class="px-4 sm:px-8 max-w-3xl mx-auto py-20 hidden">
    <div class="surface p-8 text-center">
      <span class="material-symbols-outlined text-tape" style="font-size:48px">lock</span>
      <div class="font-extrabold-ui text-xl mt-2">Admin sign-in required</div>
      <p class="text-soft mt-2 text-sm">Sign in with an allowlisted Google account to view registered attendees.</p>
      <button id="btn-signin" class="btn-primary mt-6">
        <span class="material-symbols-outlined" style="font-size:18px">login</span>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- Main: simplified registered-list view -->
  <main id="dashboard" class="px-4 sm:px-8 max-w-6xl mx-auto py-6 sm:py-10 hidden">

    <div class="flex items-center gap-3 mb-4">
      <span class="tape-badge">Dashboard</span>
      <span class="text-mute text-xs font-extrabold-ui uppercase tracking-widest">Registered attendees</span>
    </div>

    <!-- Compact counter row -->
    <div class="flex flex-wrap gap-2 mb-6">
      <span class="kpi-pill tape"><b id="kpi-registered">0</b> registered</span>
      <span class="kpi-pill"><b id="kpi-total">0</b> tickets total</span>
      <span class="kpi-pill"><b id="kpi-available">0</b> available</span>
    </div>

    <!-- Toolbar -->
    <div class="flex items-center justify-between gap-3 flex-wrap mb-3">
      <input id="search" type="search" placeholder="Search name, school, ticket, FB…" class="input text-sm" style="padding:0.55rem 0.85rem; max-width:360px; flex:1;" />
      <div class="flex items-center gap-2">
        <button id="btn-csv" class="btn-ghost text-sm">
          <span class="material-symbols-outlined" style="font-size:18px">download</span>
          Export CSV
        </button>
      </div>
    </div>

    <!-- Registered list -->
    <section class="surface overflow-x-auto">
      <table class="t-table">
        <thead>
          <tr>
            <th class="t-sortable" data-sort="ticketId">Ticket<span class="t-sort-ind"></span></th>
            <th class="t-sortable" data-sort="name">Name<span class="t-sort-ind"></span></th>
            <th class="t-sortable hidden md:table-cell" data-sort="school">School / University<span class="t-sort-ind"></span></th>
            <th class="t-sortable hidden sm:table-cell" data-sort="gender">Gender<span class="t-sort-ind"></span></th>
            <th class="t-sortable hidden sm:table-cell" data-sort="age">Age<span class="t-sort-ind"></span></th>
            <th class="t-sortable hidden lg:table-cell" data-sort="fbName">Facebook<span class="t-sort-ind"></span></th>
            <th class="t-sortable whitespace-nowrap" data-sort="registeredAt">Registered<span class="t-sort-ind"></span></th>
            <th class="whitespace-nowrap text-right">Actions</th>
          </tr>
        </thead>
        <tbody id="recent-tbody">
          <tr><td colspan="8" class="text-center text-mute py-10">Loading…</td></tr>
        </tbody>
      </table>
    </section>

  </main>

  <script type="module">
    import {
      watchAuth, signInWithGoogle, signOutNow,
      set, update, onValue,
      ticketsRef, registrationsRef, ticketRef, registrationRef,
    } from "./js/firebase.js";
    import { confirmModal } from "./js/modal.js";

    const $gate = document.getElementById("gate");
    const $dash = document.getElementById("dashboard");
    const $auth = document.getElementById("auth-control");
    const $search = document.getElementById("search");

    function renderAuth(user) {
      if (!user) { $auth.innerHTML = ""; return; }
      const photo = user.photoURL
        ? `<img src="${user.photoURL}" referrerpolicy="no-referrer" class="rounded-full ring-1 ring-[color:var(--tape)] object-cover shrink-0" style="width:22px;height:22px;" />`
        : `<div class="rounded-full bg-red text-on-red grid place-items-center shrink-0" style="width:22px;height:22px;font-size:10px;font-weight:800;">${(user.displayName||user.email||"?")[0].toUpperCase()}</div>`;
      $auth.innerHTML = `
        <div class="auth-pill flex items-center" style="gap:6px;padding:3px 8px 3px 3px;">
          ${photo}
          <span class="hidden md:inline truncate" style="font-size:11px;font-weight:700;max-width:8rem;">${user.displayName || user.email}</span>
          <span style="font-size:9px;padding:2px 6px;border-radius:4px;background:var(--tape);color:var(--on-tape);font-weight:800;letter-spacing:0.1em;text-transform:uppercase;">Admin</span>
          <button id="btn-signout" class="text-mute hover:text-red" title="Sign out" style="line-height:0;">
            <span class="material-symbols-outlined" style="font-size:14px">logout</span>
          </button>
        </div>`;
      document.getElementById("btn-signout").addEventListener("click", () => signOutNow());
    }

    let unwatchTickets = null;
    let unwatchRegs   = null;
    let ticketsCache = {};
    let regsCache = {};

    watchAuth(({ user, isAdmin }) => {
      renderAuth(user);
      if (!isAdmin) {
        $dash.classList.add("hidden");
        $gate.classList.remove("hidden");
        if (unwatchTickets) { unwatchTickets(); unwatchTickets = null; }
        if (unwatchRegs)    { unwatchRegs();    unwatchRegs    = null; }
        return;
      }
      $gate.classList.add("hidden");
      $dash.classList.remove("hidden");
      startListeners();
    });

    document.getElementById("btn-signin").addEventListener("click", () => {
      signInWithGoogle().catch(err => { if (err && err.code !== "auth/popup-closed-by-user") alert(err.message); });
    });

    function startListeners() {
      if (unwatchTickets) unwatchTickets();
      if (unwatchRegs) unwatchRegs();
      unwatchTickets = onValue(ticketsRef(), (snap) => {
        ticketsCache = snap.val() || {};
        renderAll();
      });
      unwatchRegs = onValue(registrationsRef(), (snap) => {
        regsCache = snap.val() || {};
        renderAll();
      });
    }

    function renderAll() {
      const total = Object.keys(ticketsCache).length;
      const regs = Object.values(regsCache);
      document.getElementById("kpi-registered").textContent = regs.length.toLocaleString();
      document.getElementById("kpi-total").textContent = total.toLocaleString();
      document.getElementById("kpi-available").textContent = Math.max(0, total - regs.length).toLocaleString();
      renderTable(regs);
    }

    $search.addEventListener("input", () => renderTable(Object.values(regsCache)));

    function esc(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
    }
    function fmtDate(ms) {
      if (!ms) return "—";
      try { return new Date(ms).toLocaleString("en-PH", { month:"short", day:"numeric", hour:"numeric", minute:"2-digit", hour12: true }); } catch { return "—"; }
    }
    function genderLabel(g) {
      return ({female:"Female", male:"Male", prefer_not:"—"})[g] || "—";
    }

    // ===== Sort state =====
    // Each column has a natural default direction. Clicking a different column resets to its default;
    // clicking the active column toggles asc ↔ desc.
    const SORT_DEFAULT_DIR = {
      ticketId: "asc",
      name: "asc",
      school: "asc",
      gender: "asc",
      age: "asc",
      fbName: "asc",
      registeredAt: "desc",
    };
    let sortState = { key: "registeredAt", dir: "desc" };

    function cmpVal(a, b, key) {
      let va = a[key];
      let vb = b[key];
      if (key === "age") { va = Number(va) || 0; vb = Number(vb) || 0; }
      else if (key === "registeredAt") { va = va || 0; vb = vb || 0; }
      else if (key === "ticketId") {
        // ECU-#### → compare on the numeric tail so ECU-0010 sorts after ECU-0002.
        const na = parseInt(String(va || "").replace(/^\D+/, ""), 10) || 0;
        const nb = parseInt(String(vb || "").replace(/^\D+/, ""), 10) || 0;
        va = na; vb = nb;
      }
      else { va = String(va == null ? "" : va).toLowerCase(); vb = String(vb == null ? "" : vb).toLowerCase(); }
      if (va < vb) return -1;
      if (va > vb) return 1;
      return 0;
    }

    function updateSortIndicators() {
      document.querySelectorAll(".t-sortable").forEach(th => {
        const key = th.dataset.sort;
        const ind = th.querySelector(".t-sort-ind");
        if (!ind) return;
        if (key === sortState.key) {
          ind.textContent = sortState.dir === "asc" ? " ▲" : " ▼";
          th.classList.add("t-sorted");
        } else {
          ind.textContent = "";
          th.classList.remove("t-sorted");
        }
      });
    }

    document.querySelectorAll(".t-sortable").forEach(th => {
      th.addEventListener("click", () => {
        const key = th.dataset.sort;
        if (!key) return;
        if (sortState.key === key) {
          sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
        } else {
          sortState.key = key;
          sortState.dir = SORT_DEFAULT_DIR[key] || "asc";
        }
        updateSortIndicators();
        renderTable(Object.values(regsCache));
      });
    });
    updateSortIndicators();

    function renderTable(regs) {
      const q = ($search.value || "").trim().toLowerCase();
      const mult = sortState.dir === "asc" ? 1 : -1;
      const list = regs
        .slice()
        .sort((a, b) => mult * cmpVal(a, b, sortState.key))
        .filter(r => !q || (
          (r.name || "").toLowerCase().includes(q) ||
          (r.school || "").toLowerCase().includes(q) ||
          (r.ticketId || "").toLowerCase().includes(q) ||
          (r.fbName || "").toLowerCase().includes(q)
        ));

      const $tbody = document.getElementById("recent-tbody");
      if (!list.length) {
        $tbody.innerHTML = `<tr><td colspan="8" class="text-center text-mute py-10">${q ? "No matches." : "No registrations yet."}</td></tr>`;
        return;
      }
      $tbody.innerHTML = list.map(r => `
        <tr>
          <td class="t-ticket">${esc(r.ticketId || "")}</td>
          <td><div class="font-extrabold-ui text-ink">${esc(r.name || "—")}</div></td>
          <td class="hidden md:table-cell">${esc(r.school || "—")}</td>
          <td class="hidden sm:table-cell">${esc(genderLabel(r.gender))}</td>
          <td class="hidden sm:table-cell">${esc(r.age || "—")}</td>
          <td class="hidden lg:table-cell">${esc(r.fbName || "—")}</td>
          <td class="whitespace-nowrap text-mute">${fmtDate(r.registeredAt)}</td>
          <td class="text-right whitespace-nowrap">
            <button class="btn-row-del text-mute hover:text-red transition" data-ticket="${esc(r.ticketId || "")}" data-name="${esc(r.name || "")}" title="Delete registration" style="padding:4px;line-height:0;">
              <span class="material-symbols-outlined" style="font-size:18px">delete</span>
            </button>
          </td>
        </tr>
      `).join("");
    }

    // ===== Delete a registration (frees the ticket for re-registration) =====
    document.getElementById("recent-tbody").addEventListener("click", async (e) => {
      const btn = e.target.closest(".btn-row-del");
      if (!btn) return;
      const id = btn.dataset.ticket;
      const name = btn.dataset.name || "";
      if (!id) return;
      const ok = await confirmModal({
        title: "Delete this registration?",
        message: `<em>${esc(id)}</em>${name ? ` (${esc(name)})` : ""} will be removed and the ticket freed for re-registration.`,
        confirmText: "Delete",
        cancelText: "Cancel",
        danger: true,
        icon: "delete",
      });
      if (!ok) return;
      btn.disabled = true;
      try {
        await set(registrationRef(id), null);
        await update(ticketRef(id), { registered: false, registeredAt: null, name: null });
      } catch (err) {
        alert("Delete failed: " + (err && err.message || err));
        btn.disabled = false;
      }
    });

    // ===== CSV export =====
    document.getElementById("btn-csv").addEventListener("click", () => {
      const regs = Object.values(regsCache)
        .sort((a, b) => (b.registeredAt || 0) - (a.registeredAt || 0));
      if (!regs.length) { alert("No registrations to export."); return; }
      const header = ["ticketId", "name", "age", "gender", "school", "fbName", "registeredAt"];
      const csv = [header.join(",")].concat(
        regs.map(r => header.map(k => {
          let v = r[k] == null ? "" : r[k];
          if (k === "registeredAt" && v) v = new Date(v).toISOString();
          v = String(v).replace(/"/g, '""');
          return /[",\n]/.test(v) ? `"${v}"` : v;
        }).join(","))
      ).join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `campus-unite-registrations-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    });

  </script>

</body>
</html>
