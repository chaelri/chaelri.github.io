<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Share the Love">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf9f6"/>
      <stop offset="100%" stop-color="#f3eedf"/>
    </linearGradient>
    <linearGradient id="heart" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#8a9968"/>
      <stop offset="100%" stop-color="#5e6b44"/>
    </linearGradient>
    <filter id="heartShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#5e6b44" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background: warm paper gradient -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Decorative paper texture: soft sage corner brush -->
  <circle cx="64" cy="64" r="110" fill="#7b8a5b" opacity="0.06"/>
  <circle cx="448" cy="448" r="130" fill="#b29554" opacity="0.06"/>

  <!-- Main heart, centered with safe-zone margin so maskable crops cleanly -->
  <g filter="url(#heartShadow)">
    <path fill="url(#heart)" d="M256,432
      C190,378,128,328,98,283
      C72,244,60,210,60,180
      C60,128,100,88,152,88
      C190,88,222,108,256,148
      C290,108,322,88,360,88
      C412,88,452,128,452,180
      C452,210,440,244,414,283
      C384,328,322,378,256,432 Z"/>
  </g>

  <!-- C & K monogram in cream, system serif italic so it renders without
       external fonts loaded (PWA icons render in isolation) -->
  <g font-family="Georgia, 'Playfair Display', 'Times New Roman', serif"
     font-style="italic"
     fill="#faf9f6"
     text-anchor="middle">
    <text x="256" y="278" font-size="92" font-weight="400" letter-spacing="2">C &amp; K</text>
  </g>

  <!-- Tiny date stamp under the monogram -->
  <text x="256" y="332" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22"
        font-weight="500"
        letter-spacing="6"
        fill="#faf9f6"
        opacity="0.78">07 · 02 · 2026</text>
</svg>
