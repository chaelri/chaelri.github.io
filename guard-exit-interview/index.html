<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guard Exit Interview Tracker</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="shortcut icon" href="favicon.svg" />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Google Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- xlsx-js-style for colored Excel export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-slate-100 min-h-screen flex flex-col">

  <!-- ===== SPLASH SCREEN ===== -->
  <div id="splash-screen">
    <div id="splash-content">
      <span class="material-icons" id="splash-icon">shield</span>
      <div id="splash-company-name">New Manela</div>
      <div id="splash-subtitle">Guard Exit Interview Tracker</div>
      <div id="splash-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- ===== HEADER ===== -->
  <header id="app-header" class="fixed top-0 left-0 right-0 z-50 bg-blue-900 text-white shadow-lg">
    <div id="header-inner" class="flex items-center justify-between px-4 py-3 gap-4">
      <!-- Left: Title -->
      <div class="flex items-center gap-3 min-w-0">
        <span class="material-icons text-2xl text-blue-300 flex-shrink-0">shield</span>
        <div class="min-w-0">
          <h1 class="text-base font-bold leading-tight truncate">Guard Exit Interview Tracker</h1>
          <p id="header-subtitle" class="text-xs text-blue-300 font-medium">0 completed · 1 total</p>
        </div>
      </div>

      <!-- Company Tabs -->
      <div id="header-company-tabs" class="flex items-center gap-1 bg-blue-800 rounded-lg p-1">
        <button id="btn-company-manela" class="company-tab active-company px-3 py-1 rounded text-sm font-semibold flex items-center gap-1">
          <span class="material-icons text-sm">business</span> New Manela
        </button>
        <button id="btn-company-moriah" class="company-tab px-3 py-1 rounded text-sm font-semibold flex items-center gap-1">
          <span class="material-icons text-sm">business</span> New Moriah
        </button>
      </div>

      <!-- Right: Nav Buttons (hidden on mobile, replaced by bottom nav) -->
      <div class="hidden md:flex items-center gap-2 flex-shrink-0">
        <button id="btn-form-view" class="header-tab active-tab px-3 py-1.5 rounded text-sm font-medium flex items-center gap-1">
          <span class="material-icons text-base">edit_note</span>
          <span class="hidden sm:inline">Form</span>
        </button>
        <button id="btn-summary-view" class="header-tab px-3 py-1.5 rounded text-sm font-medium flex items-center gap-1">
          <span class="material-icons text-base">bar_chart</span>
          <span class="hidden sm:inline">Summary</span>
        </button>
        <button id="btn-table-view" class="header-tab px-3 py-1.5 rounded text-sm font-medium flex items-center gap-1">
          <span class="material-icons text-base">table_view</span>
          <span class="hidden sm:inline">Table</span>
        </button>
        <button id="btn-export-csv" class="px-3 py-1.5 rounded text-sm font-medium flex items-center gap-1 bg-emerald-700 hover:bg-emerald-600 transition-colors">
          <span class="material-icons text-base">table_chart</span>
          <span class="hidden sm:inline">Export Excel</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="flex-1 overflow-hidden" id="main-content">

    <!-- FORM VIEW -->
    <div id="form-view" class="flex h-form-view">

      <!-- Mobile breadcrumb nav bar (hidden on desktop) -->
      <div id="mobile-form-nav" class="mobile-form-nav">
        <button id="mobile-back-btn" class="mobile-back-btn">
          <span class="material-icons" style="font-size:18px">arrow_back_ios_new</span>
          <span id="mobile-back-label">Records</span>
        </button>
        <span id="mobile-breadcrumb" class="mobile-breadcrumb-title"></span>
        <span style="width:72px"></span>
      </div>

      <!-- Panel container: flex on desktop, slide-panels on mobile -->
      <div id="panel-container" class="flex flex-1 overflow-hidden">

      <!-- Column 1: Guard Record List -->
      <aside id="col-records" class="w-52 flex-shrink-0 bg-white border-r border-slate-200 flex flex-col overflow-hidden">
        <div class="px-3 py-2 border-b border-slate-200 bg-slate-50">
          <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Records</h2>
        </div>
        <div id="record-list" class="flex-1 overflow-y-auto py-1"></div>
        <div class="p-2 border-t border-slate-200">
          <button id="btn-new-record" class="w-full flex items-center justify-center gap-1.5 px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors">
            <span class="material-icons text-base">add</span>
            New Record
          </button>
        </div>
      </aside>

      <!-- Column 2: Section Navigation -->
      <nav id="col-sections" class="w-48 flex-shrink-0 bg-white border-r border-slate-200 overflow-y-auto">
        <div class="px-3 py-2 border-b border-slate-200 bg-slate-50">
          <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Sections</h2>
        </div>
        <div id="section-nav" class="py-1"></div>
      </nav>

      <!-- Column 3: Form Content -->
      <section id="col-form" class="flex-1 overflow-y-auto p-4 lg:p-6">
        <div id="form-content"></div>
      </section>

      </div><!-- /panel-container -->
    </div>

    <!-- SUMMARY VIEW (hidden by default) -->
    <div id="summary-view" class="hidden overflow-y-auto h-form-view p-4 lg:p-6">
      <div id="summary-content" class="max-w-5xl mx-auto"></div>
    </div>

    <!-- TABLE VIEW (hidden by default) -->
    <div id="table-view" class="hidden h-form-view flex flex-col">
      <div id="table-toolbar" class="flex items-center gap-3 px-4 py-2 bg-white border-b border-slate-200 flex-shrink-0"></div>
      <div id="table-scroll" class="flex-1 overflow-auto">
        <div id="table-content"></div>
      </div>
    </div>

  </main>

  <!-- Mobile bottom nav (hidden on desktop) -->
  <nav id="mobile-bottom-nav" class="mobile-bottom-nav">
    <button class="mobile-nav-btn active-mobile-nav" id="mobile-nav-form">
      <span class="material-icons">edit_note</span>
      <span>Form</span>
    </button>
    <button class="mobile-nav-btn" id="mobile-nav-summary">
      <span class="material-icons">bar_chart</span>
      <span>Summary</span>
    </button>
    <button class="mobile-nav-btn" id="mobile-nav-table">
      <span class="material-icons">table_view</span>
      <span>Table</span>
    </button>
    <button class="mobile-nav-btn" id="mobile-nav-export">
      <span class="material-icons">table_chart</span>
      <span>Export</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
